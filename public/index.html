<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>EA1FJZ Cloud OS</title>
  <style>
    :root{
      --bg:#0b1220;--panel:rgba(15,23,42,.78);--panel2:rgba(255,255,255,.08);--line:rgba(255,255,255,.16);
      --text:#f8fafc;--muted:#a9b5c8;--accent:#2f7df6;--danger:#ef4444;--ok:#22c55e;--warn:#f59e0b;
      --shadow:0 22px 70px rgba(0,0,0,.35);--radius:22px;--top:42px;--dock:82px;
    }
    *{box-sizing:border-box} html,body{height:100%;margin:0;font-family:Inter,Segoe UI,Arial,sans-serif;color:var(--text);overflow:hidden}
    body{background:#07111f}.desktop{position:fixed;inset:0;background:linear-gradient(135deg,#09111f 0%,#132b4f 45%,#0f172a 100%);background-size:cover;background-position:center;user-select:none}
    .desktop:before{content:'';position:absolute;inset:0;background:radial-gradient(circle at 25% 10%,rgba(47,125,246,.35),transparent 26%),radial-gradient(circle at 78% 20%,rgba(34,197,94,.16),transparent 30%),linear-gradient(180deg,rgba(0,0,0,.12),rgba(0,0,0,.42));pointer-events:none}
    .topbar{position:absolute;top:0;left:0;right:0;height:var(--top);display:flex;align-items:center;justify-content:space-between;padding:0 14px;background:rgba(2,6,23,.64);backdrop-filter:blur(18px);border-bottom:1px solid var(--line);z-index:5000}
    .brand{display:flex;gap:10px;align-items:center;font-weight:900}.brand-badge{width:28px;height:28px;border-radius:9px;background:linear-gradient(135deg,var(--accent),#174ea6);display:grid;place-items:center;box-shadow:0 8px 24px rgba(47,125,246,.35);font-size:11px}.brand small{display:block;color:var(--muted);font-size:10px;font-weight:600;margin-top:-2px}
    .top-center{display:flex;gap:8px;align-items:center}.task-pill{display:none;align-items:center;gap:7px;border:1px solid var(--line);border-radius:999px;background:rgba(255,255,255,.08);color:var(--text);padding:6px 10px;font-size:12px;max-width:180px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer}.task-pill.is-visible{display:flex}
    .top-right{display:flex;align-items:center;gap:10px;color:var(--muted);font-size:12px}.status-dot{width:8px;height:8px;border-radius:50%;background:var(--ok);box-shadow:0 0 0 4px rgba(34,197,94,.14)}
    button,input,select,textarea{font:inherit}.btn{border:1px solid var(--line);background:rgba(255,255,255,.09);color:var(--text);border-radius:14px;padding:10px 12px;font-weight:800;cursor:pointer;transition:.16s ease}.btn:hover{transform:translateY(-1px);background:rgba(255,255,255,.14)}.btn:active{transform:translateY(1px) scale(.99)}.btn.primary{background:linear-gradient(135deg,var(--accent),#1d4ed8);border-color:rgba(255,255,255,.18)}.btn.danger{background:rgba(239,68,68,.18);border-color:rgba(239,68,68,.35)}.btn.ok{background:rgba(34,197,94,.18);border-color:rgba(34,197,94,.35)}
    .login{position:fixed;inset:0;z-index:9000;display:grid;place-items:center;background:radial-gradient(circle at 40% 20%,rgba(47,125,246,.22),transparent 30%),#08101d}.login-card{width:min(420px,calc(100% - 32px));background:rgba(15,23,42,.82);border:1px solid var(--line);border-radius:28px;box-shadow:var(--shadow);padding:28px;backdrop-filter:blur(20px);text-align:center}.login-logo{width:62px;height:62px;margin:0 auto 14px;border-radius:18px;background:linear-gradient(135deg,var(--accent),#123b7f);display:grid;place-items:center;font-weight:1000}.login-card h1{margin:0;font-size:28px}.login-card p{color:var(--muted);line-height:1.45}.field{display:grid;gap:7px;text-align:left;margin:12px 0}.field label{font-size:12px;color:var(--muted);font-weight:800}.input{width:100%;border:1px solid var(--line);background:rgba(255,255,255,.08);color:var(--text);border-radius:14px;padding:12px 13px;outline:none}.input:focus{border-color:rgba(47,125,246,.7);box-shadow:0 0 0 4px rgba(47,125,246,.16)}.login-msg{min-height:20px;color:#fca5a5;font-size:13px;margin-top:10px}.hint{color:var(--muted);font-size:12px;line-height:1.35}
    .icons{position:absolute;inset:var(--top) 0 var(--dock) 0;z-index:10}.desk-icon{position:absolute;width:88px;min-height:88px;display:grid;justify-items:center;align-content:start;gap:7px;padding:8px;border-radius:18px;cursor:pointer;text-align:center;color:#fff}.desk-icon:hover{background:rgba(255,255,255,.12);backdrop-filter:blur(4px)}.desk-icon .emoji{width:52px;height:52px;border-radius:17px;display:grid;place-items:center;background:rgba(255,255,255,.16);border:1px solid rgba(255,255,255,.22);font-size:28px;box-shadow:0 10px 22px rgba(0,0,0,.18)}.desk-icon span{font-size:12px;text-shadow:0 2px 8px rgba(0,0,0,.9);line-height:1.15;word-break:break-word}
    .dock{position:absolute;left:50%;bottom:12px;transform:translateX(-50%);height:64px;display:flex;align-items:center;gap:10px;padding:8px 12px;border:1px solid var(--line);border-radius:24px;background:rgba(15,23,42,.55);backdrop-filter:blur(18px);box-shadow:var(--shadow);z-index:5000}.dock-btn{width:48px;height:48px;border-radius:17px;border:1px solid rgba(255,255,255,.16);background:rgba(255,255,255,.12);display:grid;place-items:center;font-size:25px;cursor:pointer}.dock-btn:hover{transform:translateY(-6px);background:rgba(255,255,255,.2)}
    .window{position:absolute;min-width:420px;min-height:260px;width:860px;height:560px;top:82px;left:120px;background:rgba(15,23,42,.86);border:1px solid var(--line);border-radius:22px;box-shadow:var(--shadow);backdrop-filter:blur(22px);z-index:100;overflow:hidden;resize:both}.window.max{top:48px!important;left:10px!important;width:calc(100vw - 20px)!important;height:calc(100vh - 128px)!important;resize:none}.titlebar{height:42px;display:flex;align-items:center;justify-content:space-between;padding:0 12px;border-bottom:1px solid var(--line);background:rgba(255,255,255,.06);cursor:move}.traffic{display:flex;gap:8px}.dot{width:13px;height:13px;border-radius:50%;cursor:pointer}.dot.close{background:#ff5f57}.dot.min{background:#ffbd2e}.dot.max{background:#28c840}.wtitle{font-weight:900;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:55%}.wbody{height:calc(100% - 42px);overflow:auto;padding:16px}.window iframe{width:100%;height:100%;border:0;background:#fff;border-radius:0}.no-pad{padding:0}.grid{display:grid;gap:14px}.grid.two{grid-template-columns:1fr 1fr}.grid.three{grid-template-columns:repeat(3,1fr)}.card{background:rgba(255,255,255,.08);border:1px solid var(--line);border-radius:20px;padding:16px}.card h3{margin:0 0 8px}.muted{color:var(--muted)}.small{font-size:12px}.toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center}.table{width:100%;border-collapse:collapse}.table th,.table td{border-bottom:1px solid var(--line);padding:9px;text-align:left;font-size:13px}.table th{color:#dbeafe}.badge{display:inline-flex;padding:5px 8px;border-radius:999px;background:rgba(255,255,255,.1);border:1px solid var(--line);font-size:11px;font-weight:900}.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}.form-row.three{grid-template-columns:1fr 1fr 1fr}.app-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:12px}.app-tile{border:1px solid var(--line);background:rgba(255,255,255,.08);border-radius:18px;padding:14px;cursor:pointer}.app-tile:hover{background:rgba(255,255,255,.14)}.app-tile .big{font-size:34px}.toast{position:fixed;right:16px;bottom:94px;background:rgba(15,23,42,.92);border:1px solid var(--line);border-radius:16px;padding:12px 14px;box-shadow:var(--shadow);z-index:10000;display:none}.toast.show{display:block}.hidden{display:none!important}

    .explorer{display:grid;grid-template-columns:260px minmax(0,1fr);gap:12px;height:100%}
    .explorer-side{background:rgba(255,255,255,.07);border:1px solid var(--line);border-radius:18px;padding:12px;overflow:auto}
    .explorer-main{display:grid;grid-template-rows:auto minmax(0,1fr) 210px;gap:10px;min-width:0;height:100%}
    .crumbs{display:flex;align-items:center;gap:8px;flex-wrap:wrap;background:rgba(255,255,255,.07);border:1px solid var(--line);border-radius:16px;padding:8px 10px}
    .path-pill{padding:7px 10px;border-radius:999px;background:rgba(255,255,255,.09);border:1px solid var(--line);font-size:12px;font-weight:800}
    .explorer-list{border:1px solid var(--line);border-radius:18px;overflow:auto;background:rgba(255,255,255,.06)}
    .explorer-head,.explorer-row{display:grid;grid-template-columns:34px minmax(180px,1fr) 110px 170px 150px;gap:8px;align-items:center;padding:9px 10px;border-bottom:1px solid var(--line);font-size:13px}
    .explorer-head{position:sticky;top:0;background:rgba(15,23,42,.94);z-index:2;color:#dbeafe;font-weight:900}
    .explorer-row{cursor:pointer}.explorer-row:hover,.explorer-row.is-selected{background:rgba(47,125,246,.18)}
    .explorer-icon{font-size:22px;text-align:center}.explorer-name{font-weight:800;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.explorer-actions{display:flex;gap:6px;justify-content:flex-end}
    .explorer-actions .btn{padding:6px 8px;border-radius:10px;font-size:12px}.preview{border:1px solid var(--line);border-radius:18px;background:rgba(255,255,255,.06);overflow:hidden;display:grid;grid-template-rows:auto 1fr}.preview-title{padding:8px 10px;border-bottom:1px solid var(--line);font-size:12px;font-weight:900;color:var(--muted)}.preview-body{overflow:auto;background:rgba(255,255,255,.03);display:grid;place-items:center}.preview-body iframe{width:100%;height:100%;border:0;background:#fff}.preview-body pre{width:100%;height:100%;margin:0;padding:12px;white-space:pre-wrap;user-select:text;color:var(--text);font-size:12px}.quick-folder{display:grid;gap:8px}.quick-folder button{text-align:left}.scale-badge{min-width:54px;text-align:center;font-weight:900}
    body.theme-windows{--panel:rgba(248,250,252,.88);--panel2:rgba(255,255,255,.72);--line:rgba(15,23,42,.14);--text:#111827;--muted:#64748b;--shadow:0 18px 45px rgba(15,23,42,.18);}
    body.theme-windows .desktop{background:linear-gradient(135deg,#eaf4ff 0%,#cddfff 42%,#f7fbff 100%)}
    body.theme-windows .desktop:before{background:radial-gradient(circle at 20% 10%,rgba(47,125,246,.25),transparent 28%),radial-gradient(circle at 80% 15%,rgba(147,197,253,.35),transparent 30%)}
    body.theme-windows .topbar{top:auto;bottom:0;height:50px;background:rgba(248,250,252,.82);border-top:1px solid var(--line);border-bottom:none;color:#111827;justify-content:center;box-shadow:0 -10px 28px rgba(15,23,42,.08)}
    body.theme-windows .topbar .brand{position:absolute;left:12px} body.theme-windows .top-right{position:absolute;right:12px;color:#334155}
    body.theme-windows .dock{bottom:5px;height:42px;padding:4px 8px;border-radius:14px;background:rgba(255,255,255,.78);box-shadow:none;z-index:6000}
    body.theme-windows .dock-btn{width:34px;height:34px;border-radius:9px;font-size:19px;background:rgba(255,255,255,.8)}
    body.theme-windows .dock-btn:hover{transform:translateY(-2px);background:#fff}
    body.theme-windows .icons{inset:0 0 58px 0}.theme-windows .window{background:rgba(250,250,250,.92);border-radius:12px;color:#111827;border:1px solid rgba(15,23,42,.16);backdrop-filter:blur(18px)}
    body.theme-windows .titlebar{height:38px;background:#f8fafc;border-bottom:1px solid #e2e8f0}.theme-windows .wtitle{color:#111827}.theme-windows .card,.theme-windows .explorer-side,.theme-windows .explorer-list,.theme-windows .preview,.theme-windows .crumbs{background:rgba(255,255,255,.78);border-color:#dbe4ef;color:#111827}.theme-windows .input{background:#fff;color:#111827;border-color:#cbd5e1}.theme-windows .explorer-head{background:#f8fafc;color:#1e3a8a}.theme-windows .desk-icon span{color:#111827;text-shadow:0 1px 4px rgba(255,255,255,.9)}.theme-windows .desk-icon .emoji{background:rgba(255,255,255,.78);border-color:rgba(15,23,42,.12)}.theme-windows .btn{background:#ffffff;color:#111827;border-color:#cbd5e1}.theme-windows .btn.primary{background:#2563eb;color:#fff}.theme-windows .btn.danger{background:#fff1f2;color:#dc2626}.theme-windows .btn.ok{background:#f0fdf4;color:#166534}

    @media(max-width:760px){.grid.two,.grid.three,.form-row,.form-row.three{grid-template-columns:1fr}.window{left:8px!important;top:52px!important;width:calc(100vw - 16px)!important;height:calc(100vh - 140px)!important;resize:none}.dock{max-width:calc(100vw - 18px);overflow:auto}.top-center{display:none}.brand small{display:none}}
  </style>
</head>
<body>
<div id="login" class="login">
  <div class="login-card">
    <div class="login-logo">OS</div>
    <h1>EA1FJZ Cloud OS</h1>
    <p>Acceso protegido al escritorio web, archivos, nube, meteorología/radio y configuración.</p>
    <div class="field"><label>Usuario</label><input id="loginUser" class="input" value="admin" autocomplete="username"></div>
    <div class="field"><label>Contraseña</label><input id="loginPass" class="input" type="password" placeholder="Contraseña" autocomplete="current-password"></div>
    <button id="loginBtn" class="btn primary" style="width:100%">Entrar</button>
    <div id="loginMsg" class="login-msg"></div>
    <div class="hint">Primera instalación: usuario <b>admin</b>. La contraseña inicial viene de la variable Render <b>ADMIN_PASSWORD</b>.</div>
  </div>
</div>
<div id="desktop" class="desktop hidden">
  <div class="topbar">
    <div class="brand"><div class="brand-badge">OS</div><div><span id="osTitle">EA1FJZ Cloud OS</span><small id="osSubtitle">Sistema operativo web</small></div></div>
    <div id="taskbar" class="top-center"></div>
    <div class="top-right"><span class="status-dot"></span><span id="healthText">Conectando...</span><span id="clock"></span><button id="logoutBtn" class="btn" style="padding:6px 9px">Salir</button></div>
  </div>
  <div id="icons" class="icons"></div>
  <div class="dock">
    <div class="dock-btn" data-app="browser" title="Navegador">🌐</div>
    <div class="dock-btn" data-app="files" title="Archivos">📁</div>
    <div class="dock-btn" data-app="meteo" title="Meteo & Radio">📡</div>
    <div class="dock-btn" data-app="cloud" title="Nube">☁️</div>
    <div class="dock-btn" data-app="remote" title="Ayuda remota">🖥️</div>
    <div class="dock-btn" data-app="settings" title="Configuración">⚙️</div>
  </div>
</div>
<div id="toast" class="toast"></div>
<script>
const $ = id => document.getElementById(id);
let config = {}, icons = [], zTop = 200, windows = new Map(), drag = null, currentUser = null;
async function api(url, opts={}){
  const r = await fetch(url, {headers:{'Content-Type':'application/json', ...(opts.headers||{})}, credentials:'same-origin', ...opts});
  if(!r.ok){ let msg='Error'; try{ msg=(await r.json()).error||msg; }catch{ msg=await r.text(); } throw new Error(msg); }
  const ct=r.headers.get('content-type')||'';
  if(!ct.includes('json')) return r.text();
  const j=await r.json();
  if(j && j.ok){
    for(const k of ['config','icons','files','entries','accounts','connections','user','file','icon']) if(Object.prototype.hasOwnProperty.call(j,k)) return j[k];
  }
  return j;
}
function toast(msg){ const t=$('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2600); }
function esc(s){ return String(s??'').replace(/[&<>"']/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m])); }
function applyConfig(){
  const title=config.os_title||config.title||'EA1FJZ Cloud OS'; const sub=config.os_subtitle||config.subtitle||'Sistema operativo web';
  $('osTitle').textContent=title; $('osSubtitle').textContent=sub;
  document.documentElement.style.setProperty('--accent', config.accent || '#2f7df6');
  const theme=(config.theme||'glass'); document.body.classList.toggle('theme-windows', theme==='windows');
  const scale=Math.max(0.65, Math.min(1.15, parseFloat(config.ui_scale||'0.88') || 0.88));
  const d=$('desktop'); d.style.transform=`scale(${scale})`; d.style.transformOrigin='top left'; d.style.width=(100/scale)+'vw'; d.style.height=(100/scale)+'vh';
  if(config.wallpaper){ d.style.background = config.wallpaper.startsWith('url(') || config.wallpaper.startsWith('linear') ? config.wallpaper : `url('${config.wallpaper}') center/cover no-repeat`; }
}
async function boot(){
  try{ const s=await api('/api/session'); currentUser=s.user; $('login').classList.add('hidden'); $('desktop').classList.remove('hidden'); await loadAll(); }
  catch{ $('login').classList.remove('hidden'); $('desktop').classList.add('hidden'); }
}
async function loadAll(){ config=await api('/api/config'); applyConfig(); await loadIcons(); health(); }
async function loadIcons(){ icons=await api('/api/icons'); renderIcons(); }
function renderIcons(){
  $('icons').innerHTML='';
  icons.forEach(ic=>{
    const d=document.createElement('div'); d.className='desk-icon'; d.style.left=(ic.x||40)+'px'; d.style.top=(ic.y||110)+'px'; d.dataset.id=ic.id;
    d.innerHTML=`<div class="emoji">${esc(ic.icon||'◻')}</div><span>${esc(ic.title)}</span>`;
    d.addEventListener('dblclick',()=>openIcon(ic));
    d.addEventListener('contextmenu',e=>{e.preventDefault(); editIcon(ic);});
    makeIconDraggable(d,ic); $('icons').appendChild(d);
  });
}
function makeIconDraggable(el,ic){
  let start=null;
  el.addEventListener('pointerdown',e=>{ if(e.button!==0) return; start={x:e.clientX,y:e.clientY,l:parseInt(el.style.left),t:parseInt(el.style.top),moved:false}; el.setPointerCapture(e.pointerId); });
  el.addEventListener('pointermove',e=>{ if(!start) return; const dx=e.clientX-start.x, dy=e.clientY-start.y; if(Math.abs(dx)+Math.abs(dy)>4) start.moved=true; el.style.left=Math.max(0,start.l+dx)+'px'; el.style.top=Math.max(0,start.t+dy)+'px'; });
  el.addEventListener('pointerup',async e=>{ if(!start) return; if(start.moved){ ic.x=parseInt(el.style.left); ic.y=parseInt(el.style.top); try{ await api('/api/icons/'+ic.id,{method:'PUT',body:JSON.stringify(ic)}); }catch(err){toast(err.message)} } start=null; });
}
function openIcon(ic){
  if(ic.type==='internal') return openInternal(ic.target, ic.title, ic.icon);
  if(ic.type==='browser') return openBrowser(ic.target || '');
  openUrl(ic.target, ic.title, ic.icon);
}
function openInternal(name,title,icon){
  const map={files:appFiles,meteo:appMeteo,cloud:appCloud,remote:appRemote,settings:appSettings,browser:()=>openBrowser('')};
  (map[name]||appSettings)();
}
function openUrl(url,title='Web',icon='🌐'){ const w=createWindow(title,icon,{width:980,height:640}); w.body.classList.add('no-pad'); w.body.innerHTML=`<iframe src="${esc(url)}" referrerpolicy="no-referrer"></iframe>`; }
function createWindow(title, icon='◻', opts={}){
  const id='w'+Math.random().toString(36).slice(2); const w=document.createElement('div'); w.className='window';
  w.style.left=(opts.left ?? (80+windows.size*28))+'px'; w.style.top=(opts.top ?? (70+windows.size*24))+'px'; w.style.width=(opts.width||860)+'px'; w.style.height=(opts.height||560)+'px'; w.style.zIndex=++zTop;
  w.innerHTML=`<div class="titlebar"><div class="traffic"><span class="dot close"></span><span class="dot min"></span><span class="dot max"></span></div><div class="wtitle">${esc(icon)} ${esc(title)}</div><div></div></div><div class="wbody"></div>`;
  $('desktop').appendChild(w); const body=w.querySelector('.wbody');
  const task=document.createElement('div'); task.className='task-pill is-visible'; task.innerHTML=`${esc(icon)} <span>${esc(title)}</span>`; task.onclick=()=>{ w.classList.remove('hidden'); focusWindow(w); }; $('taskbar').appendChild(task);
  w.querySelector('.close').onclick=()=>{ task.remove(); w.remove(); windows.delete(id); };
  w.querySelector('.min').onclick=()=>w.classList.add('hidden');
  w.querySelector('.max').addEventListener('click',()=>{ w.classList.toggle('max'); focusWindow(w); });
  w.addEventListener('pointerdown',()=>focusWindow(w)); makeWindowDraggable(w); windows.set(id,{el:w,task,body,title}); return {id,el:w,body};
}
function focusWindow(w){ w.style.zIndex=++zTop; }
function makeWindowDraggable(w){
  const tb=w.querySelector('.titlebar'); tb.addEventListener('pointerdown',e=>{ if(e.target.classList.contains('dot')) return; focusWindow(w); const r=w.getBoundingClientRect(); drag={w,x:e.clientX,y:e.clientY,l:r.left,t:r.top}; tb.setPointerCapture(e.pointerId); });
  tb.addEventListener('pointermove',e=>{ if(!drag||drag.w!==w||w.classList.contains('max')) return; w.style.left=Math.max(0,drag.l+e.clientX-drag.x)+'px'; w.style.top=Math.max(44,drag.t+e.clientY-drag.y)+'px'; });
  tb.addEventListener('pointerup',()=>drag=null);
}
function openBrowser(initial=''){
  const w=createWindow('Navegador','🌐',{width:1040,height:650});
  w.body.innerHTML=`<div class="grid" style="height:100%;grid-template-rows:auto 1fr"><div class="toolbar"><input id="url_${w.id}" class="input" placeholder="Dirección web o búsqueda" value="${esc(initial)}" style="flex:1"><button class="btn primary" id="go_${w.id}">Abrir</button><button class="btn" id="ext_${w.id}">Pestaña externa</button></div><iframe id="frame_${w.id}" style="width:100%;height:100%;border:0;background:#fff;border-radius:16px"></iframe></div>`;
  const input=$('url_'+w.id), frame=$('frame_'+w.id); const norm=()=>{let v=input.value.trim(); if(!v) return 'about:blank'; if(!/^https?:\/\//i.test(v)) v='https://www.google.com/search?q='+encodeURIComponent(v); return v;};
  $('go_'+w.id).onclick=()=>frame.src=norm(); $('ext_'+w.id).onclick=()=>window.open(norm(),'_blank'); input.addEventListener('keydown',e=>{if(e.key==='Enter') $('go_'+w.id).click();}); if(initial) $('go_'+w.id).click();
}
function formatBytes(n){ n=Number(n||0); if(n<1024) return n+' B'; if(n<1024*1024) return Math.round(n/1024)+' KB'; return (n/1024/1024).toFixed(1)+' MB'; }
function fileIcon(item){ if(item.kind==='folder') return '📁'; const e=(item.ext||'').toLowerCase(); if(['.png','.jpg','.jpeg','.gif','.webp','.svg','.bmp'].includes(e)) return '🖼️'; if(e==='.pdf') return '📕'; if(['.html','.htm'].includes(e)) return '🌐'; if(['.txt','.md','.csv','.json','.js','.css','.xml','.log','.sql'].includes(e)) return '📄'; if(['.mp4','.webm'].includes(e)) return '🎞️'; if(['.mp3','.wav'].includes(e)) return '🎵'; return '📦'; }
function canPreview(item){ const e=(item.ext||'').toLowerCase(); return item.kind==='file' && ['.png','.jpg','.jpeg','.gif','.webp','.svg','.bmp','.pdf','.html','.htm','.txt','.md','.csv','.json','.js','.css','.xml','.log','.sql','.mp4','.webm','.mp3','.wav'].includes(e); }
async function appFiles(){
  const w=createWindow('Explorador de archivos','📁',{width:1080,height:700});
  let current='/', selected=null;
  async function load(dir=current){ current=dir||'/'; const data=await api('/api/fs/list?dir='+encodeURIComponent(current)); selected=null; render(data); }
  function render(data){
    const parts=(data.current||'/').split('/').filter(Boolean); const crumbs=['<button class="btn" data-dir="/">🏠 Raíz</button>']; let acc=''; parts.forEach(p=>{acc+='/'+p; crumbs.push(`<button class="btn" data-dir="${esc(acc)}">${esc(p)}</button>`);});
    w.body.innerHTML=`<div class="explorer"><div class="explorer-side"><h3>Accesos rápidos</h3><div class="quick-folder"><button class="btn" data-dir="/">📁 Archivos persistentes</button><button class="btn" id="newFolder_${w.id}">➕ Nueva carpeta</button><button class="btn" id="refresh_${w.id}">🔄 Actualizar</button></div><hr style="border:none;border-top:1px solid var(--line);margin:14px 0"><p class="small muted">Vista tipo explorador. Los archivos se visualizan dentro de MasiveOS siempre que el formato lo permita.</p><div class="field"><label>Subir a esta carpeta</label><input id="up_${w.id}" class="input" type="file"></div><button id="upl_${w.id}" class="btn primary" style="width:100%">Subir archivo</button></div><div class="explorer-main"><div class="crumbs"><span class="path-pill">${esc(data.current||'/')}</span>${crumbs.join('')}</div><div class="explorer-list"><div class="explorer-head"><div></div><div>Nombre</div><div>Tamaño</div><div>Modificado</div><div>Acción</div></div>${data.parent?`<div class="explorer-row" data-dir="${esc(data.parent)}"><div class="explorer-icon">↩️</div><div class="explorer-name">..</div><div></div><div></div><div></div></div>`:''}${(data.entries||[]).map(it=>`<div class="explorer-row" data-path="${esc(it.path)}" data-kind="${it.kind}" data-ext="${esc(it.ext||'')}"><div class="explorer-icon">${fileIcon(it)}</div><div class="explorer-name">${esc(it.name)}</div><div>${it.kind==='folder'?'Carpeta':formatBytes(it.size)}</div><div>${new Date(it.modified_at).toLocaleString('es-ES')}</div><div class="explorer-actions">${canPreview(it)?`<button class="btn" data-view="${esc(it.path)}">Ver</button>`:''}<button class="btn danger" data-delete="${esc(it.path)}">Borrar</button></div></div>`).join('')||'<div class="explorer-row"><div></div><div class="muted">Carpeta vacía</div><div></div><div></div><div></div></div>'}</div><div class="preview"><div id="prevTitle_${w.id}" class="preview-title">Vista previa</div><div id="prevBody_${w.id}" class="preview-body"><div class="muted small">Selecciona un archivo y pulsa Ver.</div></div></div></div></div>`;
    w.body.querySelectorAll('[data-dir]').forEach(b=>b.onclick=()=>load(b.dataset.dir));
    w.body.querySelectorAll('.explorer-row[data-kind="folder"]').forEach(r=>r.ondblclick=()=>load(r.dataset.path));
    w.body.querySelectorAll('.explorer-row[data-kind="file"]').forEach(r=>r.ondblclick=()=>preview(r.dataset.path,r.dataset.ext));
    w.body.querySelectorAll('[data-view]').forEach(b=>b.onclick=(e)=>{e.stopPropagation(); preview(b.dataset.view, b.closest('.explorer-row')?.dataset.ext||'');});
    w.body.querySelectorAll('[data-delete]').forEach(b=>b.onclick=async(e)=>{e.stopPropagation(); if(confirm('¿Borrar este elemento?')){ await api('/api/fs/delete',{method:'DELETE',body:JSON.stringify({path:b.dataset.delete})}); load(current); }});
    $('refresh_'+w.id).onclick=()=>load(current);
    $('newFolder_'+w.id).onclick=async()=>{ const name=prompt('Nombre de la nueva carpeta'); if(!name) return; await api('/api/fs/mkdir',{method:'POST',body:JSON.stringify({dir:current,name})}); load(current); };
    $('upl_'+w.id).onclick=async()=>{ const f=$('up_'+w.id).files[0]; if(!f) return toast('Selecciona un archivo.'); const fd=new FormData(); fd.append('file',f); const r=await fetch('/api/files/upload?dir='+encodeURIComponent(current),{method:'POST',body:fd,credentials:'same-origin'}); if(!r.ok) return toast('Error al subir.'); toast('Archivo subido.'); load(current); };
  }
  async function preview(path, ext=''){
    selected=path; const title=$('prevTitle_'+w.id), body=$('prevBody_'+w.id); title.textContent='Vista previa: '+path; body.innerHTML='';
    const e=(ext||path.split('.').pop()||'').toLowerCase(); const full='/api/fs/view?path='+encodeURIComponent(path);
    if(['png','jpg','jpeg','gif','webp','svg','bmp'].includes(e.replace('.',''))){ body.innerHTML=`<img src="${full}" style="max-width:100%;max-height:100%;object-fit:contain">`; return; }
    if(['pdf','html','htm','mp4','webm','mp3','wav'].includes(e.replace('.',''))){ body.innerHTML=`<iframe src="${full}"></iframe>`; return; }
    try{ const txt=await fetch('/api/fs/text?path='+encodeURIComponent(path),{credentials:'same-origin'}).then(r=>r.text()); body.innerHTML=`<pre>${esc(txt)}</pre>`; }
    catch(err){ body.innerHTML=`<div class="muted small">No se puede previsualizar este archivo. <button class="btn" onclick="window.open('${full}','_blank')">Abrir</button></div>`; }
  }
  load('/').catch(e=>toast(e.message));
}
function appMeteo(){
  const w=createWindow('Meteo & Radio Center','📡',{width:1030,height:660});
  w.body.innerHTML=`<div class="grid"><div class="card"><h3>EA1FJZ Observatory</h3><p class="muted">Centro de acceso rápido a meteorología, radio, propagación, astronomía y mapas.</p></div><div class="app-list">
  ${tile('🌦️','Open-Meteo','Datos meteorológicos','url',config.meteo_url||'https://open-meteo.com/')}
  ${tile('🌬️','Windy','Mapa viento/lluvia','url',config.windy_url||'https://www.windy.com/')}
  ${tile('🛰️','DSN Now','Deep Space Network','url',config.dsn_url||'https://eyes.nasa.gov/apps/dsn-now/dsn.html')}

  ${tile('📻','Propagación HF','Módulo preparado para integrar','note','')}
  ${tile('🌌','Astronomía','Módulo preparado para integrar','note','')}
  </div></div>`; bindTiles(w.body);
}
function tile(icon,title,desc,type,target){return `<div class="app-tile" data-type="${type}" data-target="${esc(target)}" data-title="${esc(title)}" data-icon="${esc(icon)}"><div class="big">${icon}</div><b>${esc(title)}</b><div class="muted small">${esc(desc)}</div></div>`}
function bindTiles(root){ root.querySelectorAll('.app-tile').forEach(t=>t.onclick=()=>{ if(t.dataset.type==='url') openUrl(t.dataset.target,t.dataset.title,t.dataset.icon); else toast('Módulo preparado para integrar en la siguiente fase.'); }); }
async function appCloud(){
  const w=createWindow('Centro de servicios en la nube','☁️',{width:900,height:620});
  async function render(){ const rows=await api('/api/cloud/accounts'); w.body.innerHTML=`<div class="grid two"><div class="card"><h3>Nueva cuenta</h3><div class="field"><label>Proveedor</label><select id="cp_${w.id}" class="input"><option>GitHub</option><option>Render</option><option>OneDrive</option><option>SharePoint</option><option>Dropbox</option><option>SFTP</option></select></div><div class="field"><label>Nombre visible</label><input id="cn_${w.id}" class="input" placeholder="Ej: GitHub DirtAnalysis"></div><div class="field"><label>Configuración JSON / token / notas</label><textarea id="cj_${w.id}" class="input" rows="5" placeholder='{"repo":"usuario/repo","token":"..."}'></textarea></div><button id="cs_${w.id}" class="btn primary">Guardar cuenta</button><p class="hint">V0.1 guarda la configuración. La conexión real a cada proveedor se activará por módulos en fases posteriores.</p></div><div class="card"><h3>Cuentas configuradas</h3><table class="table"><thead><tr><th>Proveedor</th><th>Nombre</th><th>Estado</th><th></th></tr></thead><tbody>${rows.map(r=>`<tr><td>${esc(r.provider)}</td><td>${esc(r.display_name)}</td><td><span class="badge">${r.enabled?'ON':'OFF'}</span></td><td><button class="btn danger" data-del="${r.id}">Borrar</button></td></tr>`).join('')||'<tr><td colspan="4" class="muted">Sin cuentas.</td></tr>'}</tbody></table></div></div>`;
    $('cs_'+w.id).onclick=async()=>{ let cfg={raw:$('cj_'+w.id).value}; try{ cfg=JSON.parse($('cj_'+w.id).value||'{}'); }catch{} await api('/api/cloud/accounts',{method:'POST',body:JSON.stringify({provider:$('cp_'+w.id).value,display_name:$('cn_'+w.id).value,config:cfg})}); toast('Cuenta guardada.'); render();};
    w.body.querySelectorAll('[data-del]').forEach(b=>b.onclick=async()=>{ await api('/api/cloud/accounts/'+b.dataset.del,{method:'DELETE'}); render(); });
  } render().catch(e=>toast(e.message));
}
async function appRemote(){
  const w=createWindow('Ayuda remota','🖥️',{width:900,height:620});
  async function render(){ const rows=await api('/api/remote/connections'); w.body.innerHTML=`<div class="grid two"><div class="card"><h3>Nueva conexión</h3><div class="form-row"><div class="field"><label>Nombre</label><input id="rn_${w.id}" class="input" placeholder="PC cabina / Equipo laboratorio"></div><div class="field"><label>Protocolo</label><select id="rp_${w.id}" class="input"><option value="external">Lanzador externo</option><option value="guacamole">Guacamole</option><option value="novnc">noVNC</option><option value="rdp">RDP documentado</option></select></div></div><div class="form-row"><div class="field"><label>Host/IP</label><input id="rh_${w.id}" class="input"></div><div class="field"><label>Puerto</label><input id="rpo_${w.id}" class="input" placeholder="3389 / 5900"></div></div><div class="field"><label>URL de lanzamiento</label><input id="ru_${w.id}" class="input" placeholder="https://guacamole... o anydesk://..."></div><div class="field"><label>Notas</label><textarea id="rnotes_${w.id}" class="input" rows="4"></textarea></div><button id="rs_${w.id}" class="btn primary">Guardar conexión</button><p class="hint">La versión V0.1 no abre RDP directamente por seguridad del navegador. Deja preparado el gestor para Guacamole/noVNC o enlaces externos.</p></div><div class="card"><h3>Conexiones</h3><table class="table"><thead><tr><th>Nombre</th><th>Protocolo</th><th>Destino</th><th></th></tr></thead><tbody>${rows.map(r=>`<tr><td>${esc(r.name)}</td><td>${esc(r.protocol)}</td><td>${esc(r.host)} ${esc(r.port)}</td><td>${r.launch_url?`<button class="btn" onclick="window.open('${esc(r.launch_url)}','_blank')">Abrir</button>`:''} <button class="btn danger" data-del="${r.id}">Borrar</button></td></tr>`).join('')||'<tr><td colspan="4" class="muted">Sin conexiones.</td></tr>'}</tbody></table></div></div>`;
    $('rs_'+w.id).onclick=async()=>{ await api('/api/remote/connections',{method:'POST',body:JSON.stringify({name:$('rn_'+w.id).value,protocol:$('rp_'+w.id).value,host:$('rh_'+w.id).value,port:$('rpo_'+w.id).value,launch_url:$('ru_'+w.id).value,notes:$('rnotes_'+w.id).value})}); toast('Conexión guardada.'); render();};
    w.body.querySelectorAll('[data-del]').forEach(b=>b.onclick=async()=>{ await api('/api/remote/connections/'+b.dataset.del,{method:'DELETE'}); render(); });
  } render().catch(e=>toast(e.message));
}
function appSettings(){
  const w=createWindow('Configuración general','⚙️',{width:980,height:680});
  const scaleVal=parseFloat(config.ui_scale||'0.88')||0.88;
  w.body.innerHTML=`<div class="grid"><div class="card"><h3>Personalización del sistema</h3><div class="grid two"><div class="field"><label>Título</label><input id="st_${w.id}" class="input" value="${esc(config.os_title||config.title||'')}"></div><div class="field"><label>Subtítulo</label><input id="ss_${w.id}" class="input" value="${esc(config.os_subtitle||config.subtitle||'')}"></div><div class="field"><label>Tema visual</label><select id="theme_${w.id}" class="input"><option value="glass">EA1FJZ Glass</option><option value="windows">Windows stile</option></select></div><div class="field"><label>Color principal</label><input id="sa_${w.id}" class="input" type="color" value="${esc(config.accent||'#2f7df6')}"></div><div class="field"><label>Resolución / escala de interfaz</label><div class="toolbar"><input id="scale_${w.id}" class="input" type="range" min="0.65" max="1.15" step="0.05" value="${scaleVal}" style="flex:1"><span id="scaleTxt_${w.id}" class="badge scale-badge">${Math.round(scaleVal*100)}%</span></div><div class="hint">Baja la escala si ves las ventanas demasiado grandes.</div></div><div class="field"><label>Fondo de pantalla CSS</label><input id="sw_${w.id}" class="input" value="${esc(config.wallpaper||'')}"></div></div><div class="toolbar"><button id="savecfg_${w.id}" class="btn primary">Guardar configuración</button><button id="addic_${w.id}" class="btn ok">Crear icono</button><button id="backup_${w.id}" class="btn">Descargar backup DB</button></div></div><div class="grid two"><div class="card"><h3>Cambiar contraseña</h3><div class="field"><label>Contraseña actual</label><input id="pc_${w.id}" type="password" class="input"></div><div class="field"><label>Nueva contraseña</label><input id="pn_${w.id}" type="password" class="input"></div><button id="pass_${w.id}" class="btn primary">Cambiar contraseña</button></div><div class="card"><h3>Estado del servidor</h3><div id="health_${w.id}" class="muted">Consultando...</div><button id="healthb_${w.id}" class="btn" style="margin-top:10px">Actualizar estado</button></div></div></div>`;
  $('theme_'+w.id).value=config.theme||'glass';
  $('scale_'+w.id).oninput=()=>{$('scaleTxt_'+w.id).textContent=Math.round(parseFloat($('scale_'+w.id).value)*100)+'%';};
  $('savecfg_'+w.id).onclick=async()=>{ await api('/api/config',{method:'POST',body:JSON.stringify({os_title:$('st_'+w.id).value,os_subtitle:$('ss_'+w.id).value,accent:$('sa_'+w.id).value,wallpaper:$('sw_'+w.id).value,theme:$('theme_'+w.id).value,ui_scale:$('scale_'+w.id).value})}); config=await api('/api/config'); applyConfig(); toast('Configuración guardada.'); };
  $('addic_'+w.id).onclick=()=>editIcon(null);
  $('backup_'+w.id).onclick=()=>window.open('/api/db-backup','_blank');
  $('pass_'+w.id).onclick=async()=>{ await api('/api/change-password',{method:'POST',body:JSON.stringify({currentPassword:$('pc_'+w.id).value,newPassword:$('pn_'+w.id).value})}); toast('Contraseña cambiada.'); };
  async function h(){ const r=await api('/api/health'); $('health_'+w.id).innerHTML=`<div><b>DB:</b> ${esc(r.dbPath)}</div><div><b>Uploads:</b> ${esc(r.uploadsPath)}</div><div><b>Escritura:</b> ${r.writable?'OK':'NO'}</div><div><b>Hora:</b> ${new Date(r.time).toLocaleString('es-ES')}</div>`; }
  $('healthb_'+w.id).onclick=h; h().catch(e=>$('health_'+w.id).textContent=e.message);
}
function editIcon(ic){
  const w=createWindow(ic?'Editar icono':'Crear icono','🧩',{width:520,height:470}); const isNew=!ic; ic=ic||{title:'Nuevo acceso',icon:'⭐',type:'url',target:'',x:70,y:120};
  w.body.innerHTML=`<div class="grid"><div class="field"><label>Título</label><input id="it_${w.id}" class="input" value="${esc(ic.title)}"></div><div class="form-row"><div class="field"><label>Icono</label><input id="ii_${w.id}" class="input" value="${esc(ic.icon)}"></div><div class="field"><label>Tipo</label><select id="ity_${w.id}" class="input"><option value="url">URL</option><option value="browser">Navegador</option><option value="internal">Interno</option></select></div></div><div class="field"><label>Destino</label><input id="itar_${w.id}" class="input" value="${esc(ic.target)}" placeholder="URL o módulo: files, meteo, cloud, remote, settings"></div><div class="toolbar"><button id="is_${w.id}" class="btn primary">Guardar</button>${isNew?'':`<button id="id_${w.id}" class="btn danger">Eliminar</button>`}</div><p class="hint">Clic derecho sobre un icono del escritorio para editarlo. Arrastra los iconos para guardar su posición.</p></div>`;
  $('ity_'+w.id).value=ic.type||'url';
  $('is_'+w.id).onclick=async()=>{ const payload={...ic,title:$('it_'+w.id).value,icon:$('ii_'+w.id).value,type:$('ity_'+w.id).value,target:$('itar_'+w.id).value}; if(isNew) await api('/api/icons',{method:'POST',body:JSON.stringify(payload)}); else await api('/api/icons/'+ic.id,{method:'PUT',body:JSON.stringify(payload)}); await loadIcons(); toast('Icono guardado.'); w.el.querySelector('.close').click(); };
  if(!isNew) $('id_'+w.id).onclick=async()=>{ if(confirm('¿Eliminar icono?')){ await api('/api/icons/'+ic.id,{method:'DELETE'}); await loadIcons(); w.el.querySelector('.close').click(); }};
}
async function health(){ try{ const h=await api('/api/health'); $('healthText').textContent=h.writable?'Servidor OK':'Servidor sin escritura'; }catch{ $('healthText').textContent='Sin conexión'; } }
setInterval(()=>{$('clock').textContent=new Date().toLocaleString('es-ES',{hour:'2-digit',minute:'2-digit',second:'2-digit'});},1000); setInterval(health,30000);
$('loginBtn').onclick=async()=>{ try{ await api('/api/login',{method:'POST',body:JSON.stringify({username:$('loginUser').value,password:$('loginPass').value})}); await boot(); }catch(e){ $('loginMsg').textContent=e.message; }};
$('loginPass').addEventListener('keydown',e=>{if(e.key==='Enter') $('loginBtn').click();});
$('logoutBtn').onclick=async()=>{ await api('/api/logout',{method:'POST'}); location.reload(); };
document.querySelectorAll('.dock-btn').forEach(b=>b.onclick=()=>openInternal(b.dataset.app,b.title,b.textContent));
boot();
