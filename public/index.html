<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Masive OS</title>
  <style>
    :root{
      --bg0:#060814;
      --bg1:#111827;
      --glass:rgba(18,25,45,.62);
      --glass2:rgba(255,255,255,.10);
      --line:rgba(255,255,255,.18);
      --line2:rgba(255,255,255,.28);
      --txt:#f8fafc;
      --muted:#b8c0d4;
      --blue:#5aa7ff;
      --violet:#8b5cf6;
      --ok:#34d399;
      --bad:#fb7185;
      --warn:#fbbf24;
      --shadow:0 24px 70px rgba(0,0,0,.42);
      --radius:24px;
      --topbar:42px;
      --dock:86px;
    }
    *{box-sizing:border-box}
    html,body{margin:0;width:100%;height:100%;overflow:hidden;font-family:Inter,Segoe UI,Arial,sans-serif;color:var(--txt);background:#050713}
    body{
      background:
        radial-gradient(circle at 18% 10%,rgba(112,55,255,.42),transparent 32%),
        radial-gradient(circle at 82% 18%,rgba(29,124,255,.34),transparent 28%),
        radial-gradient(circle at 62% 84%,rgba(14,165,233,.28),transparent 34%),
        linear-gradient(135deg,#070916,#111827 55%,#0b1020);
    }
    body.custom-wallpaper{
      background-size:cover;
      background-position:center;
      background-repeat:no-repeat;
    }
    button,input,select,textarea{font:inherit}
    button{cursor:pointer}
    .hidden{display:none!important}

    .login-screen{
      position:fixed;inset:0;z-index:10000;display:flex;align-items:center;justify-content:center;padding:24px;
      background:
        radial-gradient(circle at 30% 20%,rgba(139,92,246,.35),transparent 35%),
        radial-gradient(circle at 72% 72%,rgba(14,165,233,.28),transparent 34%),
        linear-gradient(135deg,#050713,#111827);
    }
    .login-card{
      width:min(440px,calc(100% - 20px));
      border:1px solid var(--line);
      border-radius:32px;
      background:rgba(15,23,42,.64);
      backdrop-filter:blur(24px);
      box-shadow:var(--shadow);
      padding:30px;
    }
    .login-logo{
      width:74px;height:74px;border-radius:24px;margin:0 auto 16px;
      display:flex;align-items:center;justify-content:center;
      background:linear-gradient(135deg,rgba(90,167,255,.95),rgba(139,92,246,.95));
      box-shadow:0 16px 40px rgba(79,70,229,.35);
      font-size:36px;
    }
    .login-card h1{text-align:center;margin:0 0 6px;font-size:30px;letter-spacing:.2px}
    .login-card p{text-align:center;margin:0 0 22px;color:var(--muted);font-size:14px;line-height:1.45}
    .field{display:grid;gap:7px;margin:0 0 14px}
    .field label{font-size:12px;color:var(--muted);font-weight:800;text-transform:uppercase;letter-spacing:.08em}
    .input{
      width:100%;border:1px solid var(--line);border-radius:16px;padding:13px 14px;background:rgba(255,255,255,.08);
      color:#fff;outline:none;
    }
    .input:focus{border-color:rgba(90,167,255,.72);box-shadow:0 0 0 4px rgba(90,167,255,.12)}
    .primary{
      border:0;border-radius:16px;background:linear-gradient(135deg,#60a5fa,#7c3aed);color:#fff;
      padding:12px 16px;font-weight:900;box-shadow:0 12px 28px rgba(79,70,229,.28);
    }
    .secondary{
      border:1px solid var(--line);border-radius:14px;background:rgba(255,255,255,.09);color:#fff;padding:10px 13px;font-weight:800;
    }
    .danger{
      border:1px solid rgba(251,113,133,.45);border-radius:14px;background:rgba(251,113,133,.16);color:#fecdd3;padding:10px 13px;font-weight:900;
    }
    .msg{min-height:18px;font-size:13px;color:var(--muted);margin-top:10px}
    .msg.bad{color:#fecdd3}.msg.ok{color:#bbf7d0}

    .topbar{
      position:fixed;left:0;right:0;top:0;height:var(--topbar);z-index:5000;
      display:flex;align-items:center;justify-content:space-between;gap:14px;padding:0 14px;
      background:rgba(5,8,22,.54);backdrop-filter:blur(20px);border-bottom:1px solid rgba(255,255,255,.12);
      user-select:none;
    }
    .brand{display:flex;align-items:center;gap:10px;font-weight:950}
    .brand-badge{
      width:24px;height:24px;border-radius:9px;background:linear-gradient(135deg,#60a5fa,#7c3aed);
      display:flex;align-items:center;justify-content:center;font-size:13px;box-shadow:0 8px 22px rgba(96,165,250,.18)
    }
    .top-center{display:flex;align-items:center;gap:8px;color:var(--muted);font-size:12px;min-width:0}
    .top-pill{border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.08);padding:5px 9px;border-radius:999px;white-space:nowrap}
    .top-actions{display:flex;align-items:center;gap:8px}
    .top-btn{
      width:auto;border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.08);color:#fff;border-radius:12px;
      padding:6px 10px;font-weight:800;font-size:12px
    }

    .desktop{
      position:fixed;left:0;right:0;top:var(--topbar);bottom:0;z-index:1;overflow:hidden;
      padding:22px 22px calc(var(--dock) + 22px);
    }
    .icon{
      position:absolute;width:92px;height:98px;border:1px solid transparent;border-radius:22px;
      display:flex;flex-direction:column;align-items:center;justify-content:flex-start;gap:8px;padding:10px 6px;
      color:#fff;text-align:center;user-select:none;
    }
    .icon:hover,.icon.is-selected{background:rgba(255,255,255,.10);border-color:rgba(255,255,255,.16);backdrop-filter:blur(8px)}
    .icon-symbol{
      width:54px;height:54px;border-radius:20px;background:rgba(255,255,255,.13);
      border:1px solid rgba(255,255,255,.18);display:flex;align-items:center;justify-content:center;font-size:30px;
      box-shadow:0 10px 24px rgba(0,0,0,.18)
    }
    .icon-title{
      max-width:84px;line-height:1.15;font-size:12px;font-weight:800;text-shadow:0 2px 8px rgba(0,0,0,.55);
      overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;
    }

    .dock{
      position:fixed;left:50%;bottom:14px;transform:translateX(-50%);height:72px;z-index:4800;
      display:flex;align-items:center;gap:10px;padding:10px 14px;border:1px solid rgba(255,255,255,.18);
      border-radius:25px;background:rgba(10,15,30,.52);backdrop-filter:blur(26px);box-shadow:var(--shadow);
      max-width:calc(100vw - 28px);overflow:auto;
    }
    .dock-btn{
      width:50px;height:50px;min-width:50px;border-radius:18px;border:1px solid rgba(255,255,255,.18);
      display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.10);color:#fff;font-size:25px;
      position:relative;
    }
    .dock-btn.running::after{
      content:'';position:absolute;bottom:4px;left:50%;transform:translateX(-50%);width:5px;height:5px;border-radius:999px;background:#fff;
    }

    .window{
      position:absolute;left:170px;top:90px;width:860px;height:560px;z-index:100;background:rgba(15,23,42,.72);
      border:1px solid rgba(255,255,255,.17);border-radius:22px;backdrop-filter:blur(22px);box-shadow:var(--shadow);
      overflow:hidden;display:flex;flex-direction:column;min-width:360px;min-height:260px;
    }
    .window.maximized{left:10px!important;top:52px!important;width:calc(100vw - 20px)!important;height:calc(100vh - 62px)!important;border-radius:18px}
    .window.minimized{display:none}
    .titlebar{
      height:46px;display:flex;align-items:center;justify-content:space-between;gap:12px;padding:0 12px;
      border-bottom:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.06);user-select:none;cursor:move;
      flex:0 0 auto;
    }
    .traffic{display:flex;gap:7px;align-items:center}
    .dot{width:13px;height:13px;border-radius:999px;border:0;padding:0}
    .close{background:#ff5f57}.min{background:#ffbd2e}.max{background:#28c840}
    .win-title{font-size:13px;font-weight:950;display:flex;gap:8px;align-items:center;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .win-body{flex:1;overflow:auto;padding:16px;background:rgba(2,6,23,.08)}
    .resize-handle{position:absolute;right:0;bottom:0;width:18px;height:18px;cursor:nwse-resize}
    .resize-handle::after{content:'⇲';position:absolute;right:3px;bottom:1px;color:rgba(255,255,255,.45);font-size:13px}

    .panel-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px}
    .card{
      border:1px solid rgba(255,255,255,.13);border-radius:18px;background:rgba(255,255,255,.08);padding:14px;
    }
    .card h3{margin:0 0 8px;font-size:16px}
    .card p{margin:0;color:var(--muted);font-size:13px;line-height:1.45}
    .row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
    .grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .table{width:100%;border-collapse:collapse}
    .table th,.table td{border-bottom:1px solid rgba(255,255,255,.10);padding:9px;text-align:left;font-size:13px;vertical-align:middle}
    .table th{color:#dbeafe;background:rgba(255,255,255,.06);position:sticky;top:0}
    .table button{padding:7px 9px;border-radius:10px;font-size:12px}
    .browser-bar{display:grid;grid-template-columns:1fr auto auto;gap:8px;margin-bottom:10px}
    iframe.browser-frame{width:100%;height:calc(100% - 52px);border:1px solid rgba(255,255,255,.14);border-radius:16px;background:#fff}
    .note{border-left:4px solid var(--blue);padding:10px 12px;border-radius:14px;background:rgba(96,165,250,.11);color:#dbeafe;font-size:13px;line-height:1.45}
    .status-ok{color:#bbf7d0}.status-bad{color:#fecdd3}
    .form-actions{display:flex;justify-content:flex-end;gap:10px;margin-top:14px}
    .modal-backdrop{
      position:fixed;inset:0;z-index:9000;background:rgba(2,6,23,.45);display:flex;align-items:center;justify-content:center;padding:20px;
    }
    .modal{
      width:min(620px,calc(100vw - 30px));max-height:90vh;overflow:auto;border:1px solid rgba(255,255,255,.18);
      border-radius:24px;background:rgba(15,23,42,.86);backdrop-filter:blur(24px);box-shadow:var(--shadow);padding:18px;
    }
    .modal h2{margin:0 0 6px;font-size:22px}
    .modal p{margin:0 0 14px;color:var(--muted);font-size:13px;line-height:1.45}
    .kv{display:grid;grid-template-columns:170px 1fr;gap:8px;font-size:13px;color:var(--muted)}
    .kv b{color:#fff}







    /* ===== Iconos escritorio: tipografía más legible ===== */
    .icon{
      width:124px !important;
      height:132px !important;
      padding:10px 8px !important;
      gap:7px !important;
    }
    .icon-symbol{
      width:58px !important;
      height:58px !important;
      font-size:30px !important;
      flex:0 0 auto;
    }
    .icon-title{
      max-width:116px !important;
      font-family: "Segoe UI", Inter, Arial, sans-serif !important;
      font-weight:700 !important;
      font-size:12px !important;
      line-height:1.28 !important;
      letter-spacing:0 !important;
      text-shadow:0 2px 7px rgba(0,0,0,.55) !important;
      -webkit-line-clamp:unset !important;
      display:block !important;
      overflow:visible !important;
      white-space:normal !important;
      word-break:normal !important;
      overflow-wrap:break-word !important;
    }

    /* ===== Procesador de textos ===== */
    .writer-wrap{
      height:100%;
      min-height:520px;
      display:grid;
      grid-template-columns:260px minmax(0,1fr);
      gap:12px;
    }
    .writer-sidebar,.writer-editor-card{
      border:1px solid rgba(255,255,255,.14);
      background:rgba(255,255,255,.08);
      border-radius:22px;
      overflow:hidden;
    }
    .writer-sidebar{
      display:flex;
      flex-direction:column;
      min-height:0;
    }
    .writer-side-head{
      padding:13px;
      border-bottom:1px solid rgba(255,255,255,.12);
      background:rgba(255,255,255,.06);
    }
    .writer-doc-list{
      flex:1;
      min-height:0;
      overflow:auto;
      padding:8px;
      display:grid;
      gap:7px;
      align-content:start;
    }
    .writer-doc-item{
      border:1px solid rgba(255,255,255,.12);
      background:rgba(255,255,255,.07);
      color:#fff;
      border-radius:15px;
      padding:10px;
      text-align:left;
    }
    .writer-doc-item.is-active,.writer-doc-item:hover{
      background:rgba(96,165,250,.18);
      border-color:rgba(96,165,250,.30);
    }
    .writer-doc-item b{display:block;font-size:13px;margin-bottom:3px}
    .writer-doc-item span{display:block;color:var(--muted);font-size:11px}
    .writer-editor-card{
      display:flex;
      flex-direction:column;
      min-width:0;
      min-height:0;
    }
    .writer-toolbar{
      flex:0 0 auto;
      display:flex;
      align-items:center;
      gap:8px;
      flex-wrap:wrap;
      padding:10px;
      border-bottom:1px solid rgba(255,255,255,.12);
      background:rgba(255,255,255,.06);
    }
    .writer-title{
      min-width:220px;
      flex:1;
    }
    .writer-page{
      flex:1;
      min-height:0;
      overflow:auto;
      padding:18px;
      background:#e5e7eb;
    }
    .writer-area{
      width:min(900px,100%);
      min-height:920px;
      margin:0 auto;
      padding:54px;
      background:#fff;
      color:#111827;
      border-radius:10px;
      box-shadow:0 18px 44px rgba(15,23,42,.22);
      outline:none;
      line-height:1.58;
      font-family: Georgia, "Times New Roman", serif;
      font-size:16px;
    }
    .writer-area:empty:before{
      content:"Empieza a escribir...";
      color:#9ca3af;
    }
    body.theme-light .writer-sidebar,
    body.theme-light .writer-editor-card{
      background:rgba(255,255,255,.72);
      border-color:rgba(15,23,42,.12);
      color:#0f172a;
    }
    body.theme-light .writer-doc-item{
      background:#fff;
      color:#0f172a;
      border-color:rgba(15,23,42,.10);
    }



    /* ===== WebDAV Drive Manager dentro de Masive OS completo ===== */
    .webdav-wrap{
      height:100%;
      min-height:560px;
      display:grid;
      grid-template-columns:320px minmax(0,1fr) 330px;
      gap:12px;
    }
    .webdav-panel,.webdav-main,.webdav-preview{
      border:1px solid rgba(255,255,255,.14);
      background:rgba(255,255,255,.08);
      border-radius:22px;
      overflow:hidden;
      min-height:0;
    }
    .webdav-panel{padding:14px;overflow:auto}
    .webdav-provider-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:9px;margin:10px 0 14px}
    .webdav-provider{
      border:1px solid rgba(255,255,255,.14);
      background:rgba(255,255,255,.08);
      color:#fff;
      border-radius:16px;
      min-height:82px;
      padding:10px 8px;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:5px;
      font-weight:900;
      text-align:center;
    }
    .webdav-provider b{font-size:28px}
    .webdav-provider span{font-size:12px;line-height:1.15}
    .webdav-main{
      display:flex;
      flex-direction:column;
      background:#fff!important;
      color:#111827!important;
    }
    .webdav-toolbar{
      flex:0 0 auto;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      padding:10px 12px;
      border-bottom:1px solid rgba(15,23,42,.10);
      background:linear-gradient(180deg,#ffffff,#f7f8fb);
      color:#111827;
    }
    .webdav-path{
      font-weight:950;
      min-width:0;
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
      color:#111827;
    }
    .webdav-actions{display:flex;gap:7px;align-items:center;flex-wrap:wrap;justify-content:flex-end}
    .webdav-actions .secondary{background:#fff!important;color:#111827!important;border:1px solid rgba(15,23,42,.14)!important}
    .webdav-content{flex:1;min-height:0;overflow:auto;padding:14px;background:#fff}
    .webdav-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(132px,1fr));gap:14px}
    .webdav-item{
      border:1px solid transparent;
      border-radius:18px;
      min-height:124px;
      padding:12px 8px;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:flex-start;
      gap:9px;
      text-align:center;
      color:#111827;
      user-select:none;
    }
    .webdav-item:hover,.webdav-item.is-selected{background:rgba(59,130,246,.10);border-color:rgba(59,130,246,.22)}
    .webdav-ico{
      width:60px;height:60px;border-radius:19px;
      display:flex;align-items:center;justify-content:center;
      font-size:34px;
      background:linear-gradient(180deg,#dbeafe,#bfdbfe);
      border:1px solid rgba(59,130,246,.20);
      box-shadow:0 8px 18px rgba(59,130,246,.10);
    }
    .webdav-name{width:100%;font-size:12px;line-height:1.18;font-weight:850;word-break:break-word}
    .webdav-meta{font-size:10px;color:#64748b;font-weight:800}
    .webdav-preview{
      background:rgba(255,255,255,.10);
      display:flex;
      flex-direction:column;
      min-height:0;
    }
    .webdav-preview-head{padding:14px;border-bottom:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.06)}
    .webdav-preview-body{flex:1;min-height:0;overflow:auto;padding:14px}
    .webdav-account{
      width:100%;
      border:1px solid rgba(255,255,255,.13);
      background:rgba(255,255,255,.08);
      color:#fff;
      border-radius:15px;
      padding:10px;
      text-align:left;
      margin:6px 0;
    }
    .webdav-account.is-active,.webdav-account:hover{background:rgba(96,165,250,.18);border-color:rgba(96,165,250,.30)}
    .webdav-account b{display:block;font-size:13px;margin-bottom:3px}
    .webdav-account span{display:block;color:var(--muted);font-size:11px}
    .webdav-status{border-left:4px solid #60a5fa;background:rgba(96,165,250,.10);border-radius:14px;padding:10px 12px;color:#dbeafe;font-size:13px;line-height:1.4;margin-top:10px}
    .webdav-preview-frame{width:100%;height:420px;border:1px solid rgba(255,255,255,.14);border-radius:16px;background:#fff}
    .webdav-preview-img{max-width:100%;border-radius:16px;background:#fff}
    body.theme-light .webdav-panel,
    body.theme-light .webdav-preview,
    body.theme-light .webdav-account,
    body.theme-light .webdav-provider{
      background:rgba(255,255,255,.72);
      color:#0f172a;
      border-color:rgba(15,23,42,.12);
    }
    body.theme-light .webdav-status{color:#1e3a8a;background:rgba(59,130,246,.10)}
    @media(max-width:1100px){.webdav-wrap{grid-template-columns:1fr}.webdav-preview{min-height:360px}}

    /* ===== Cloud Drive Manager ===== */
    .drive-wrap{
      height:100%;
      min-height:560px;
      display:grid;
      grid-template-columns:300px minmax(0,1fr) 320px;
      gap:12px;
    }
    .drive-panel,.drive-main,.drive-preview{
      border:1px solid rgba(255,255,255,.14);
      background:rgba(255,255,255,.08);
      border-radius:22px;
      overflow:hidden;
      min-height:0;
    }
    .drive-panel{padding:14px;overflow:auto}
    .drive-provider-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:9px;margin:10px 0 14px}
    .drive-provider{
      border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.08);color:#fff;border-radius:16px;
      min-height:78px;padding:10px 8px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;font-weight:900;text-align:center;
    }
    .drive-provider b{font-size:26px}
    .drive-main{display:flex;flex-direction:column;background:#ffffff!important;color:#111827!important}
    .drive-toolbar{
      flex:0 0 auto;display:flex;align-items:center;justify-content:space-between;gap:10px;padding:10px 12px;
      border-bottom:1px solid rgba(15,23,42,.10);background:linear-gradient(180deg,#ffffff,#f7f8fb);color:#111827;
    }
    .drive-path{font-weight:950;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:#111827}
    .drive-actions{display:flex;gap:7px;align-items:center;flex-wrap:wrap;justify-content:flex-end}
    .drive-actions .secondary{background:#fff!important;color:#111827!important;border:1px solid rgba(15,23,42,.14)!important}
    .drive-content{flex:1;min-height:0;overflow:auto;padding:14px;background:#fff}
    .drive-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(132px,1fr));gap:14px}
    .drive-item{
      border:1px solid transparent;border-radius:18px;min-height:124px;padding:12px 8px;display:flex;flex-direction:column;
      align-items:center;justify-content:flex-start;gap:9px;text-align:center;color:#111827;user-select:none;
    }
    .drive-item:hover,.drive-item.is-selected{background:rgba(59,130,246,.10);border-color:rgba(59,130,246,.22)}
    .drive-ico{
      width:60px;height:60px;border-radius:19px;display:flex;align-items:center;justify-content:center;font-size:34px;
      background:linear-gradient(180deg,#dbeafe,#bfdbfe);border:1px solid rgba(59,130,246,.20);box-shadow:0 8px 18px rgba(59,130,246,.10);
    }

<script>
(() => {
  const $ = (s, root=document) => root.querySelector(s);
  const $$ = (s, root=document) => [...root.querySelectorAll(s)];
  const api = async (url, options={}) => {
    const res = await fetch(url, {
      credentials: 'include',
      headers: options.body && !(options.body instanceof FormData) ? {'Content-Type':'application/json'} : undefined,
      ...options
    });
    let data = null;
    const txt = await res.text();
    try{ data = txt ? JSON.parse(txt) : null; }catch{ data = txt; }
    if(!res.ok){
      const msg = data && data.error ? data.error : `Error ${res.status}`;
      throw new Error(msg);
    }
    return data;
  };

  let config = {};
  let icons = [];
  let zTop = 200;
  let activeIconId = null;
  let windows = new Map();

  const desktop = $('#desktop');
  const modalHost = $('#modalHost');

  async function apiWithTimeout(url, options = {}, timeoutMs = 25000){
    const controller = new AbortController();
    const timer = setTimeout(() => controller.abort(), timeoutMs);
    try{
      return await api(url, {...options, signal: controller.signal});
    }catch(err){
      if(err.name === 'AbortError'){
        throw new Error('Timeout de navegador tras ' + Math.round(timeoutMs/1000) + ' s. El servidor no respondió a tiempo.');
      }
      throw err;
    }finally{
      clearTimeout(timer);
    }
  }


  function setMsg(el, text, type=''){
    el.textContent = text || '';
    el.className = 'msg' + (type ? ' ' + type : '');
  }

  function tickClock(){
    const d = new Date();
    $('#clockPill').textContent = d.toLocaleDateString('es-ES',{day:'2-digit',month:'2-digit'}) + ' · ' + d.toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'});
  }
  setInterval(tickClock, 1000); tickClock();

  async function boot(){
    try{
      const session = await api('/api/session');
      if(session.authenticated || session.ok){
        await enterOS();
      }
    }catch{}
  }

  $('#loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const msg = $('#loginMsg');
    setMsg(msg, 'Comprobando contraseña…');
    try{
      await api('/api/login', {method:'POST', body: JSON.stringify({password: $('#password').value})});
      setMsg(msg, 'Acceso correcto.', 'ok');
      await enterOS();
    }catch(err){
      setMsg(msg, err.message || 'Contraseña incorrecta', 'bad');
    }
  });

  $('#logoutBtn').addEventListener('click', async () => {
    try{ await api('/api/logout', {method:'POST'}); }catch{}
    location.reload();
  });

  async function enterOS(){
    $('#loginScreen').classList.add('hidden');
    $('#appShell').classList.remove('hidden');
    await loadAll();
    await checkHealth();
  }

  async function loadAll(){
    config = await api('/api/config');
    icons = await api('/api/icons');
    applyConfig();
    renderIcons();
  }

  function applyConfig(){
    $('#systemTitle').textContent = config.title || 'Masive OS';
    document.title = config.title || 'Masive OS';

    const theme = config.theme || 'massive';
    document.body.classList.remove('theme-massive','theme-aurora','theme-midnight','theme-light');
    document.body.classList.add('theme-' + theme);

    if(config.wallpaper){
      document.body.classList.add('custom-wallpaper');

    }else{
      document.body.classList.remove('custom-wallpaper');
      document.body.style.backgroundImage = '';
    }
  }

  function startpageSearchUrl(query){
    return 'https://www.startpage.com/sp/search?query=' + encodeURIComponent(query || '');

  function normalizeBrowserInput(value){
    const v = String(value || '').trim();
    if(!v) return startpageSearchUrl('Masive OS');
    if(/^https?:\/\//i.test(v) || v.startsWith('/')) return v;
    if(v.includes('.') && !/\s/.test(v)) return 'https://' + v;
    return startpageSearchUrl(v);
  }

  function makeIconDraggable(el, icon){
    let startX=0,startY=0,origX=0,origY=0,moving=false, saveTimer=null;
    el.addEventListener('pointerdown', (e) => {
      if(e.button !== 0) return;
      moving = true;
      startX = e.clientX; startY = e.clientY;
      origX = parseFloat(el.style.left)||0; origY = parseFloat(el.style.top)||0;
      el.setPointerCapture(e.pointerId);
    });
    el.addEventListener('pointermove', (e) => {
      if(!moving) return;
      const nx = Math.max(0, Math.min(window.innerWidth - 104, origX + e.clientX - startX));
      const ny = Math.max(0, Math.min(window.innerHeight - 170, origY + e.clientY - startY));
      el.style.left = nx + 'px'; el.style.top = ny + 'px';
    });
    el.addEventListener('pointerup', async () => {
      if(!moving) return;
      moving=false;
      icon.x = Math.round(parseFloat(el.style.left)||0);
      icon.y = Math.round(parseFloat(el.style.top)||0);
      clearTimeout(saveTimer);
      saveTimer = setTimeout(() => saveIcon(icon), 250);
    });
  }

  async function saveIcon(icon){

      await api('/api/icons/' + encodeURIComponent(icon.id), {method:'PUT', body: JSON.stringify(icon)});

  function openIcon(icon){
    if(icon.type === 'module'){
      openModule(icon.target, icon.title, icon.icon);
    }else if(icon.type === 'browser'){

    }else if(icon.type === 'external'){
      window.open(icon.target, '_blank', 'noopener,noreferrer');
    }else{
      openBrowser(icon.target || 'about:blank', icon.title || 'Acceso');
    }
  }

      dashboards: ['Dashboards','📊'],

  function createWindow(id, title, icon='◈', w=860, h=560){
    const win = document.createElement('section');
    win.className = 'window';
    win.dataset.id = id;
    win.style.width = w + 'px';
    win.style.height = h + 'px';
    win.style.left = Math.max(12, 110 + (windows.size * 28) % 280) + 'px';
    win.style.top = Math.max(52, 70 + (windows.size * 24) % 180) + 'px';
    win.style.zIndex = ++zTop;
    win.innerHTML = `
      <div class="titlebar">
        <div class="traffic">
          <button class="dot close" title="Cerrar"></button>
          <button class="dot min" title="Minimizar"></button>
          <button class="dot max" title="Maximizar"></button>
        </div>
        <div class="win-title"><span>${escapeHtml(icon)}</span><span>${escapeHtml(title)}</span></div>
        <div style="width:54px"></div>
      </div>
      <div class="win-body"></div>
      <div class="resize-handle"></div>
    `;
    desktop.appendChild(win);
    const body = $('.win-body', win);
    const titlebar = $('.titlebar', win);

    const ref = {el: win, body, id, title};
    windows.set(id, ref);

    win.addEventListener('pointerdown', () => win.style.zIndex = ++zTop);
    $('.close', win).addEventListener('click', () => { windows.delete(id); win.remove(); });
    $('.min', win).addEventListener('click', () => win.classList.add('minimized'));
    $('.max', win).addEventListener('click', () => win.classList.toggle('maximized'));
    makeWindowDraggable(win, titlebar);
    makeWindowResizable(win, $('.resize-handle', win));
    return ref;
  }

  function makeWindowDraggable(win, handle){
    let moving=false,startX=0,startY=0,origX=0,origY=0;
    handle.addEventListener('pointerdown', (e) => {
      if(e.target.classList.contains('dot')) return;
      moving=true; startX=e.clientX; startY=e.clientY;
      origX=parseFloat(win.style.left)||0; origY=parseFloat(win.style.top)||0;
      win.style.zIndex=++zTop;
      handle.setPointerCapture(e.pointerId);
    });
    handle.addEventListener('pointermove', (e) => {
      if(!moving || win.classList.contains('maximized')) return;
      win.style.left = Math.max(0, Math.min(window.innerWidth - 180, origX + e.clientX - startX)) + 'px';
      win.style.top = Math.max(44, Math.min(window.innerHeight - 110, origY + e.clientY - startY)) + 'px';
    });
    handle.addEventListener('pointerup', () => moving=false);
  }

  function makeWindowResizable(win, handle){
    let resizing=false,startX=0,startY=0,origW=0,origH=0;
    handle.addEventListener('pointerdown', (e) => {
      resizing=true; startX=e.clientX; startY=e.clientY;
      origW=win.offsetWidth; origH=win.offsetHeight;
      win.style.zIndex=++zTop;
      handle.setPointerCapture(e.pointerId);
      e.preventDefault();
    });
    handle.addEventListener('pointermove', (e) => {
      if(!resizing || win.classList.contains('maximized')) return;
      win.style.width = Math.max(360, origW + e.clientX - startX) + 'px';
      win.style.height = Math.max(260, origH + e.clientY - startY) + 'px';
    });
    handle.addEventListener('pointerup', () => resizing=false);
  }

  function renderBrowser(root, url=null){
    const initial = url || startpageSearchUrl('Masive OS');
    root.innerHTML = `
      <div class="browser-search-badge">🔎 Buscador: <span class="browser-engine-name">Startpage</span></div>
      <p class="browser-search-hint">Startpage queda configurado como buscador principal. Si el iframe se queda en blanco o bloquea resultados, usa “Abrir externo”.</p>
      <div class="browser-bar">
        <input class="input browser-url" value="${escapeAttr(initial)}" placeholder="Buscar en Startpage o escribir URL..." />
        <button class="secondary browser-go">Ir</button>
        <button class="secondary browser-startpage">Buscar Startpage</button>
        <button class="secondary browser-external">Abrir externo</button>
      </div>
      <iframe class="browser-frame" src="${escapeAttr(initial)}" sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-popups-to-escape-sandbox"></iframe>
      <div class="note" style="margin-top:10px">Startpage usa la ruta oficial /sp/search?query=. Si no permite iframe en alguna carga, el bloqueo viene del servidor remoto y no del OS.</div>
    `;
    const input = $('.browser-url', root);
    const frame = $('.browser-frame', root);

    const go = () => {
      const finalUrl = normalizeBrowserInput(input.value);
      input.value = finalUrl;
      frame.src = finalUrl;
    };

    $('.browser-go', root).addEventListener('click', go);

    $('.browser-startpage', root).addEventListener('click', () => {
      let query = input.value.trim();
      if(/^https?:\/\//i.test(query)){
        try{
          const u = new URL(query);
          query = u.searchParams.get('query') || u.searchParams.get('q') || query;
        }catch{}
      }
      const finalUrl = startpageSearchUrl(query || 'Masive OS');
      input.value = finalUrl;
      frame.src = finalUrl;
    });

    input.addEventListener('keydown', e => { if(e.key === 'Enter') go(); });
    $('.browser-external', root).addEventListener('click', () => window.open(normalizeBrowserInput(input.value), '_blank', 'noopener,noreferrer'));
  }

  async function renderFiles(root){
    root.innerHTML = `
      <div class="finder-wrap">
        <aside class="finder-sidebar">
          <div class="finder-side-title">Favoritos</div>
          <button class="finder-side-item is-active" data-folder="/">🏠 Inicio</button>
          <button class="finder-side-item" data-folder="/Dashboards">📊 Dashboards</button>
          <button class="finder-side-item" data-folder="/Meteo Radio">📡 Meteo Radio</button>
          <button class="finder-side-item" data-folder="/Documentos">📄 Documentos</button>
          <button class="finder-side-item" data-folder="/Backups">💾 Backups</button>
          <div class="finder-side-title">Acciones</div>
          <button class="finder-side-item finder-new-folder">📁 Nueva carpeta</button>
          <button class="finder-side-item finder-upload-side">⬆️ Subir archivo</button>
          <button class="finder-side-item finder-backup-side">🧰 Backup OS</button>
        </aside>
        <section class="finder-main">
          <div class="finder-toolbar">
            <div class="finder-breadcrumb">
              <span>📁</span><span class="finder-path">Inicio</span>
            </div>
            <div class="finder-actions">
              <input class="input finder-search" placeholder="Buscar en archivos...">
              <button class="secondary finder-back">← Atrás</button>
              <button class="secondary finder-view-toggle">Vista: iconos</button>
              <button class="secondary finder-up">Subir</button>
              <button class="secondary finder-new-folder-top">Nueva carpeta</button>
              <button class="primary finder-upload-top">Subir archivo</button>
              <input class="finder-file-input hidden" type="file">
            </div>
          </div>
          <div class="finder-content">
            <div class="finder-grid finder-items"></div>
          </div>
        </section>
      </div>
    `;

    let currentFolder = '/';
    let folderHistory = [];
    let files = [];
    let folders = [];
    let viewMode = localStorage.getItem('masive_finder_view') || 'grid';
    let search = '';

    const fileInput = $('.finder-file-input', root);
    const itemsBox = $('.finder-items', root);
    const pathLabel = $('.finder-path', root);

    const fmtSize = n => {
      n = Number(n || 0);
      if(n < 1024) return n + ' B';
      if(n < 1024*1024) return (n/1024).toFixed(1) + ' KB';
      return (n/(1024*1024)).toFixed(2) + ' MB';
    };

    const iconForFile = (f) => {
      const name = (f.original_name || f.name || '').toLowerCase();
      const mime = f.mime_type || '';
      if(mime.startsWith('image/')) return '🖼️';
      if(mime.includes('pdf') || name.endsWith('.pdf')) return '📕';
      if(name.endsWith('.html') || name.endsWith('.htm')) return '🌐';
      if(name.endsWith('.db') || name.endsWith('.sqlite')) return '🗄️';
      if(name.endsWith('.xls') || name.endsWith('.xlsx') || name.endsWith('.csv')) return '📊';
      if(name.endsWith('.zip') || name.endsWith('.rar')) return '📦';
      if(name.endsWith('.js') || name.endsWith('.json') || name.endsWith('.css')) return '🧩';
      return '📄';
    };

    const normalizeFolder = f => {
      if(!f || f === '/') return '/';
      let out = '/' + String(f).replace(/^\/+|\/+$/g,'');
      return out === '/' ? '/' : out;
    };

    const parentFolder = f => {
      f = normalizeFolder(f);
      if(f === '/') return '/';
      const parts = f.split('/').filter(Boolean);
      parts.pop();
      return parts.length ? '/' + parts.join('/') : '/';
    };

    const friendlyPath = f => f === '/' ? 'Inicio' : 'Inicio' + f;

    const load = async () => {
      const data = await api('/api/files');
      files = Array.isArray(data) ? data : (data.files || []);
      folders = await api('/api/folders').catch(() => []);
      ensureDefaultFolders();
      render();
    };

    const ensureDefaultFolders = () => {
      const defaults = ['/Dashboards','/Meteo Radio','/Documentos','/Backups'];
      defaults.forEach(d => {
        if(!folders.some(f => f.path === d)) folders.push({id:d,path:d,name:d.split('/').pop(),parent:'/'});
      });
    };

    const setFolder = (folder, pushHistory=true) => {
      const next = normalizeFolder(folder);
      if(pushHistory && next !== currentFolder) folderHistory.push(currentFolder);
      currentFolder = next;
      $$('.finder-side-item[data-folder]', root).forEach(b => b.classList.toggle('is-active', normalizeFolder(b.dataset.folder) === currentFolder));
      render();
    };

    const goBackFolder = () => {
      const prev = folderHistory.pop();
      if(prev !== undefined) setFolder(prev, false);
    };

    const filterMatches = obj => {
      if(!search) return true;
      const q = search.toLowerCase();
      return String(obj.name || obj.original_name || '').toLowerCase().includes(q);
    };

    const render = () => {
      pathLabel.textContent = friendlyPath(currentFolder);
      $('.finder-view-toggle', root).textContent = viewMode === 'grid' ? 'Vista: iconos' : 'Vista: lista';
      const childFolders = folders
        .filter(f => normalizeFolder(f.parent || parentFolder(f.path)) === currentFolder && normalizeFolder(f.path) !== currentFolder)
        .filter(filterMatches)
        .sort((a,b) => String(a.name).localeCompare(String(b.name),'es'));
      const childFiles = files
        .filter(f => normalizeFolder(f.folder || '/') === currentFolder)
        .filter(filterMatches)
        .sort((a,b) => String(a.original_name || a.name).localeCompare(String(b.original_name || b.name),'es'));

      if(viewMode === 'list'){
        itemsBox.className = 'finder-list finder-items';
        itemsBox.innerHTML = `<div class="finder-list-row header"><div></div><div>Nombre</div><div>Tamaño</div><div>Tipo</div><div>Fecha</div></div>` +
          childFolders.map(f => `
            <div class="finder-list-row finder-row" data-kind="folder" data-id="${escapeAttr(f.id || f.path)}">
              <div class="finder-small-icon">📁</div><div class="finder-row-name">${escapeHtml(f.name)}</div><div>—</div><div>Carpeta</div><div>—</div>
            </div>
          `).join('') +
          childFiles.map(f => `
            <div class="finder-list-row finder-row" data-kind="file" data-id="${escapeAttr(f.id)}">
              <div class="finder-small-icon">${iconForFile(f)}</div><div class="finder-row-name">${escapeHtml(f.original_name || f.name)}</div><div>${fmtSize(f.size_bytes || f.size)}</div><div>${escapeHtml(f.mime_type || '')}</div><div>${escapeHtml((f.created_at || '').replace('T',' ').slice(0,16))}</div>
            </div>
          `).join('');
      }else{
        itemsBox.className = 'finder-grid finder-items';
        itemsBox.innerHTML =
          childFolders.map(f => `
            <div class="finder-item" data-kind="folder" data-id="${escapeAttr(f.id || f.path)}">
              <div class="finder-icon">📁</div><div class="finder-name">${escapeHtml(f.name)}</div><div class="finder-meta">Carpeta</div>
            </div>
          `).join('') +
          childFiles.map(f => `
            <div class="finder-item" data-kind="file" data-id="${escapeAttr(f.id)}">
              <div class="finder-icon">${iconForFile(f)}</div><div class="finder-name">${escapeHtml(f.original_name || f.name)}</div><div class="finder-meta">${fmtSize(f.size_bytes || f.size)}</div>
            </div>
          `).join('');
      }

      if(!childFolders.length && !childFiles.length){
        itemsBox.className = 'finder-empty finder-items';
        itemsBox.innerHTML = `<b>📂</b><div>No hay elementos en esta carpeta</div><div class="small">Sube archivos o crea una carpeta nueva.</div>`;
      }

      $$('.finder-row,.finder-item', root).forEach(el => {
        el.addEventListener('dblclick', () => openFinderItem(el.dataset.kind, el.dataset.id));
        el.addEventListener('click', () => {
          $$('.finder-row,.finder-item', root).forEach(x => x.classList.remove('is-selected'));
          el.classList.add('is-selected');
        });
        el.addEventListener('contextmenu', (e) => {
          e.preventDefault();
          showFinderContext(e.clientX, e.clientY, el.dataset.kind, el.dataset.id);
        });
      });
    };

    const openFinderItem = (kind, id) => {
      if(kind === 'folder'){
        const folder = folders.find(f => String(f.id || f.path) === String(id));
        if(folder) setFolder(folder.path);
        return;
      }
      const f = files.find(x => String(x.id) === String(id));
      if(!f) return;
      const url = '/api/files/download/' + encodeURIComponent(f.id);
      const name = f.original_name || f.name || 'Archivo';
      const mime = f.mime_type || '';
      if(mime.startsWith('image/') || mime.includes('pdf') || mime.includes('text') || name.toLowerCase().endsWith('.html') || name.toLowerCase().endsWith('.htm')){
        openBrowser(url, name);
      }else{
        window.open(url, '_blank');
      }
    };

    const createFolder = async () => {
      const name = prompt('Nombre de la nueva carpeta');
      if(!name) return;
      await api('/api/folders', {method:'POST', body:JSON.stringify({name, parent: currentFolder})});
      await load();
    };

    const uploadCurrent = () => fileInput.click();

    fileInput.addEventListener('change', async () => {
      const file = fileInput.files && fileInput.files[0];
      if(!file) return;
      if(file.size > 12 * 1024 * 1024){ alert('Archivo demasiado grande. Máximo 12 MB.'); return; }
      const reader = new FileReader();
      reader.onload = async () => {
        const base64 = String(reader.result || '').split(',')[1] || '';
        await api('/api/files/upload-json', {method:'POST', body:JSON.stringify({
          name: file.name,
          mime_type: file.type || 'application/octet-stream',
          size_bytes: file.size,
          folder: currentFolder,
          data_base64: base64
        })});
        fileInput.value = '';
        await load();
      };
      reader.readAsDataURL(file);
    });

    const showFinderContext = (x,y,kind,id) => {
      $$('.finder-context').forEach(m => m.remove());
      const menu = document.createElement('div');
      menu.className = 'finder-context';
      menu.style.left = Math.min(x, window.innerWidth - 220) + 'px';
      menu.style.top = Math.min(y, window.innerHeight - 220) + 'px';
      menu.innerHTML = kind === 'folder' ? `
        <button data-act="open">Abrir carpeta</button>
        <button data-act="delete" class="danger-item">Eliminar carpeta</button>
      ` : `
        <button data-act="open">Abrir</button>
        <button data-act="download">Descargar</button>
        <button data-act="dash">Crear icono dashboard</button>
        <button data-act="delete" class="danger-item">Eliminar archivo</button>
      `;
      document.body.appendChild(menu);

      const close = () => menu.remove();
      setTimeout(() => document.addEventListener('click', close, {once:true}), 0);

      menu.addEventListener('click', async (e) => {
        const act = e.target.dataset.act;
        if(!act) return;
        e.stopPropagation();

        if(act === 'open') openFinderItem(kind,id);

        if(kind === 'file' && act === 'download'){
          window.open('/api/files/download/' + encodeURIComponent(id), '_blank');
        }

        if(kind === 'file' && act === 'dash'){
          const f = files.find(x => String(x.id) === String(id));
          if(f){
            await api('/api/icons', {method:'POST', body:JSON.stringify({
              title: (f.original_name || f.name || 'Dashboard').replace(/\.(html|htm)$/i,''),
              icon: '📊',
              type: 'link',
              target: '/api/files/download/' + encodeURIComponent(f.id),
              x: 120 + Math.floor(Math.random()*360),
              y: 180 + Math.floor(Math.random()*220)
            })});
            icons = await api('/api/icons');
            renderIcons();
          }
        }

        if(act === 'delete'){
          if(kind === 'file'){
            const f = files.find(x => String(x.id) === String(id));
            if(confirm('¿Eliminar "' + (f?.original_name || f?.name || '') + '"?')){
              await api('/api/files/' + encodeURIComponent(id), {method:'DELETE'});
              await load();
            }
          }else{
            const f = folders.find(x => String(x.id || x.path) === String(id));
            if(confirm('¿Eliminar la carpeta "' + (f?.name || '') + '"? Los archivos que contenga pasarán a Inicio.')){
              await api('/api/folders/' + encodeURIComponent(f.id || f.path), {method:'DELETE'});
              await load();
            }
          }
        }

        close();
      });
    };

    $$('.finder-side-item[data-folder]', root).forEach(b => b.addEventListener('click', () => setFolder(b.dataset.folder)));
    $('.finder-back', root).addEventListener('click', goBackFolder);
    $('.finder-search', root).addEventListener('input', e => { search = e.target.value.trim(); render(); });
    $('.finder-view-toggle', root).addEventListener('click', () => { viewMode = viewMode === 'grid' ? 'list' : 'grid'; localStorage.setItem('masive_finder_view', viewMode); render(); });
    $('.finder-up', root).addEventListener('click', () => setFolder(parentFolder(currentFolder)));

  async function renderSearch(root){
    root.innerHTML = `
      <div class="search-pro-wrap">
        <div class="search-pro-head">
          <h3 style="margin:0 0 8px">Masive Search</h3>
          <p style="margin:0;color:var(--muted);font-size:13px;line-height:1.45">Buscador interno del sistema. No usa iframe ni depende de Google: busca apps, iconos, archivos, dashboards, carpetas, servicios nube y equipos de ayuda remota.</p>
          <div class="search-pro-box" style="margin-top:12px">
            <input class="input search-pro-input" placeholder="Buscar archivos, apps, dashboards, nube, equipos..." autofocus>
            <button class="primary search-run">Buscar</button>
            <button class="secondary search-web">Buscar web externo</button>
          </div>
          <div class="search-filter-row">
            <button class="search-filter is-active" data-type="all">Todo</button>
            <button class="search-filter" data-type="app">Apps</button>
            <button class="search-filter" data-type="file">Archivos</button>
            <button class="search-filter" data-type="folder">Carpetas</button>
            <button class="search-filter" data-type="cloud">Nube</button>
            <button class="search-filter" data-type="remote">Remoto</button>
          </div>
        </div>
        <div class="search-results"><div class="finder-empty"><b>🔎</b><div>Escribe para buscar dentro de Masive OS</div></div></div>
      </div>
    `;

    const input = $('.search-pro-input', root);
    const resultsBox = $('.search-results', root);
    let filter = 'all';
    let cache = {icons:[], files:[], folders:[], cloud:[], remote:[]};

    const loadCache = async () => {
      const [iconsData, filesData, foldersData, cloudData, remoteData] = await Promise.all([
        api('/api/icons').catch(() => []),
        api('/api/files').catch(() => []),
        api('/api/folders').catch(() => []),
        api('/api/cloud/accounts').catch(() => []),
        api('/api/remote/connections').catch(() => [])
      ]);
      cache = {icons:iconsData, files:filesData, folders:foldersData, cloud:cloudData, remote:remoteData};
    };

    const addResult = (arr, type, icon, title, subtitle, action, extra={}) => {
      arr.push({type, icon, title, subtitle, action, ...extra});
    };

    const getResults = (q) => {
      const query = q.trim().toLowerCase();
      const out = [];
      if(!query) return out;
      const match = (...vals) => vals.some(v => String(v || '').toLowerCase().includes(query));

      for(const i of cache.icons){
        if(match(i.title, i.target, i.type)){
          addResult(out, 'app', i.icon || '🔗', i.title || 'Icono', `${i.type || ''} · ${i.target || ''}`, () => openIcon(i));
        }
      }

      for(const f of cache.files){
        if(match(f.original_name, f.name, f.folder, f.mime_type)){
          addResult(out, 'file', '📄', f.original_name || f.name || 'Archivo', `${f.folder || '/'} · ${f.mime_type || ''}`, () => {
            const url = '/api/files/download/' + encodeURIComponent(f.id);
            if(String(f.original_name || '').toLowerCase().endsWith('.html')) openBrowser(url, f.original_name);
            else window.open(url, '_blank');
          });
        }
      }

      for(const f of cache.folders){
        if(match(f.name, f.path)){
          addResult(out, 'folder', '📁', f.name || 'Carpeta', f.path || '/', () => openModule('files'));
        }
      }

      for(const c of cache.cloud){
        if(match(c.display_name, c.provider, c.url, c.resource, c.notes)){
          addResult(out, 'cloud', '☁️', c.display_name || c.provider || 'Servicio nube', `${c.provider || ''} · ${c.url || ''}`, () => c.url ? openBrowser(c.url, c.display_name || 'Cloud') : openModule('cloud'));
        }
      }

      for(const r of cache.remote){
        if(match(r.name, r.host, r.protocol, r.notes, r.code)){
          addResult(out, 'remote', '🖥️', r.name || 'Equipo remoto', `${r.protocol || ''} · ${r.host || ''}`, () => openModule('remote'));
        }
      }

      const apps = [
        ['browser','🌐','Navegador','Abrir navegador interno'],
        ['files','📁','Archivos','Explorador tipo macOS'],
        ['dashboards','📊','Dashboards','Centro de dashboards'],
        ['cloud','☁️','Nube','Centro Cloud PRO'],
        ['meteo','📡','Meteo & Radio','EA1FJZ Observatory'],
        ['remote','🖥️','Ayuda remota','Remote Center'],
        ['writer','📝','Procesador de textos','Documentos y notas persistentes'],
        ['ftp','🧭','FTP Client','Conectar a servidores FTP'],
        ['drives','🌐','WebDAV Drives','DIGI pCloud Dropbox Google Drive OneDrive por WebDAV'],
        ['settings','⚙️','Configuración','Ajustes del sistema']
      ];
      for(const [mod, ic, title, sub] of apps){
        if(match(title, sub, mod)) addResult(out, 'app', ic, title, sub, () => openModule(mod));
      }

      return out.filter(r => filter === 'all' || r.type === filter).slice(0, 80);
    };

    const render = () => {
      const q = input.value;
      const results = getResults(q);
      if(!q.trim()){
        resultsBox.innerHTML = `<div class="finder-empty"><b>🔎</b><div>Escribe para buscar dentro de Masive OS</div></div>`;
        return;
      }
      if(!results.length){
        resultsBox.innerHTML = `<div class="finder-empty"><b>∅</b><div>No hay resultados para "${escapeHtml(q)}"</div><div class="small">Puedes usar “Buscar web externo”.</div></div>`;
        return;
      }

      const groups = {};
      results.forEach(r => (groups[r.type] ||= []).push(r));
      const labels = {app:'Apps', file:'Archivos', folder:'Carpetas', cloud:'Nube', remote:'Ayuda remota'};
      resultsBox.innerHTML = Object.entries(groups).map(([type, rows]) => `
        <div class="search-section-title">${escapeHtml(labels[type] || type)}</div>
        ${rows.map((r, idx) => `
          <div class="search-result" data-type="${escapeAttr(type)}" data-index="${idx}">
            <div class="search-result-icon">${escapeHtml(r.icon)}</div>
            <div><div class="search-result-title">${escapeHtml(r.title)}</div><div class="search-result-sub">${escapeHtml(r.subtitle)}</div></div>
            <div class="row"><button class="secondary search-open" data-global-index="${escapeAttr(results.indexOf(r))}">Abrir</button></div>
          </div>
        `).join('')}
      `).join('');

      $$('.search-open', root).forEach(btn => btn.addEventListener('click', () => {
        const r = results[Number(btn.dataset.globalIndex)];
        if(r && r.action) r.action();
      }));
      $$('.search-result', root).forEach(row => row.addEventListener('dblclick', () => {
        const btn = $('.search-open', row);
        if(btn) btn.click();
      }));
    };

    await loadCache();
    input.addEventListener('input', render);
    input.addEventListener('keydown', e => { if(e.key === 'Enter') render(); });
    $('.search-run', root).addEventListener('click', render);
    $('.search-web', root).addEventListener('click', () => {
      const q = input.value.trim();
      if(q) openBrowser(startpageSearchUrl(q), 'Buscar web: ' + q);
    });
    $$('.search-filter', root).forEach(btn => btn.addEventListener('click', () => {
      $$('.search-filter', root).forEach(b => b.classList.remove('is-active'));
      btn.classList.add('is-active');
      filter = btn.dataset.type;
      render();
    }));
    input.focus();
  }

    root.innerHTML = `
      <div class="writer-wrap">

    const list = $('.writer-doc-list', root);

    const area = $('.writer-area', root);

    const load = async () => {
      docs = await api('/api/docs').catch(() => []);
      renderList();
    };

    const renderList = () => {
      list.innerHTML = docs.length ? docs.map(d => `
        <button class="writer-doc-item ${current && current.id === d.id ? 'is-active' : ''}" data-id="${escapeAttr(d.id)}">
          <b>${escapeHtml(d.title || 'Sin título')}</b>
          <span>${escapeHtml((d.updated_at || d.created_at || '').replace('T',' ').slice(0,16))}</span>
        </button>
      `).join('') : '<div class="finder-empty"><b>📝</b><div>No hay documentos todavía</div></div>';

      $$('.writer-doc-item', root).forEach(btn => btn.addEventListener('click', async () => {
        const doc = await api('/api/docs/' + encodeURIComponent(btn.dataset.id));
        current = doc;
        title.value = doc.title || '';
        area.innerHTML = doc.html || '';
        renderList();
      }));
    };

    const newDoc = () => {
      current = null;
      title.value = 'Nuevo documento';
      area.innerHTML = '';
      area.focus();
      renderList();
    };

    const save = async () => {
      const payload = { title: title.value || 'Sin título', html: area.innerHTML };
      if(current && current.id){
        current = await api('/api/docs/' + encodeURIComponent(current.id), {method:'PUT', body:JSON.stringify(payload)});
      }else{
        current = await api('/api/docs', {method:'POST', body:JSON.stringify(payload)});
      }
      await load();
    };

    $('.writer-new', root).addEventListener('click', newDoc);
    $('.writer-refresh', root).addEventListener('click', load);
    $('.writer-save', root).addEventListener('click', save);
    $('.writer-bold', root).addEventListener('click', () => document.execCommand('bold'));
    $('.writer-italic', root).addEventListener('click', () => document.execCommand('italic'));
    $('.writer-ul', root).addEventListener('click', () => document.execCommand('insertUnorderedList'));
    $('.writer-h2', root).addEventListener('click', () => document.execCommand('formatBlock', false, 'h2'));
    $('.writer-download', root).addEventListener('click', () => {
      const full = `<!doctype html><html><head><meta charset="utf-8"><title>${escapeHtml(title.value || 'documento')}</title></head><body>${area.innerHTML}</body></html>`;
      downloadText((title.value || 'documento').replace(/[^\w\-]+/g,'_') + '.html', full);
    });
    $('.writer-delete', root).addEventListener('click', async () => {
      if(!current || !current.id){ newDoc(); return; }
      if(!confirm('¿Borrar este documento?')) return;
      await api('/api/docs/' + encodeURIComponent(current.id), {method:'DELETE'});
      current = null;
      title.value = '';
      area.innerHTML = '';
      await load();
    });

    await load();
    if(docs[0]){
      current = await api('/api/docs/' + encodeURIComponent(docs[0].id));
      title.value = current.title || '';
      area.innerHTML = current.html || '';
      renderList();
    }else{
      newDoc();
    }
  }

  async function renderFtp(root){

          </div>
          <div class="field"><label>Directorio inicial</label><input class="input ftp-initial" value="/"></div>
          <div class="row">
            <button class="primary ftp-save">Guardar</button>
            <button class="secondary ftp-connect">Conectar</button>
            <button class="secondary ftp-clear">Limpiar</button>
          </div>
          <div class="ftp-status ftp-msg">Preparado.</div>

          <h3 style="margin:16px 0 8px">Servidores guardados</h3>
          <div class="ftp-accounts"></div>
        </aside>

        <section class="ftp-browser">
          <div class="ftp-toolbar">
            <div class="ftp-path">/</div>

              <button class="secondary ftp-up">← Atrás</button>
              <button class="secondary ftp-mkdir">Nueva carpeta</button>
              <button class="primary ftp-upload">Subir archivo</button>
              <input class="hidden ftp-upload-input" type="file">
              <button class="secondary ftp-refresh">Actualizar</button>
            </div>
          </div>
          <div class="ftp-list"><div class="finder-empty"><b>🧭</b><div>Conecta con un servidor FTP</div></div></div>
        </section>
      </div>
    `;

    let accounts = [];
    let currentAccount = null;
    let currentPath = '/';
    let history = [];

    const form = {
      id: $('.ftp-id', root),
      name: $('.ftp-name', root),
      host: $('.ftp-host', root),
      port: $('.ftp-port', root),
      user: $('.ftp-user', root),
      pass: $('.ftp-pass', root),
      initial: $('.ftp-initial', root),
      msg: $('.ftp-msg', root)
    };

    const setMsg = (t) => form.msg.textContent = t;
    const payload = () => ({
      name: form.name.value || form.host.value || 'Servidor FTP',
      host: form.host.value,
      port: Number(form.port.value || 21),
      username: form.user.value || 'anonymous',
      password: form.pass.value || '',
      initial_path: form.initial.value || '/'
    });

    const fill = (a) => {
      form.id.value = a.id || '';
      form.name.value = a.name || '';
      form.host.value = a.host || '';
      form.port.value = a.port || 21;
      form.user.value = a.username || '';
      form.pass.value = a.password || '';
      form.initial.value = a.initial_path || '/';
    };

    const loadAccounts = async () => {
      accounts = await api('/api/ftp/accounts').catch(() => []);
      $('.ftp-accounts', root).innerHTML = accounts.length ? accounts.map(a => `
        <div class="writer-doc-item" data-id="${escapeAttr(a.id)}">
          <b>🧭 ${escapeHtml(a.name || a.host)}</b>
          <span>${escapeHtml(a.host || '')}:${escapeHtml(a.port || 21)}</span>

      `).join('') : '<div class="note">No hay servidores FTP guardados.</div>';
      $$('.ftp-accounts .writer-doc-item', root).forEach(btn => btn.addEventListener('click', () => {

      }));
    };

    const saveAccount = async () => {
      const data = payload();
      if(!data.host){ setMsg('Introduce el host FTP.'); return; }
      if(form.id.value){
        currentAccount = await api('/api/ftp/accounts/' + encodeURIComponent(form.id.value), {method:'PUT', body:JSON.stringify(data)});
      }else{
        currentAccount = await api('/api/ftp/accounts', {method:'POST', body:JSON.stringify(data)});
      }
      fill(currentAccount);
      await loadAccounts();
      setMsg('Servidor guardado.');

    const clearForm = () => {
      form.id.value = '';
      form.name.value = '';
      form.host.value = '';
      form.port.value = '21';

      form.pass.value = '';
      form.initial.value = '/';
      currentAccount = null;
      currentPath = '/';
      history = [];
    };

    const listPath = async (pathValue=currentPath, push=true) => {
      if(!currentAccount && !form.host.value){ setMsg('Selecciona o configura un servidor FTP.'); return; }
      if(!currentAccount){
        await saveAccount();
      }
      if(push && pathValue !== currentPath) history.push(currentPath);
      currentPath = pathValue || '/';
      $('.ftp-path', root).textContent = currentPath;
      setMsg('Conectando y listando ' + currentPath + ' ...');
      const data = await api('/api/ftp/list', {method:'POST', body:JSON.stringify({account_id: currentAccount.id, path: currentPath})});
      renderList(data.items || []);
      setMsg('Listado cargado.');
    };

      $('.ftp-list', root).innerHTML = `
        <div class="ftp-row header"><div></div><div>Nombre</div><div>Tamaño</div><div>Tipo</div><div>Acción</div></div>

          <div class="ftp-row" data-name="${escapeAttr(it.name)}" data-type="${escapeAttr(it.type)}">
            <div style="font-size:24px">${it.type === 'dir' ? '📁' : '📄'}</div>
            <div class="ftp-name">${escapeHtml(it.name)}</div>
            <div>${escapeHtml(String(it.size || ''))}</div>
            <div>${escapeHtml(it.type || '')}</div>
            <div class="row">
              ${it.type === 'dir' ? '<button class="secondary ftp-open-dir">Abrir</button>' : '<button class="secondary ftp-download">Descargar</button>'}
              <button class="danger ftp-delete">Borrar</button>
            </div>
          </div>
        `).join('')}
      `;
      $$('.ftp-open-dir', root).forEach(btn => btn.addEventListener('click', () => {

      }));
      $$('.ftp-download', root).forEach(btn => btn.addEventListener('click', async () => {
        const name = btn.closest('.ftp-row').dataset.name;
        const remotePath = currentPath.replace(/\/$/,'') + '/' + name;
        window.open('/api/ftp/download?account_id=' + encodeURIComponent(currentAccount.id) + '&path=' + encodeURIComponent(remotePath), '_blank');
      }));
      $$('.ftp-delete', root).forEach(btn => btn.addEventListener('click', async () => {
        const row = btn.closest('.ftp-row');
        const name = row.dataset.name;
        const type = row.dataset.type;
        if(!confirm('¿Borrar "' + name + '" del FTP?')) return;
        const remotePath = currentPath.replace(/\/$/,'') + '/' + name;
        await api('/api/ftp/delete', {method:'POST', body:JSON.stringify({account_id: currentAccount.id, path: remotePath, type})});
        await listPath(currentPath, false);
      }));
    };

    $('.ftp-save', root).addEventListener('click', () => saveAccount().catch(err => setMsg(err.message)));

      if(/\.(zip|rar|7z)$/i.test(n)) return '📦';
      return '📄';
    };
    const fmtSize = n => { n = Number(n || 0); if(!n) return ''; if(n < 1024) return n + ' B'; if(n < 1024*1024) return (n/1024).toFixed(1) + ' KB'; return (n/(1024*1024)).toFixed(2) + ' MB'; };
    const clearForm = () => { form.id.value=''; form.provider.value='dropbox'; form.name.value=''; form.token.value=''; form.region.value='eu'; form.root.value='/'; form.mode.value='rw'; };
    const fillPreset = (provider) => {
      clearForm(); form.provider.value = provider;
      form.name.value = ({dropbox:'Dropbox Jordi',pcloud:'pCloud Jordi',googledrive:'Google Drive Jordi',onedrive:'OneDrive Jordi'}[provider] || 'Nube');
      setMsg(provider === 'googledrive' || provider === 'onedrive' ? 'Preparado para OAuth/token. La integración completa requiere credenciales OAuth.' : 'Pega un token válido para listar archivos.');
    };
    const loadAccounts = async () => {
      accounts = await api('/api/cloud-drive/accounts').catch(() => []);
      $('.drive-accounts', root).innerHTML = accounts.length ? accounts.map(a => `
        <button class="drive-account ${active && active.id === a.id ? 'is-active' : ''}" data-id="${escapeAttr(a.id)}">
          <b>${providerIcon(a.provider)} ${escapeHtml(a.name || a.provider)}</b>
          <span>${escapeHtml(a.provider)} · ${escapeHtml(a.mode || 'rw')} · ${escapeHtml(a.root || '/')}</span>
        </button>`).join('') : '<div class="note">No hay nubes configuradas todavía.</div>';
      $$('.drive-account', root).forEach(btn => btn.addEventListener('click', async () => {
        active = accounts.find(a => a.id === btn.dataset.id); currentPath = active.root || '/'; history = []; await listDrive(false); loadAccounts();
      }));
    };
    const saveAccount = async () => {
      const payload = {provider:form.provider.value,name:form.name.value||form.provider.value,token:form.token.value,region:form.region.value,root:form.root.value||'/',mode:form.mode.value};
      if(!payload.token){ setMsg('Introduce un token para poder conectar.'); return; }
      if(form.id.value) active = await api('/api/cloud-drive/accounts/' + encodeURIComponent(form.id.value), {method:'PUT', body:JSON.stringify(payload)});
      else active = await api('/api/cloud-drive/accounts', {method:'POST', body:JSON.stringify(payload)});
      currentPath = active.root || '/'; await loadAccounts(); setMsg('Nube guardada.');
    };
    const renderItems = () => {
      $('.drive-path', root).textContent = active ? `${active.name || active.provider}: ${currentPath}` : 'Selecciona una nube';
      const box = $('.drive-content', root);
      if(!items.length){ box.innerHTML = '<div class="finder-empty"><b>📂</b><div>Carpeta vacía o sin acceso</div></div>'; return; }
      box.innerHTML = `<div class="drive-grid">` + items.map((it, idx) => `
        <div class="drive-item" data-index="${idx}">
          <div class="drive-ico">${fileIcon(it)}</div><div class="drive-name">${escapeHtml(it.name || '')}</div><div class="drive-meta">${escapeHtml(it.type || '')} ${escapeHtml(fmtSize(it.size))}</div>
        </div>`).join('') + '</div>';
      $$('.drive-item', root).forEach(el => {
        el.addEventListener('click', () => { $$('.drive-item', root).forEach(x => x.classList.remove('is-selected')); el.classList.add('is-selected'); selected = items[Number(el.dataset.index)]; renderPreview(selected); });
        el.addEventListener('dblclick', async () => { const it = items[Number(el.dataset.index)]; if(it.type === 'folder'){ history.push(currentPath); currentPath = it.path || it.id || it.name; await listDrive(false); } else await openDriveFile(it); });
      });
    };
    const listDrive = async () => {
      if(!active){ setMsg('Selecciona una nube.'); return; }
      setMsg('Listando archivos...');
      const data = await api('/api/cloud-drive/list', {method:'POST', body:JSON.stringify({account_id: active.id, path: currentPath})});
      items = data.items || []; renderItems(); renderPreview(null); setMsg('Listado cargado.');
    };
    const renderPreview = (it) => {
      const pane = $('.drive-preview-body', root);
      if(!it){ pane.innerHTML = '<div class="finder-empty"><b>👁️</b><div>Selecciona un archivo</div></div>'; return; }
      if(it.type === 'folder'){ pane.innerHTML = `<div class="finder-empty"><b>📁</b><div>${escapeHtml(it.name)}</div><div>Haz doble clic para abrir.</div></div>`; return; }
      const dl = `/api/cloud-drive/download?account_id=${encodeURIComponent(active.id)}&id=${encodeURIComponent(it.id || '')}&path=${encodeURIComponent(it.path || '')}`;
      const n = (it.name || '').toLowerCase();
      if(/\.(png|jpe?g|gif|webp|svg)$/i.test(n)) pane.innerHTML = `<h3>${escapeHtml(it.name)}</h3><img class="drive-preview-img" src="${dl}"><div class="row" style="margin-top:12px"><a class="secondary" href="${dl}" target="_blank">Descargar</a></div>`;
      else if(n.endsWith('.pdf') || /\.(txt|csv|json|log|md)$/i.test(n)) pane.innerHTML = `<h3>${escapeHtml(it.name)}</h3><iframe class="drive-preview-frame" src="${dl}"></iframe><div class="row" style="margin-top:12px"><a class="secondary" href="${dl}" target="_blank">Descargar</a></div>`;
      else pane.innerHTML = `<div class="finder-empty"><b>${fileIcon(it)}</b><div>${escapeHtml(it.name)}</div><div>Vista previa interna no disponible todavía.</div><div class="row" style="margin-top:12px"><a class="secondary" href="${dl}" target="_blank">Descargar</a></div></div>`;
    };
    const openDriveFile = async (it) => {
      const dl = `/api/cloud-drive/download?account_id=${encodeURIComponent(active.id)}&id=${encodeURIComponent(it.id || '')}&path=${encodeURIComponent(it.path || '')}`;
      if(/\.(png|jpe?g|gif|webp|svg|pdf|txt|csv|json|log|md)$/i.test(it.name || '')) openBrowser(dl, it.name);
      else window.open(dl, '_blank');
    };
    $$('.drive-provider', root).forEach(btn => btn.addEventListener('click', () => fillPreset(btn.dataset.provider)));
    $('.drive-dropbox-oauth', root).addEventListener('click', async () => {
      try{
        setMsg('Preparando conexión Dropbox...');
        const r = await api('/api/oauth/dropbox/start', {method:'POST'});
        if(r && r.url) window.location.href = r.url;
        else setMsg('No se recibió URL OAuth.');
      }catch(err){
        setMsg(err.message);
      }
    });
    $('.drive-dropbox-help', root).addEventListener('click', () => {
      alert('Para activar Dropbox OAuth:\n\n1) En Dropbox Developers crea una App.\n2) Activa permisos files.metadata.read, files.content.read, files.content.write.\n3) Añade Redirect URI:\n' + location.origin + '/api/oauth/dropbox/callback\n\n4) En Render añade variables:\nDROPBOX_CLIENT_ID\nDROPBOX_CLIENT_SECRET\n\nLuego haz Clear build cache & deploy.');
    });
    $('.drive-save', root).addEventListener('click', () => saveAccount().catch(err => setMsg(err.message)));
    $('.drive-clear', root).addEventListener('click', clearForm);
    $('.drive-refresh', root).addEventListener('click', () => listDrive().catch(err => setMsg(err.message)));
    $('.drive-back', root).addEventListener('click', async () => { const prev = history.pop(); if(prev !== undefined){ currentPath = prev; await listDrive(); } });
    $('.drive-mkdir', root).addEventListener('click', async () => { if(!active){ setMsg('Selecciona una nube.'); return; } const name = prompt('Nombre de la carpeta'); if(!name) return; await api('/api/cloud-drive/mkdir', {method:'POST', body:JSON.stringify({account_id: active.id, path: currentPath, name})}); await listDrive(); });
    $('.drive-upload', root).addEventListener('click', () => $('.drive-upload-input', root).click());
    $('.drive-upload-input', root).addEventListener('change', async (e) => {
      const file = e.target.files && e.target.files[0]; if(!file || !active) return;
      if(file.size > 12 * 1024 * 1024){ setMsg('Máximo 12 MB por archivo en esta versión.'); return; }
      const reader = new FileReader();
      reader.onload = async () => { const base64 = String(reader.result || '').split(',')[1] || ''; await api('/api/cloud-drive/upload', {method:'POST', body:JSON.stringify({account_id: active.id, path: currentPath, name: file.name, data_base64: base64})}); e.target.value = ''; await listDrive(); };
      reader.readAsDataURL(file);
    });
    await loadAccounts();
  }

    const form = {

      url: $('.cloud-url', root),

    const clearForm = () => {

        form.notes.value = 'Servicio desplegado en Render con disco persistente /var/data.';
      }
      if(provider === 'OneDrive' || provider === 'SharePoint'){
        form.name.value = provider + ' compartido';
        form.notes.value = 'Pegar aquí la URL de la carpeta compartida.';
      }
      if(provider === 'Custom API'){
        form.name.value = 'API interna';
        form.notes.value = 'Endpoint para probar conexión HTTP desde el servidor.';

    $$('.cloud-preset', root).forEach(b => b.addEventListener('click', () => fillPreset(b.dataset.provider)));

    $('.cloud-token-eye', root).addEventListener('click', () => { form.token.type = form.token.type === 'password' ? 'text' : 'password'; });

    const load = async () => {
      const rows = await api('/api/cloud/accounts');
      $('.cloud-body', root).innerHTML = rows.length ? rows.map(r => {
        const status = r.last_test && r.last_test.ok ? 'ok' : (r.last_test ? 'bad' : '');

        }catch(err){ setMsg(form.msg, err.message, 'bad'); }
      }));

      $$('.cloud-delete', root).forEach(btn => btn.addEventListener('click', async () => {
        const item = rows.find(x => x.id === btn.dataset.id);
        if(!confirm('¿Eliminar el servicio "' + (item?.display_name || '') + '"?')) return;

          display_name: form.name.value || 'Servicio cloud',

          resource: form.resource.value,

      }catch(err){ setMsg(form.msg, err.message, 'bad'); }
    });

    await load();
  }

      utcClock.textContent = d.toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit',second:'2-digit',timeZone:'UTC'});

    };
    updateClocks();
    const timer = setInterval(updateClocks, 1000);
    root.dataset.clockTimer = String(timer);

    $('.meteo-create-icons', root).addEventListener('click', async () => {
      const items = [

        }

        form.name.value = 'Quick Assist manual';

    const connectionUrl = (r) => {
      if(!r) return '';
      const url = r.url || r.web_url || '';
      if(url) {
        if(r.protocol === 'rustdesk' && r.host && url.includes('{id}')) return url.replace('{id}', encodeURIComponent(r.host));
        if(r.protocol === 'guacamole' && r.host && url.includes('{host}')) return url.replace('{host}', encodeURIComponent(r.host));
        return url;
      }
      if(r.protocol === 'rustdesk' && r.host) return 'https://rustdesk.com/web/';
      if(r.protocol === 'guacamole') return r.host ? 'http://' + r.host : '';
      return '';
    };

    const selectConnection = (r) => {
      selected = r;
      const url = connectionUrl(r);
      $('.remote-selected-box', root).innerHTML = `
        <div class="remote-status-pill">${escapeHtml(r.protocol || 'remote')}</div>
        <div style="margin-top:12px">

      `).join('') : '<tr><td colspan="5">No hay conexiones remotas guardadas.</td></tr>';

      $$('.remote-select', root).forEach(btn => btn.addEventListener('click', () => {

      $$('.remote-connect', root).forEach(btn => btn.addEventListener('click', () => {

      $$('.remote-edit', root).forEach(btn => btn.addEventListener('click', () => {
        const r = rowsCache.find(x => x.id === btn.dataset.id);

        form.id.value = r.id;
        form.title.textContent = 'Editar conexión remota';
        form.name.value = r.name || '';
        form.protocol.value = r.protocol || 'rustdesk';
        form.host.value = r.host || '';
        form.port.value = r.port || '';
        form.url.value = r.url || '';
        form.username.value = r.username || '';
        form.password.value = r.password || '';
        form.notes.value = r.notes || '';
      }));

        await load();
      }));
    };

    const connectSelected = (external=false) => {
      const msg = $('.remote-selected-msg', root);
      if(!selected){ setMsg(msg, 'Selecciona una conexión primero.', 'bad'); return; }
      const url = connectionUrl(selected);
      if(!url){ setMsg(msg, 'Esta conexión no tiene URL web configurada.', 'bad'); return; }
      if(external) window.open(url, '_blank', 'noopener,noreferrer');
      else openBrowser(url, selected.name || 'Conexión remota');
      setMsg(msg, 'Abriendo conexión remota.', 'ok');
    };

    $$('.remote-preset', root).forEach(btn => btn.addEventListener('click', () => applyPreset(btn.dataset.mode)));
    $('.remote-clear', root).addEventListener('click', clear);

    $('.remote-save', root).addEventListener('click', async () => {
      const payload = {
        name: form.name.value || 'Conexión remota',
        protocol: form.protocol.value,
        host: form.host.value,
        port: form.port.value,
        url: form.url.value,
        username: form.username.value,
        password: form.password.value,
        notes: form.notes.value,
        enabled: true
      };
      try{
        if(form.id.value){
          await api('/api/remote/connections/' + encodeURIComponent(form.id.value), {method:'PUT', body:JSON.stringify(payload)});
          setMsg(form.msg, 'Conexión actualizada.', 'ok');
        }else{
          await api('/api/remote/connections', {method:'POST', body:JSON.stringify(payload)});
          setMsg(form.msg, 'Conexión guardada.', 'ok');
        }
        clear();
        await load();
      }catch(err){ setMsg(form.msg, err.message, 'bad'); }
    });

    $('.remote-test-url', root).addEventListener('click', async () => {
      const url = form.url.value.trim();
      if(!url){ setMsg(form.msg, 'Introduce una URL para probar.', 'bad'); return; }
      setMsg(form.msg, 'Probando URL…');
      try{
        const result = await api('/api/cloud/test-url', {method:'POST', body:JSON.stringify({url})});
        setMsg(form.msg, result.ok ? 'URL accesible desde el servidor.' : 'No responde correctamente: ' + (result.status || result.error), result.ok ? 'ok' : 'bad');
      }catch(err){ setMsg(form.msg, err.message, 'bad'); }
    });

    $('.remote-connect-selected', root).addEventListener('click', () => connectSelected(false));
    $('.remote-open-selected', root).addEventListener('click', () => connectSelected(true));
    $('.remote-copy-selected', root).addEventListener('click', async () => {
      const msg = $('.remote-selected-msg', root);
      if(!selected){ setMsg(msg, 'Selecciona una conexión primero.', 'bad'); return; }
      const text = `Conexión remota: ${selected.name || ''}\nTipo: ${selected.protocol || ''}\nID/Host: ${selected.host || ''}\nURL: ${connectionUrl(selected)}\nUsuario: ${selected.username || ''}\nNotas: ${selected.notes || ''}`;
      await navigator.clipboard.writeText(text).catch(() => {});
      setMsg(msg, 'Datos copiados.', 'ok');
    });

    $('.qa-copy-steps', root).addEventListener('click', async () => {
      const text = 'Quick Assist manual: en Windows pulsa Ctrl + Win + Q. El asistente genera el código y el usuario acepta compartir pantalla/control.';
      await navigator.clipboard.writeText(text).catch(() => {});
      setMsg($('.qa-msg', root), 'Instrucciones copiadas.', 'ok');
    });

    $('.qa-download-bat', root).addEventListener('click', () => {
      const bat = '@echo off\r\nstart ms-quick-assist:\r\n';
      downloadText('abrir_asistencia_rapida_windows.bat', bat);
    });

    await load();
  }
