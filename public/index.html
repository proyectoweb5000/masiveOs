<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Masive OS</title>
  <style>
    :root{
      --bg0:#060814;
      --bg1:#111827;
      --glass:rgba(18,25,45,.62);
      --glass2:rgba(255,255,255,.10);
      --line:rgba(255,255,255,.18);
      --line2:rgba(255,255,255,.28);
      --txt:#f8fafc;
      --muted:#b8c0d4;
      --blue:#5aa7ff;
      --violet:#8b5cf6;
      --ok:#34d399;
      --bad:#fb7185;
      --warn:#fbbf24;
      --shadow:0 24px 70px rgba(0,0,0,.42);
      --radius:24px;
      --topbar:42px;
      --dock:86px;
    }
    *{box-sizing:border-box}
    html,body{margin:0;width:100%;height:100%;overflow:hidden;font-family:Inter,Segoe UI,Arial,sans-serif;color:var(--txt);background:#050713}
    body{
      background:
        radial-gradient(circle at 18% 10%,rgba(112,55,255,.42),transparent 32%),
        radial-gradient(circle at 82% 18%,rgba(29,124,255,.34),transparent 28%),
        radial-gradient(circle at 62% 84%,rgba(14,165,233,.28),transparent 34%),
        linear-gradient(135deg,#070916,#111827 55%,#0b1020);
    }
    body.custom-wallpaper{
      background-size:cover;
      background-position:center;
      background-repeat:no-repeat;
    }
    button,input,select,textarea{font:inherit}
    button{cursor:pointer}
    .hidden{display:none!important}

    .login-screen{
      position:fixed;inset:0;z-index:10000;display:flex;align-items:center;justify-content:center;padding:24px;
      background:
        radial-gradient(circle at 30% 20%,rgba(139,92,246,.35),transparent 35%),
        radial-gradient(circle at 72% 72%,rgba(14,165,233,.28),transparent 34%),
        linear-gradient(135deg,#050713,#111827);
    }
    .login-card{
      width:min(440px,calc(100% - 20px));
      border:1px solid var(--line);
      border-radius:32px;
      background:rgba(15,23,42,.64);
      backdrop-filter:blur(24px);
      box-shadow:var(--shadow);
      padding:30px;
    }
    .login-logo{
      width:74px;height:74px;border-radius:24px;margin:0 auto 16px;
      display:flex;align-items:center;justify-content:center;
      background:linear-gradient(135deg,rgba(90,167,255,.95),rgba(139,92,246,.95));
      box-shadow:0 16px 40px rgba(79,70,229,.35);
      font-size:36px;
    }
    .login-card h1{text-align:center;margin:0 0 6px;font-size:30px;letter-spacing:.2px}
    .login-card p{text-align:center;margin:0 0 22px;color:var(--muted);font-size:14px;line-height:1.45}
    .field{display:grid;gap:7px;margin:0 0 14px}
    .field label{font-size:12px;color:var(--muted);font-weight:800;text-transform:uppercase;letter-spacing:.08em}
    .input{
      width:100%;border:1px solid var(--line);border-radius:16px;padding:13px 14px;background:rgba(255,255,255,.08);
      color:#fff;outline:none;
    }
    .input:focus{border-color:rgba(90,167,255,.72);box-shadow:0 0 0 4px rgba(90,167,255,.12)}
    .primary{
      border:0;border-radius:16px;background:linear-gradient(135deg,#60a5fa,#7c3aed);color:#fff;
      padding:12px 16px;font-weight:900;box-shadow:0 12px 28px rgba(79,70,229,.28);
    }
    .secondary{
      border:1px solid var(--line);border-radius:14px;background:rgba(255,255,255,.09);color:#fff;padding:10px 13px;font-weight:800;
    }
    .danger{
      border:1px solid rgba(251,113,133,.45);border-radius:14px;background:rgba(251,113,133,.16);color:#fecdd3;padding:10px 13px;font-weight:900;
    }
    .msg{min-height:18px;font-size:13px;color:var(--muted);margin-top:10px}
    .msg.bad{color:#fecdd3}.msg.ok{color:#bbf7d0}

    .topbar{
      position:fixed;left:0;right:0;top:0;height:var(--topbar);z-index:5000;
      display:flex;align-items:center;justify-content:space-between;gap:14px;padding:0 14px;
      background:rgba(5,8,22,.54);backdrop-filter:blur(20px);border-bottom:1px solid rgba(255,255,255,.12);
      user-select:none;
    }
    .brand{display:flex;align-items:center;gap:10px;font-weight:950}
    .brand-badge{
      width:24px;height:24px;border-radius:9px;background:linear-gradient(135deg,#60a5fa,#7c3aed);
      display:flex;align-items:center;justify-content:center;font-size:13px;box-shadow:0 8px 22px rgba(96,165,250,.18)
    }
    .top-center{display:flex;align-items:center;gap:8px;color:var(--muted);font-size:12px;min-width:0}
    .top-pill{border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.08);padding:5px 9px;border-radius:999px;white-space:nowrap}
    .top-actions{display:flex;align-items:center;gap:8px}
    .top-btn{
      width:auto;border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.08);color:#fff;border-radius:12px;
      padding:6px 10px;font-weight:800;font-size:12px
    }

    .desktop{
      position:fixed;left:0;right:0;top:var(--topbar);bottom:0;z-index:1;overflow:hidden;
      padding:22px 22px calc(var(--dock) + 22px);
    }
    .icon{
      position:absolute;width:92px;height:98px;border:1px solid transparent;border-radius:22px;
      display:flex;flex-direction:column;align-items:center;justify-content:flex-start;gap:8px;padding:10px 6px;
      color:#fff;text-align:center;user-select:none;
    }
    .icon:hover,.icon.is-selected{background:rgba(255,255,255,.10);border-color:rgba(255,255,255,.16);backdrop-filter:blur(8px)}
    .icon-symbol{
      width:54px;height:54px;border-radius:20px;background:rgba(255,255,255,.13);
      border:1px solid rgba(255,255,255,.18);display:flex;align-items:center;justify-content:center;font-size:30px;
      box-shadow:0 10px 24px rgba(0,0,0,.18)
    }
    .icon-title{
      max-width:84px;line-height:1.15;font-size:12px;font-weight:800;text-shadow:0 2px 8px rgba(0,0,0,.55);
      overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;
    }

    .dock{
      position:fixed;left:50%;bottom:14px;transform:translateX(-50%);height:72px;z-index:4800;
      display:flex;align-items:center;gap:10px;padding:10px 14px;border:1px solid rgba(255,255,255,.18);
      border-radius:25px;background:rgba(10,15,30,.52);backdrop-filter:blur(26px);box-shadow:var(--shadow);
      max-width:calc(100vw - 28px);overflow:auto;
    }
    .dock-btn{
      width:50px;height:50px;min-width:50px;border-radius:18px;border:1px solid rgba(255,255,255,.18);
      display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.10);color:#fff;font-size:25px;
      position:relative;
    }
    .dock-btn.running::after{
      content:'';position:absolute;bottom:4px;left:50%;transform:translateX(-50%);width:5px;height:5px;border-radius:999px;background:#fff;
    }

    .window{
      position:absolute;left:170px;top:90px;width:860px;height:560px;z-index:100;background:rgba(15,23,42,.72);
      border:1px solid rgba(255,255,255,.17);border-radius:22px;backdrop-filter:blur(22px);box-shadow:var(--shadow);
      overflow:hidden;display:flex;flex-direction:column;min-width:360px;min-height:260px;
    }
    .window.maximized{left:10px!important;top:52px!important;width:calc(100vw - 20px)!important;height:calc(100vh - 62px)!important;border-radius:18px}
    .window.minimized{display:none}
    .titlebar{
      height:46px;display:flex;align-items:center;justify-content:space-between;gap:12px;padding:0 12px;
      border-bottom:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.06);user-select:none;cursor:move;
      flex:0 0 auto;
    }
    .traffic{display:flex;gap:7px;align-items:center}
    .dot{width:13px;height:13px;border-radius:999px;border:0;padding:0}
    .close{background:#ff5f57}.min{background:#ffbd2e}.max{background:#28c840}
    .win-title{font-size:13px;font-weight:950;display:flex;gap:8px;align-items:center;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .win-body{flex:1;overflow:auto;padding:16px;background:rgba(2,6,23,.08)}
    .resize-handle{position:absolute;right:0;bottom:0;width:18px;height:18px;cursor:nwse-resize}
    .resize-handle::after{content:'⇲';position:absolute;right:3px;bottom:1px;color:rgba(255,255,255,.45);font-size:13px}

    .panel-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px}
    .card{
      border:1px solid rgba(255,255,255,.13);border-radius:18px;background:rgba(255,255,255,.08);padding:14px;
    }
    .card h3{margin:0 0 8px;font-size:16px}
    .card p{margin:0;color:var(--muted);font-size:13px;line-height:1.45}
    .row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
    .grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .table{width:100%;border-collapse:collapse}
    .table th,.table td{border-bottom:1px solid rgba(255,255,255,.10);padding:9px;text-align:left;font-size:13px;vertical-align:middle}
    .table th{color:#dbeafe;background:rgba(255,255,255,.06);position:sticky;top:0}
    .table button{padding:7px 9px;border-radius:10px;font-size:12px}
    .browser-bar{display:grid;grid-template-columns:1fr auto auto;gap:8px;margin-bottom:10px}
    iframe.browser-frame{width:100%;height:calc(100% - 52px);border:1px solid rgba(255,255,255,.14);border-radius:16px;background:#fff}
    .note{border-left:4px solid var(--blue);padding:10px 12px;border-radius:14px;background:rgba(96,165,250,.11);color:#dbeafe;font-size:13px;line-height:1.45}
    .status-ok{color:#bbf7d0}.status-bad{color:#fecdd3}
    .form-actions{display:flex;justify-content:flex-end;gap:10px;margin-top:14px}
    .modal-backdrop{
      position:fixed;inset:0;z-index:9000;background:rgba(2,6,23,.45);display:flex;align-items:center;justify-content:center;padding:20px;
    }
    .modal{
      width:min(620px,calc(100vw - 30px));max-height:90vh;overflow:auto;border:1px solid rgba(255,255,255,.18);
      border-radius:24px;background:rgba(15,23,42,.86);backdrop-filter:blur(24px);box-shadow:var(--shadow);padding:18px;
    }
    .modal h2{margin:0 0 6px;font-size:22px}
    .modal p{margin:0 0 14px;color:var(--muted);font-size:13px;line-height:1.45}
    .kv{display:grid;grid-template-columns:170px 1fr;gap:8px;font-size:13px;color:var(--muted)}
    .kv b{color:#fff}

    /* ===== MASIVE OS THEME - Glassmorphism oscuro tipo Proton/Brave ===== */
    body.theme-massive{
      background:
        radial-gradient(circle at 15% 14%,rgba(126,34,206,.50),transparent 31%),
        radial-gradient(circle at 80% 16%,rgba(37,99,235,.38),transparent 30%),
        radial-gradient(circle at 52% 88%,rgba(14,165,233,.28),transparent 34%),
        linear-gradient(135deg,#070713,#111827 52%,#0b1020) !important;
    }
    body.theme-aurora{
      background:
        radial-gradient(circle at 22% 16%,rgba(16,185,129,.34),transparent 30%),
        radial-gradient(circle at 76% 20%,rgba(59,130,246,.36),transparent 31%),
        radial-gradient(circle at 55% 86%,rgba(168,85,247,.30),transparent 36%),
        linear-gradient(135deg,#031315,#07162b 50%,#150b25) !important;
    }
    body.theme-midnight{
      background:
        radial-gradient(circle at 72% 16%,rgba(30,64,175,.40),transparent 34%),
        radial-gradient(circle at 25% 78%,rgba(15,23,42,.78),transparent 36%),
        linear-gradient(135deg,#020617,#0f172a 58%,#111827) !important;
    }
    body.theme-light{
      --txt:#0f172a;
      --muted:#475569;
      --glass:rgba(255,255,255,.72);
      --glass2:rgba(255,255,255,.88);
      --line:rgba(15,23,42,.15);
      --line2:rgba(15,23,42,.22);
      background:
        radial-gradient(circle at 18% 18%,rgba(59,130,246,.20),transparent 32%),
        radial-gradient(circle at 78% 20%,rgba(139,92,246,.16),transparent 30%),
        linear-gradient(135deg,#f8fbff,#eaf2ff 52%,#eef2ff) !important;
      color:#0f172a;
    }
    body.theme-light .topbar,
    body.theme-light .dock,
    body.theme-light .window,
    body.theme-light .modal,
    body.theme-light .login-card{
      background:rgba(255,255,255,.72);
      color:#0f172a;
      border-color:rgba(15,23,42,.12);
    }
    body.theme-light .window .win-body{background:rgba(248,250,252,.68)}
    body.theme-light .input,
    body.theme-light select.input,
    body.theme-light textarea.input{
      background:rgba(255,255,255,.92);
      color:#0f172a;
      border-color:rgba(15,23,42,.16);
    }
    body.theme-light .secondary,
    body.theme-light .top-btn,
    body.theme-light .dock-btn,
    body.theme-light .icon-symbol,
    body.theme-light .card{
      background:rgba(255,255,255,.68);
      color:#0f172a;
      border-color:rgba(15,23,42,.13);
    }
    body.theme-light .icon-title{text-shadow:none;color:#0f172a}
    body.theme-light .note{color:#1e3a8a;background:rgba(59,130,246,.11)}
    body.theme-light .table th{color:#1e3a8a;background:rgba(59,130,246,.09)}
    body.theme-light .table th,
    body.theme-light .table td{border-bottom-color:rgba(15,23,42,.09)}

    .wallpaper-preview-grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(120px,1fr));
      gap:10px;
      margin-top:10px;
    }
    .wallpaper-preset{
      height:76px;
      border-radius:18px;
      border:1px solid rgba(255,255,255,.18);
      overflow:hidden;
      position:relative;
      cursor:pointer;
      box-shadow:0 10px 24px rgba(0,0,0,.16);
    }
    .wallpaper-preset span{
      position:absolute;
      left:8px;
      bottom:7px;
      padding:4px 7px;
      border-radius:999px;
      font-size:11px;
      font-weight:900;
      color:#fff;
      background:rgba(2,6,23,.52);
      backdrop-filter:blur(8px);
    }
    .wp-massive{
      background:
        radial-gradient(circle at 14% 20%,rgba(126,34,206,.82),transparent 38%),
        radial-gradient(circle at 84% 18%,rgba(37,99,235,.65),transparent 36%),
        radial-gradient(circle at 55% 88%,rgba(14,165,233,.42),transparent 38%),
        linear-gradient(135deg,#070713,#111827 52%,#0b1020);
    }
    .wp-aurora{
      background:
        radial-gradient(circle at 20% 20%,rgba(16,185,129,.70),transparent 35%),
        radial-gradient(circle at 80% 26%,rgba(59,130,246,.70),transparent 35%),
        radial-gradient(circle at 60% 80%,rgba(168,85,247,.55),transparent 40%),
        linear-gradient(135deg,#031315,#07162b 50%,#150b25);
    }
    .wp-midnight{
      background:
        radial-gradient(circle at 72% 16%,rgba(30,64,175,.72),transparent 38%),
        radial-gradient(circle at 25% 78%,rgba(15,23,42,.90),transparent 38%),
        linear-gradient(135deg,#020617,#0f172a 58%,#111827);
    }
    .wp-light{
      background:
        radial-gradient(circle at 18% 18%,rgba(59,130,246,.32),transparent 36%),
        radial-gradient(circle at 78% 20%,rgba(139,92,246,.26),transparent 34%),
        linear-gradient(135deg,#f8fbff,#eaf2ff 52%,#eef2ff);
    }

    .desktop-search{
      position:fixed;
      top:58px;
      left:50%;
      transform:translateX(-50%);
      width:min(640px,calc(100vw - 42px));
      z-index:3000;
      border:1px solid rgba(255,255,255,.18);
      border-radius:999px;
      background:rgba(255,255,255,.16);
      backdrop-filter:blur(22px);
      box-shadow:0 18px 44px rgba(0,0,0,.20);
      display:flex;
      align-items:center;
      gap:10px;
      padding:8px 14px;
    }
    .desktop-search span{opacity:.82}
    .desktop-search input{
      flex:1;
      border:0;
      outline:0;
      background:transparent;
      color:#fff;
      font-weight:700;
      min-width:0;
    }
    .desktop-search input::placeholder{color:rgba(255,255,255,.72)}
    body.theme-light .desktop-search{
      background:rgba(255,255,255,.78);
      border-color:rgba(15,23,42,.12);
    }
    body.theme-light .desktop-search input{color:#0f172a}
    body.theme-light .desktop-search input::placeholder{color:rgba(15,23,42,.48)}

    .quick-app-grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(130px,1fr));
      gap:10px;
      margin-top:12px;
    }
    .quick-app{
      border:1px solid rgba(255,255,255,.14);
      background:rgba(255,255,255,.08);
      color:#fff;
      border-radius:18px;
      padding:12px 10px;
      min-height:84px;
      display:flex;
      flex-direction:column;
      gap:6px;
      align-items:center;
      justify-content:center;
      text-align:center;
      font-weight:900;
    }
    .quick-app b{font-size:24px}
    .quick-app span{font-size:12px}
    body.theme-light .quick-app{background:rgba(255,255,255,.72);color:#0f172a;border-color:rgba(15,23,42,.12)}

    @media(max-width:800px){
      .top-center{display:none}
      .desktop{padding:14px}
      .window{left:8px!important;top:52px!important;width:calc(100vw - 16px)!important;height:calc(100vh - 122px)!important}
      .grid2{grid-template-columns:1fr}
      .dock{left:10px;right:10px;transform:none;justify-content:flex-start}
    }
  </style>
</head>
<body class="theme-massive">
  <div id="loginScreen" class="login-screen">
    <form id="loginForm" class="login-card">
      <div class="login-logo">◈</div>
      <h1>Masive OS</h1>
      <p>Acceso privado al sistema operativo web para dashboards, nube, archivos, meteo y radio.</p>
      <div class="field">
        <label for="password">Contraseña</label>
        <input id="password" class="input" type="password" autocomplete="current-password" placeholder="Introduce la contraseña" required />
      </div>
      <button class="primary" style="width:100%" type="submit">Entrar</button>
      <div id="loginMsg" class="msg"></div>
    </form>
  </div>

  <div id="appShell" class="hidden">
    <div class="topbar">
      <div class="brand">
        <div class="brand-badge">M</div>
        <span id="systemTitle">Masive OS</span>
      </div>
      <div class="top-center">
        <span class="top-pill" id="healthPill">Servidor: comprobando…</span>
        <span class="top-pill">Render / Cloud OS</span>
        <span class="top-pill" id="clockPill">--:--</span>
      </div>
      <div class="top-actions">
        <button id="newIconTopBtn" class="top-btn">+ Icono</button>
        <button id="settingsTopBtn" class="top-btn">Configuración</button>
        <button id="logoutBtn" class="top-btn">Salir</button>
      </div>
    </div>

    <div id="desktopSearch" class="desktop-search"><span>⌘</span><input id="globalSearchInput" placeholder="Buscar apps, abrir webs o escribir una URL..." /></div>

    <main id="desktop" class="desktop"></main>

    <div id="dock" class="dock">
      <button class="dock-btn" data-module="browser" title="Navegador">🌐</button>
      <button class="dock-btn" data-module="files" title="Archivos">📁</button>
      <button class="dock-btn" data-module="cloud" title="Nube">☁️</button>
      <button class="dock-btn" data-module="meteo" title="Meteo & Radio">📡</button>
      <button class="dock-btn" data-module="remote" title="Ayuda remota">🖥️</button>
      <button class="dock-btn" data-module="settings" title="Configuración">⚙️</button>
    </div>
  </div>

  <div id="modalHost"></div>

<script>
(() => {
  const $ = (s, root=document) => root.querySelector(s);
  const $$ = (s, root=document) => [...root.querySelectorAll(s)];
  const api = async (url, options={}) => {
    const res = await fetch(url, {
      credentials: 'include',
      headers: options.body && !(options.body instanceof FormData) ? {'Content-Type':'application/json'} : undefined,
      ...options
    });
    let data = null;
    const txt = await res.text();
    try{ data = txt ? JSON.parse(txt) : null; }catch{ data = txt; }
    if(!res.ok){
      const msg = data && data.error ? data.error : `Error ${res.status}`;
      throw new Error(msg);
    }
    return data;
  };

  let config = {};
  let icons = [];
  let zTop = 200;
  let activeIconId = null;
  let windows = new Map();

  const desktop = $('#desktop');
  const modalHost = $('#modalHost');

  function setMsg(el, text, type=''){
    el.textContent = text || '';
    el.className = 'msg' + (type ? ' ' + type : '');
  }

  function tickClock(){
    const d = new Date();
    $('#clockPill').textContent = d.toLocaleDateString('es-ES',{day:'2-digit',month:'2-digit'}) + ' · ' + d.toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'});
  }
  setInterval(tickClock, 1000); tickClock();

  async function boot(){
    try{
      const session = await api('/api/session');
      if(session.authenticated || session.ok){
        await enterOS();
      }
    }catch{}
  }

  $('#loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const msg = $('#loginMsg');
    setMsg(msg, 'Comprobando contraseña…');
    try{
      await api('/api/login', {method:'POST', body: JSON.stringify({password: $('#password').value})});
      setMsg(msg, 'Acceso correcto.', 'ok');
      await enterOS();
    }catch(err){
      setMsg(msg, err.message || 'Contraseña incorrecta', 'bad');
    }
  });

  $('#logoutBtn').addEventListener('click', async () => {
    try{ await api('/api/logout', {method:'POST'}); }catch{}
    location.reload();
  });

  async function enterOS(){
    $('#loginScreen').classList.add('hidden');
    $('#appShell').classList.remove('hidden');

  function makeIconDraggable(el, icon){
    let startX=0,startY=0,origX=0,origY=0,moving=false, saveTimer=null;
    el.addEventListener('pointerdown', (e) => {
      if(e.button !== 0) return;
      moving = true;
      startX = e.clientX; startY = e.clientY;
      origX = parseFloat(el.style.left)||0; origY = parseFloat(el.style.top)||0;
      el.setPointerCapture(e.pointerId);
    });
    el.addEventListener('pointermove', (e) => {
      if(!moving) return;
      const nx = Math.max(0, Math.min(window.innerWidth - 104, origX + e.clientX - startX));
      const ny = Math.max(0, Math.min(window.innerHeight - 170, origY + e.clientY - startY));
      el.style.left = nx + 'px'; el.style.top = ny + 'px';
    });
    el.addEventListener('pointerup', async () => {
      if(!moving) return;
      moving=false;
      icon.x = Math.round(parseFloat(el.style.left)||0);
      icon.y = Math.round(parseFloat(el.style.top)||0);
      clearTimeout(saveTimer);
      saveTimer = setTimeout(() => saveIcon(icon), 250);
    });
  }

  function createWindow(id, title, icon='◈', w=860, h=560){
    const win = document.createElement('section');
    win.className = 'window';
    win.dataset.id = id;
    win.style.width = w + 'px';
    win.style.height = h + 'px';
    win.style.left = Math.max(12, 110 + (windows.size * 28) % 280) + 'px';
    win.style.top = Math.max(52, 70 + (windows.size * 24) % 180) + 'px';
    win.style.zIndex = ++zTop;
    win.innerHTML = `
      <div class="titlebar">
        <div class="traffic">
          <button class="dot close" title="Cerrar"></button>
          <button class="dot min" title="Minimizar"></button>
          <button class="dot max" title="Maximizar"></button>
        </div>
        <div class="win-title"><span>${escapeHtml(icon)}</span><span>${escapeHtml(title)}</span></div>
        <div style="width:54px"></div>
      </div>
      <div class="win-body"></div>
      <div class="resize-handle"></div>
    `;
    desktop.appendChild(win);
    const body = $('.win-body', win);
    const titlebar = $('.titlebar', win);

    const ref = {el: win, body, id, title};
    windows.set(id, ref);

    win.addEventListener('pointerdown', () => win.style.zIndex = ++zTop);
    $('.close', win).addEventListener('click', () => { windows.delete(id); win.remove(); });
    $('.min', win).addEventListener('click', () => win.classList.add('minimized'));
    $('.max', win).addEventListener('click', () => win.classList.toggle('maximized'));
    makeWindowDraggable(win, titlebar);
    makeWindowResizable(win, $('.resize-handle', win));
    return ref;
  }

  function makeWindowDraggable(win, handle){
    let moving=false,startX=0,startY=0,origX=0,origY=0;
    handle.addEventListener('pointerdown', (e) => {
      if(e.target.classList.contains('dot')) return;
      moving=true; startX=e.clientX; startY=e.clientY;
      origX=parseFloat(win.style.left)||0; origY=parseFloat(win.style.top)||0;
      win.style.zIndex=++zTop;
      handle.setPointerCapture(e.pointerId);
    });
    handle.addEventListener('pointermove', (e) => {
      if(!moving || win.classList.contains('maximized')) return;
      win.style.left = Math.max(0, Math.min(window.innerWidth - 180, origX + e.clientX - startX)) + 'px';
      win.style.top = Math.max(44, Math.min(window.innerHeight - 110, origY + e.clientY - startY)) + 'px';
    });
    handle.addEventListener('pointerup', () => moving=false);
  }

  function makeWindowResizable(win, handle){
    let resizing=false,startX=0,startY=0,origW=0,origH=0;
    handle.addEventListener('pointerdown', (e) => {
      resizing=true; startX=e.clientX; startY=e.clientY;
      origW=win.offsetWidth; origH=win.offsetHeight;
      win.style.zIndex=++zTop;
      handle.setPointerCapture(e.pointerId);
      e.preventDefault();
    });
    handle.addEventListener('pointermove', (e) => {
      if(!resizing || win.classList.contains('maximized')) return;
      win.style.width = Math.max(360, origW + e.clientX - startX) + 'px';
      win.style.height = Math.max(260, origH + e.clientY - startY) + 'px';
    });
    handle.addEventListener('pointerup', () => resizing=false);
  }

              </select>
            </div>
            <div class="field"><label>Destino</label>
              <select class="input m-target-select hidden">
                <option value="browser">browser</option>
                <option value="files">files</option>
                <option value="cloud">cloud</option>
                <option value="meteo">meteo</option>
                <option value="remote">remote</option>
                <option value="settings">settings</option>
              </select>
              <input class="input m-target" value="${escapeAttr(data.target || '')}" placeholder="https://... o módulo">
            </div>
          </div>
          <div class="kv">
            <b>Web en ventana</b><span>Abre la URL dentro de una ventana iframe.</span>
            <b>Abrir externo</b><span>Abre la URL en una pestaña nueva.</span>
            <b>Módulo interno</b><span>Usa destino: files, cloud, meteo, remote, settings o browser.</span>
          </div>
          <div class="msg m-msg"></div>
          <div class="form-actions">
            ${isEdit ? '<button class="danger m-delete">Eliminar</button>' : ''}
            <button class="secondary m-cancel">Cancelar</button>
            <button class="primary m-save">${isEdit ? 'Guardar cambios' : 'Crear icono'}</button>
          </div>
        </div>
      </div>
    `;
    $('.m-type').value = data.type || 'link';
    const syncTarget = () => {
      const type = $('.m-type').value;
      const input = $('.m-target');
      const sel = $('.m-target-select');
      if(type === 'module'){
        sel.classList.remove('hidden');
        input.classList.add('hidden');
        sel.value = ['browser','files','cloud','meteo','remote','settings'].includes(data.target) ? data.target : 'files';
      }else{
        sel.classList.add('hidden');
        input.classList.remove('hidden');
      }
    };
    syncTarget();
    $('.m-type').addEventListener('change', syncTarget);
    $('.m-cancel').addEventListener('click', () => modalHost.innerHTML = '');
    $('.modal-backdrop').addEventListener('click', e => { if(e.target.classList.contains('modal-backdrop')) modalHost.innerHTML=''; });
    if(isEdit){
      $('.m-delete')?.addEventListener('click', async () => {
        if(!confirm('¿Eliminar este icono?')) return;
        await api('/api/icons/' + encodeURIComponent(icon.id), {method:'DELETE'});
        modalHost.innerHTML = '';
        icons = await api('/api/icons');
        renderIcons();
      });
    }
    $('.m-save').addEventListener('click', async () => {
      const msg = $('.m-msg');
      const type = $('.m-type').value;
      const payload = {
        title: $('.m-title').value || 'Nuevo icono',
        icon: $('.m-icon').value || '🔗',
        type,
        target: type === 'module' ? $('.m-target-select').value : $('.m-target').value,
        x: Number(data.x || 80),
        y: Number(data.y || 80)
      };
      try{
        if(isEdit){
          await api('/api/icons/' + encodeURIComponent(icon.id), {method:'PUT', body:JSON.stringify({...icon, ...payload})});
        }else{
          await api('/api/icons', {method:'POST', body:JSON.stringify(payload)});
        }
        modalHost.innerHTML = '';
        icons = await api('/api/icons');
        renderIcons();
      }catch(err){ setMsg(msg, err.message, 'bad'); }
    });
  }

  function downloadText(filename, text){
    const blob = new Blob([text], {type:'application/json'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = filename;
    a.click();
    setTimeout(() => URL.revokeObjectURL(a.href), 1000);
  }

  function escapeHtml(v){
    return String(v ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }
  function escapeAttr(v){ return escapeHtml(v).replace(/`/g,'&#96;'); }


  $('#globalSearchInput').addEventListener('keydown', (e) => {
    if(e.key !== 'Enter') return;
    const q = e.target.value.trim();
    if(!q) return;

    const lower = q.toLowerCase();
    const internal = {
      'archivos':'files','files':'files','nube':'cloud','cloud':'cloud',
      'meteo':'meteo','radio':'meteo','ayuda':'remote','remoto':'remote',
      'config':'settings','configuracion':'settings','configuración':'settings',
      'navegador':'browser','browser':'browser'
    };
    if(internal[lower]){
      openModule(internal[lower]);
      e.target.value = '';
      return;
    }

    const found = icons.find(i => (i.title || '').toLowerCase().includes(lower));
    if(found){
      openIcon(found);
      e.target.value = '';
      return;
    }

    if(/^https?:\/\//i.test(q) || q.includes('.')){
      openBrowser(/^https?:\/\//i.test(q) ? q : 'https://' + q, q);
      e.target.value = '';
      return;
    }

    openBrowser('https://www.google.com/search?q=' + encodeURIComponent(q), 'Buscar: ' + q);
    e.target.value = '';
  });

  boot();
})();
</script>
</body>
</html>
