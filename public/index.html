<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Masive OS</title>
  <style>
    :root{
      --bg0:#060814;
      --bg1:#111827;
      --glass:rgba(18,25,45,.62);
      --glass2:rgba(255,255,255,.10);
      --line:rgba(255,255,255,.18);
      --line2:rgba(255,255,255,.28);
      --txt:#f8fafc;
      --muted:#b8c0d4;
      --blue:#5aa7ff;
      --violet:#8b5cf6;
      --ok:#34d399;
      --bad:#fb7185;
      --warn:#fbbf24;
      --shadow:0 24px 70px rgba(0,0,0,.42);
      --radius:24px;
      --topbar:42px;
      --dock:86px;
    }
    *{box-sizing:border-box}
    html,body{margin:0;width:100%;height:100%;overflow:hidden;font-family:Inter,Segoe UI,Arial,sans-serif;color:var(--txt);background:#050713}
    body{
      background:
        radial-gradient(circle at 18% 10%,rgba(112,55,255,.42),transparent 32%),
        radial-gradient(circle at 82% 18%,rgba(29,124,255,.34),transparent 28%),
        radial-gradient(circle at 62% 84%,rgba(14,165,233,.28),transparent 34%),
        linear-gradient(135deg,#070916,#111827 55%,#0b1020);
    }
    body.custom-wallpaper{
      background-size:cover;
      background-position:center;
      background-repeat:no-repeat;
    }
    button,input,select,textarea{font:inherit}
    button{cursor:pointer}
    .hidden{display:none!important}

    .login-screen{
      position:fixed;inset:0;z-index:10000;display:flex;align-items:center;justify-content:center;padding:24px;
      background:
        radial-gradient(circle at 30% 20%,rgba(139,92,246,.35),transparent 35%),
        radial-gradient(circle at 72% 72%,rgba(14,165,233,.28),transparent 34%),
        linear-gradient(135deg,#050713,#111827);
    }
    .login-card{
      width:min(440px,calc(100% - 20px));
      border:1px solid var(--line);
      border-radius:32px;
      background:rgba(15,23,42,.64);
      backdrop-filter:blur(24px);
      box-shadow:var(--shadow);
      padding:30px;
    }
    .login-logo{
      width:74px;height:74px;border-radius:24px;margin:0 auto 16px;
      display:flex;align-items:center;justify-content:center;
      background:linear-gradient(135deg,rgba(90,167,255,.95),rgba(139,92,246,.95));
      box-shadow:0 16px 40px rgba(79,70,229,.35);
      font-size:36px;
    }
    .login-card h1{text-align:center;margin:0 0 6px;font-size:30px;letter-spacing:.2px}
    .login-card p{text-align:center;margin:0 0 22px;color:var(--muted);font-size:14px;line-height:1.45}
    .field{display:grid;gap:7px;margin:0 0 14px}
    .field label{font-size:12px;color:var(--muted);font-weight:800;text-transform:uppercase;letter-spacing:.08em}
    .input{
      width:100%;border:1px solid var(--line);border-radius:16px;padding:13px 14px;background:rgba(255,255,255,.08);
      color:#fff;outline:none;
    }
    .input:focus{border-color:rgba(90,167,255,.72);box-shadow:0 0 0 4px rgba(90,167,255,.12)}
    .primary{
      border:0;border-radius:16px;background:linear-gradient(135deg,#60a5fa,#7c3aed);color:#fff;
      padding:12px 16px;font-weight:900;box-shadow:0 12px 28px rgba(79,70,229,.28);
    }
    .secondary{
      border:1px solid var(--line);border-radius:14px;background:rgba(255,255,255,.09);color:#fff;padding:10px 13px;font-weight:800;
    }
    .danger{
      border:1px solid rgba(251,113,133,.45);border-radius:14px;background:rgba(251,113,133,.16);color:#fecdd3;padding:10px 13px;font-weight:900;
    }
    .msg{min-height:18px;font-size:13px;color:var(--muted);margin-top:10px}
    .msg.bad{color:#fecdd3}.msg.ok{color:#bbf7d0}

    .topbar{
      position:fixed;left:0;right:0;top:0;height:var(--topbar);z-index:5000;
      display:flex;align-items:center;justify-content:space-between;gap:14px;padding:0 14px;
      background:rgba(5,8,22,.54);backdrop-filter:blur(20px);border-bottom:1px solid rgba(255,255,255,.12);
      user-select:none;
    }
    .brand{display:flex;align-items:center;gap:10px;font-weight:950}
    .brand-badge{
      width:24px;height:24px;border-radius:9px;background:linear-gradient(135deg,#60a5fa,#7c3aed);
      display:flex;align-items:center;justify-content:center;font-size:13px;box-shadow:0 8px 22px rgba(96,165,250,.18)
    }
    .top-center{display:flex;align-items:center;gap:8px;color:var(--muted);font-size:12px;min-width:0}
    .top-pill{border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.08);padding:5px 9px;border-radius:999px;white-space:nowrap}
    .top-actions{display:flex;align-items:center;gap:8px}
    .top-btn{
      width:auto;border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.08);color:#fff;border-radius:12px;
      padding:6px 10px;font-weight:800;font-size:12px
    }

    .desktop{
      position:fixed;left:0;right:0;top:var(--topbar);bottom:0;z-index:1;overflow:hidden;
      padding:22px 22px calc(var(--dock) + 22px);
    }
    .icon{
      position:absolute;width:92px;height:98px;border:1px solid transparent;border-radius:22px;
      display:flex;flex-direction:column;align-items:center;justify-content:flex-start;gap:8px;padding:10px 6px;
      color:#fff;text-align:center;user-select:none;
    }
    .icon:hover,.icon.is-selected{background:rgba(255,255,255,.10);border-color:rgba(255,255,255,.16);backdrop-filter:blur(8px)}
    .icon-symbol{
      width:54px;height:54px;border-radius:20px;background:rgba(255,255,255,.13);
      border:1px solid rgba(255,255,255,.18);display:flex;align-items:center;justify-content:center;font-size:30px;
      box-shadow:0 10px 24px rgba(0,0,0,.18)
    }
    .icon-title{
      max-width:84px;line-height:1.15;font-size:12px;font-weight:800;text-shadow:0 2px 8px rgba(0,0,0,.55);
      overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;
    }

    .dock{
      position:fixed;left:50%;bottom:14px;transform:translateX(-50%);height:72px;z-index:4800;
      display:flex;align-items:center;gap:10px;padding:10px 14px;border:1px solid rgba(255,255,255,.18);
      border-radius:25px;background:rgba(10,15,30,.52);backdrop-filter:blur(26px);box-shadow:var(--shadow);
      max-width:calc(100vw - 28px);overflow:auto;
    }
    .dock-btn{
      width:50px;height:50px;min-width:50px;border-radius:18px;border:1px solid rgba(255,255,255,.18);
      display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.10);color:#fff;font-size:25px;
      position:relative;
    }
    .dock-btn.running::after{
      content:'';position:absolute;bottom:4px;left:50%;transform:translateX(-50%);width:5px;height:5px;border-radius:999px;background:#fff;
    }

    .window{
      position:absolute;left:170px;top:90px;width:860px;height:560px;z-index:100;background:rgba(15,23,42,.72);
      border:1px solid rgba(255,255,255,.17);border-radius:22px;backdrop-filter:blur(22px);box-shadow:var(--shadow);
      overflow:hidden;display:flex;flex-direction:column;min-width:360px;min-height:260px;
    }
    .window.maximized{left:10px!important;top:52px!important;width:calc(100vw - 20px)!important;height:calc(100vh - 62px)!important;border-radius:18px}
    .window.minimized{display:none}
    .titlebar{
      height:46px;display:flex;align-items:center;justify-content:space-between;gap:12px;padding:0 12px;
      border-bottom:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.06);user-select:none;cursor:move;
      flex:0 0 auto;
    }
    .traffic{display:flex;gap:7px;align-items:center}
    .dot{width:13px;height:13px;border-radius:999px;border:0;padding:0}
    .close{background:#ff5f57}.min{background:#ffbd2e}.max{background:#28c840}
    .win-title{font-size:13px;font-weight:950;display:flex;gap:8px;align-items:center;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .win-body{flex:1;overflow:auto;padding:16px;background:rgba(2,6,23,.08)}
    .resize-handle{position:absolute;right:0;bottom:0;width:18px;height:18px;cursor:nwse-resize}
    .resize-handle::after{content:'⇲';position:absolute;right:3px;bottom:1px;color:rgba(255,255,255,.45);font-size:13px}

    .panel-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px}
    .card{
      border:1px solid rgba(255,255,255,.13);border-radius:18px;background:rgba(255,255,255,.08);padding:14px;
    }
    .card h3{margin:0 0 8px;font-size:16px}
    .card p{margin:0;color:var(--muted);font-size:13px;line-height:1.45}
    .row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
    .grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .table{width:100%;border-collapse:collapse}
    .table th,.table td{border-bottom:1px solid rgba(255,255,255,.10);padding:9px;text-align:left;font-size:13px;vertical-align:middle}
    .table th{color:#dbeafe;background:rgba(255,255,255,.06);position:sticky;top:0}
    .table button{padding:7px 9px;border-radius:10px;font-size:12px}
    .browser-bar{display:grid;grid-template-columns:1fr auto auto;gap:8px;margin-bottom:10px}
    iframe.browser-frame{width:100%;height:calc(100% - 52px);border:1px solid rgba(255,255,255,.14);border-radius:16px;background:#fff}
    .note{border-left:4px solid var(--blue);padding:10px 12px;border-radius:14px;background:rgba(96,165,250,.11);color:#dbeafe;font-size:13px;line-height:1.45}
    .status-ok{color:#bbf7d0}.status-bad{color:#fecdd3}
    .form-actions{display:flex;justify-content:flex-end;gap:10px;margin-top:14px}
    .modal-backdrop{
      position:fixed;inset:0;z-index:9000;background:rgba(2,6,23,.45);display:flex;align-items:center;justify-content:center;padding:20px;
    }
    .modal{
      width:min(620px,calc(100vw - 30px));max-height:90vh;overflow:auto;border:1px solid rgba(255,255,255,.18);
      border-radius:24px;background:rgba(15,23,42,.86);backdrop-filter:blur(24px);box-shadow:var(--shadow);padding:18px;
    }
    .modal h2{margin:0 0 6px;font-size:22px}
    .modal p{margin:0 0 14px;color:var(--muted);font-size:13px;line-height:1.45}
    .kv{display:grid;grid-template-columns:170px 1fr;gap:8px;font-size:13px;color:var(--muted)}
    .kv b{color:#fff}





    .pcloud-assistant{
      border:1px solid rgba(96,165,250,.25);
      background:radial-gradient(circle at 12% 18%,rgba(96,165,250,.16),transparent 35%),rgba(255,255,255,.07);
      border-radius:22px;padding:14px;margin-top:12px;
    }
    .pcloud-assistant h4{margin:0 0 6px;font-size:16px}
    .pcloud-assistant p{margin:0 0 12px;color:var(--muted);font-size:12px;line-height:1.45}
    .pcloud-assistant-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .pcloud-assistant-actions{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px;align-items:center}
    body.theme-light .pcloud-assistant{background:rgba(255,255,255,.76);border-color:rgba(59,130,246,.18)}
    @media(max-width:800px){.pcloud-assistant-grid{grid-template-columns:1fr}}

    .pcloud-pathbar{
      display:grid;
      grid-template-columns:auto 1fr auto auto;
      gap:8px;
      align-items:center;
      margin:12px 0;
    }
    .pcloud-list-row{
      display:grid;
      grid-template-columns:42px 1fr 120px 150px auto;
      gap:8px;
      align-items:center;
      padding:9px 10px;
      border-bottom:1px solid rgba(255,255,255,.10);
    }
    .pcloud-list-row:hover{background:rgba(255,255,255,.07)}
    .pcloud-list-head{
      color:#dbeafe;
      background:rgba(255,255,255,.06);
      font-size:12px;
      font-weight:900;
      text-transform:uppercase;
      letter-spacing:.05em;
      position:sticky;
      top:0;
      z-index:2;
    }
    .pcloud-file-icon{font-size:24px;text-align:center}
    .pcloud-list-box{
      border:1px solid rgba(255,255,255,.13);
      border-radius:18px;
      overflow:auto;
      max-height:430px;
      background:rgba(255,255,255,.05);
    }
    .pcloud-breadcrumb{
      display:flex;
      gap:6px;
      flex-wrap:wrap;
      align-items:center;
      color:var(--muted);
      font-size:12px;
      margin-top:8px;
    }
    .pcloud-breadcrumb button{
      width:auto;
      padding:5px 8px;
      border-radius:999px;
      font-size:11px;
    }
    body.theme-light .pcloud-list-row{border-bottom-color:rgba(15,23,42,.09)}
    body.theme-light .pcloud-list-head{color:#1e3a8a;background:rgba(59,130,246,.09)}
    body.theme-light .pcloud-list-box{background:rgba(255,255,255,.68);border-color:rgba(15,23,42,.13)}

    .meteo-hero{
      border:1px solid rgba(255,255,255,.14);
      border-radius:24px;
      background:
        radial-gradient(circle at 15% 15%,rgba(96,165,250,.24),transparent 34%),
        radial-gradient(circle at 86% 18%,rgba(139,92,246,.22),transparent 32%),
        rgba(255,255,255,.08);
      padding:16px;
      box-shadow:0 16px 42px rgba(0,0,0,.18);
    }
    .meteo-title-row{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-wrap:wrap}
    .meteo-title-row h3{margin:0;font-size:22px}
    .meteo-sub{margin:6px 0 0;color:var(--muted);font-size:13px;line-height:1.45}
    .meteo-clock-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px;margin-top:14px}
    .meteo-clock-card{
      border:1px solid rgba(255,255,255,.13);
      background:rgba(2,6,23,.20);
      border-radius:18px;
      padding:12px;
    }
    .meteo-clock-card b{display:block;font-size:22px;margin-bottom:3px}
    .meteo-clock-card span{color:var(--muted);font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.06em}
    .meteo-app-grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
      gap:10px;
      margin-top:12px;
    }
    .meteo-app{
      border:1px solid rgba(255,255,255,.14);
      background:rgba(255,255,255,.08);
      color:#fff;
      border-radius:20px;
      padding:14px 10px;
      min-height:104px;
      display:flex;
      flex-direction:column;
      gap:7px;
      align-items:center;
      justify-content:center;
      text-align:center;
      font-weight:900;
    }
    .meteo-app b{font-size:28px}
    .meteo-app span{font-size:12px;line-height:1.2}
    .meteo-frame-box{
      height:420px;
      border:1px solid rgba(255,255,255,.14);
      border-radius:20px;
      overflow:hidden;
      background:#fff;
      margin-top:12px;
    }
    .meteo-frame-box iframe{width:100%;height:100%;border:0;background:#fff}
    .meteo-config-row{
      display:grid;
      grid-template-columns:1fr auto auto;
      gap:8px;
      margin-top:12px;
      align-items:center;
    }
    .teletype{
      border:1px solid rgba(96,165,250,.24);
      background:rgba(15,23,42,.38);
      color:#dbeafe;
      border-radius:18px;
      padding:12px 14px;
      font-family:ui-monospace,SFMono-Regular,Consolas,monospace;
      font-size:12px;
      line-height:1.55;
      min-height:54px;
      overflow:hidden;
    }
    .teletype::before{content:'EA1FJZ  > ';color:#60a5fa;font-weight:900}
    body.theme-light .meteo-hero,
    body.theme-light .meteo-clock-card,
    body.theme-light .meteo-app{
      background:rgba(255,255,255,.70);
      border-color:rgba(15,23,42,.13);
      color:#0f172a;
    }
    body.theme-light .teletype{background:#0f172a;color:#dbeafe}

    .cloud-service-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:12px;margin:12px 0}
    .cloud-service-card{border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.08);border-radius:20px;padding:14px;min-height:132px;display:flex;flex-direction:column;justify-content:space-between;gap:10px}
    .cloud-service-card h4{margin:0;font-size:15px;display:flex;align-items:center;gap:8px}
    .cloud-service-card p{margin:0;color:var(--muted);font-size:12px;line-height:1.35}
    .cloud-status-dot{display:inline-flex;width:10px;height:10px;border-radius:999px;background:#94a3b8;box-shadow:0 0 0 4px rgba(148,163,184,.12)}
    .cloud-status-dot.ok{background:#34d399;box-shadow:0 0 0 4px rgba(52,211,153,.16)}
    .cloud-status-dot.bad{background:#fb7185;box-shadow:0 0 0 4px rgba(251,113,133,.16)}
    .secret-field-wrap{position:relative}
    .secret-field-wrap .input{padding-right:48px}
    .secret-eye{position:absolute;right:8px;top:50%;transform:translateY(-50%);width:34px;height:30px;border-radius:10px;padding:0;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.10);color:#fff}
    body.theme-light .cloud-service-card{background:rgba(255,255,255,.68);border-color:rgba(15,23,42,.13)}
    body.theme-light .secret-eye{color:#0f172a;border-color:rgba(15,23,42,.12);background:rgba(255,255,255,.70)}

    /* ===== MASIVE OS THEME - Glassmorphism oscuro tipo Proton/Brave ===== */
    body.theme-massive{
      background:
        radial-gradient(circle at 15% 14%,rgba(126,34,206,.50),transparent 31%),
        radial-gradient(circle at 80% 16%,rgba(37,99,235,.38),transparent 30%),
        radial-gradient(circle at 52% 88%,rgba(14,165,233,.28),transparent 34%),
        linear-gradient(135deg,#070713,#111827 52%,#0b1020) !important;
    }
    body.theme-aurora{
      background:
        radial-gradient(circle at 22% 16%,rgba(16,185,129,.34),transparent 30%),
        radial-gradient(circle at 76% 20%,rgba(59,130,246,.36),transparent 31%),
        radial-gradient(circle at 55% 86%,rgba(168,85,247,.30),transparent 36%),
        linear-gradient(135deg,#031315,#07162b 50%,#150b25) !important;
    }
    body.theme-midnight{
      background:
        radial-gradient(circle at 72% 16%,rgba(30,64,175,.40),transparent 34%),
        radial-gradient(circle at 25% 78%,rgba(15,23,42,.78),transparent 36%),
        linear-gradient(135deg,#020617,#0f172a 58%,#111827) !important;
    }
    body.theme-light{
      --txt:#0f172a;
      --muted:#475569;
      --glass:rgba(255,255,255,.72);
      --glass2:rgba(255,255,255,.88);
      --line:rgba(15,23,42,.15);
      --line2:rgba(15,23,42,.22);
      background:
        radial-gradient(circle at 18% 18%,rgba(59,130,246,.20),transparent 32%),
        radial-gradient(circle at 78% 20%,rgba(139,92,246,.16),transparent 30%),
        linear-gradient(135deg,#f8fbff,#eaf2ff 52%,#eef2ff) !important;
      color:#0f172a;
    }
    body.theme-light .topbar,
    body.theme-light .dock,
    body.theme-light .window,
    body.theme-light .modal,
    body.theme-light .login-card{
      background:rgba(255,255,255,.72);
      color:#0f172a;
      border-color:rgba(15,23,42,.12);
    }
    body.theme-light .window .win-body{background:rgba(248,250,252,.68)}
    body.theme-light .input,
    body.theme-light select.input,
    body.theme-light textarea.input{
      background:rgba(255,255,255,.92);
      color:#0f172a;
      border-color:rgba(15,23,42,.16);
    }
    body.theme-light .secondary,
    body.theme-light .top-btn,
    body.theme-light .dock-btn,
    body.theme-light .icon-symbol,
    body.theme-light .card{
      background:rgba(255,255,255,.68);
      color:#0f172a;
      border-color:rgba(15,23,42,.13);
    }
    body.theme-light .icon-title{text-shadow:none;color:#0f172a}
    body.theme-light .note{color:#1e3a8a;background:rgba(59,130,246,.11)}
    body.theme-light .table th{color:#1e3a8a;background:rgba(59,130,246,.09)}
    body.theme-light .table th,
    body.theme-light .table td{border-bottom-color:rgba(15,23,42,.09)}

    .wallpaper-preview-grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(120px,1fr));
      gap:10px;
      margin-top:10px;
    }
    .wallpaper-preset{
      height:76px;
      border-radius:18px;
      border:1px solid rgba(255,255,255,.18);
      overflow:hidden;
      position:relative;
      cursor:pointer;
      box-shadow:0 10px 24px rgba(0,0,0,.16);
    }
    .wallpaper-preset span{
      position:absolute;
      left:8px;
      bottom:7px;
      padding:4px 7px;
      border-radius:999px;
      font-size:11px;
      font-weight:900;
      color:#fff;
      background:rgba(2,6,23,.52);
      backdrop-filter:blur(8px);
    }
    .wp-massive{
      background:
        radial-gradient(circle at 14% 20%,rgba(126,34,206,.82),transparent 38%),
        radial-gradient(circle at 84% 18%,rgba(37,99,235,.65),transparent 36%),
        radial-gradient(circle at 55% 88%,rgba(14,165,233,.42),transparent 38%),
        linear-gradient(135deg,#070713,#111827 52%,#0b1020);
    }
    .wp-aurora{
      background:

<body class="theme-massive">

<script>
(() => {
  const $ = (s, root=document) => root.querySelector(s);
  const $$ = (s, root=document) => [...root.querySelectorAll(s)];
  const api = async (url, options={}) => {
    const res = await fetch(url, {
      credentials: 'include',
      headers: options.body && !(options.body instanceof FormData) ? {'Content-Type':'application/json'} : undefined,
      ...options
    });
    let data = null;
    const txt = await res.text();
    try{ data = txt ? JSON.parse(txt) : null; }catch{ data = txt; }
    if(!res.ok){
      const msg = data && data.error ? data.error : `Error ${res.status}`;
      throw new Error(msg);
    }
    return data;
  };

  let config = {};
  let icons = [];
  let zTop = 200;
  let activeIconId = null;
  let windows = new Map();

  const desktop = $('#desktop');
  const modalHost = $('#modalHost');

  function setMsg(el, text, type=''){
    el.textContent = text || '';
    el.className = 'msg' + (type ? ' ' + type : '');
  }

  function tickClock(){
    const d = new Date();
    $('#clockPill').textContent = d.toLocaleDateString('es-ES',{day:'2-digit',month:'2-digit'}) + ' · ' + d.toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'});
  }
  setInterval(tickClock, 1000); tickClock();

  async function boot(){
    try{
      const session = await api('/api/session');
      if(session.authenticated || session.ok){
        await enterOS();
      }
    }catch{}
  }

  $('#loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const msg = $('#loginMsg');
    setMsg(msg, 'Comprobando contraseña…');
    try{
      await api('/api/login', {method:'POST', body: JSON.stringify({password: $('#password').value})});
      setMsg(msg, 'Acceso correcto.', 'ok');
      await enterOS();
    }catch(err){
      setMsg(msg, err.message || 'Contraseña incorrecta', 'bad');
    }
  });

  $('#logoutBtn').addEventListener('click', async () => {
    try{ await api('/api/logout', {method:'POST'}); }catch{}
    location.reload();
  });

  async function enterOS(){
    $('#loginScreen').classList.add('hidden');
    $('#appShell').classList.remove('hidden');
    await loadAll();
    await checkHealth();
  }

  async function loadAll(){
    config = await api('/api/config');
    icons = await api('/api/icons');
    applyConfig();
    renderIcons();
  }

  function applyConfig(){
    $('#systemTitle').textContent = config.title || 'Masive OS';
    document.title = config.title || 'Masive OS';

    const theme = config.theme || 'massive';
    document.body.classList.remove('theme-massive','theme-aurora','theme-midnight','theme-light');
    document.body.classList.add('theme-' + theme);

    if(config.wallpaper){
      document.body.classList.add('custom-wallpaper');
      document.body.style.backgroundImage = `linear-gradient(rgba(2,6,23,.22),rgba(2,6,23,.22)), url("${config.wallpaper}")`;
    }else{
      document.body.classList.remove('custom-wallpaper');
      document.body.style.backgroundImage = '';
    }
  }

  async function checkHealth(){
    try{
      const h = await api('/api/health');
      $('#healthPill').innerHTML = `Servidor: <span class="status-ok">OK</span> · ${h.persistent ? 'Persistente' : 'Local'}`;
    }catch{
      $('#healthPill').innerHTML = `Servidor: <span class="status-bad">Error</span>`;
    }
  }

  function renderIcons(){
    desktop.innerHTML = '';
    icons.forEach(icon => {
      const el = document.createElement('div');
      el.className = 'icon';
      el.dataset.id = icon.id;
      el.style.left = (Number(icon.x)||40) + 'px';
      el.style.top = (Number(icon.y)||40) + 'px';
      el.innerHTML = `<div class="icon-symbol">${escapeHtml(icon.icon || '🔗')}</div><div class="icon-title">${escapeHtml(icon.title || 'Icono')}</div>`;
      desktop.appendChild(el);

      let clickTimer = null;
      el.addEventListener('click', () => {
        $$('.icon').forEach(i => i.classList.remove('is-selected'));
        el.classList.add('is-selected');
        activeIconId = icon.id;
      });
      el.addEventListener('dblclick', () => openIcon(icon));
      el.addEventListener('contextmenu', (e) => {

  function makeIconDraggable(el, icon){
    let startX=0,startY=0,origX=0,origY=0,moving=false, saveTimer=null;
    el.addEventListener('pointerdown', (e) => {
      if(e.button !== 0) return;
      moving = true;
      startX = e.clientX; startY = e.clientY;
      origX = parseFloat(el.style.left)||0; origY = parseFloat(el.style.top)||0;
      el.setPointerCapture(e.pointerId);
    });
    el.addEventListener('pointermove', (e) => {
      if(!moving) return;
      const nx = Math.max(0, Math.min(window.innerWidth - 104, origX + e.clientX - startX));
      const ny = Math.max(0, Math.min(window.innerHeight - 170, origY + e.clientY - startY));
      el.style.left = nx + 'px'; el.style.top = ny + 'px';
    });
    el.addEventListener('pointerup', async () => {
      if(!moving) return;
      moving=false;
      icon.x = Math.round(parseFloat(el.style.left)||0);
      icon.y = Math.round(parseFloat(el.style.top)||0);
      clearTimeout(saveTimer);
      saveTimer = setTimeout(() => saveIcon(icon), 250);
    });
  }

  function createWindow(id, title, icon='◈', w=860, h=560){
    const win = document.createElement('section');
    win.className = 'window';
    win.dataset.id = id;
    win.style.width = w + 'px';
    win.style.height = h + 'px';
    win.style.left = Math.max(12, 110 + (windows.size * 28) % 280) + 'px';
    win.style.top = Math.max(52, 70 + (windows.size * 24) % 180) + 'px';
    win.style.zIndex = ++zTop;
    win.innerHTML = `
      <div class="titlebar">
        <div class="traffic">
          <button class="dot close" title="Cerrar"></button>
          <button class="dot min" title="Minimizar"></button>
          <button class="dot max" title="Maximizar"></button>
        </div>
        <div class="win-title"><span>${escapeHtml(icon)}</span><span>${escapeHtml(title)}</span></div>
        <div style="width:54px"></div>
      </div>
      <div class="win-body"></div>
      <div class="resize-handle"></div>
    `;
    desktop.appendChild(win);
    const body = $('.win-body', win);
    const titlebar = $('.titlebar', win);

    const ref = {el: win, body, id, title};
    windows.set(id, ref);

    win.addEventListener('pointerdown', () => win.style.zIndex = ++zTop);
    $('.close', win).addEventListener('click', () => { windows.delete(id); win.remove(); });
    $('.min', win).addEventListener('click', () => win.classList.add('minimized'));
    $('.max', win).addEventListener('click', () => win.classList.toggle('maximized'));
    makeWindowDraggable(win, titlebar);
    makeWindowResizable(win, $('.resize-handle', win));
    return ref;
  }

  function makeWindowDraggable(win, handle){
    let moving=false,startX=0,startY=0,origX=0,origY=0;
    handle.addEventListener('pointerdown', (e) => {
      if(e.target.classList.contains('dot')) return;
      moving=true; startX=e.clientX; startY=e.clientY;
      origX=parseFloat(win.style.left)||0; origY=parseFloat(win.style.top)||0;
      win.style.zIndex=++zTop;
      handle.setPointerCapture(e.pointerId);
    });
    handle.addEventListener('pointermove', (e) => {
      if(!moving || win.classList.contains('maximized')) return;
      win.style.left = Math.max(0, Math.min(window.innerWidth - 180, origX + e.clientX - startX)) + 'px';
      win.style.top = Math.max(44, Math.min(window.innerHeight - 110, origY + e.clientY - startY)) + 'px';
    });
    handle.addEventListener('pointerup', () => moving=false);
  }

  function makeWindowResizable(win, handle){
    let resizing=false,startX=0,startY=0,origW=0,origH=0;
    handle.addEventListener('pointerdown', (e) => {
      resizing=true; startX=e.clientX; startY=e.clientY;
      origW=win.offsetWidth; origH=win.offsetHeight;
      win.style.zIndex=++zTop;
      handle.setPointerCapture(e.pointerId);
      e.preventDefault();
    });
    handle.addEventListener('pointermove', (e) => {
      if(!resizing || win.classList.contains('maximized')) return;
      win.style.width = Math.max(360, origW + e.clientX - startX) + 'px';
      win.style.height = Math.max(260, origH + e.clientY - startY) + 'px';
    });
    handle.addEventListener('pointerup', () => resizing=false);
  }

    });

    const fmtSize = n => {
      n = Number(n || 0);
      if(n < 1024) return n + ' B';
      if(n < 1024*1024) return (n/1024).toFixed(1) + ' KB';
      return (n/(1024*1024)).toFixed(2) + ' MB';
    };

    const load = async () => {
      try{
        const files = await api('/api/files');
        $('.files-body', root).innerHTML = files.length ? files.map(f => `
          <tr>
            <td>${escapeHtml(f.original_name || f.name || '')}</td>
            <td>${escapeHtml(f.mime_type || f.type || '')}</td>
            <td>${escapeHtml(fmtSize(f.size_bytes || f.size))}</td>
            <td>${escapeHtml((f.created_at || '').replace('T',' ').slice(0,16))}</td>
            <td class="row">
              <a class="secondary" href="/api/files/download/${encodeURIComponent(f.id)}" target="_blank">Descargar</a>

          </tr>
        `).join('') : '<tr><td colspan="5">No hay archivos guardados todavía.</td></tr>';

        $$('.open-file-btn', root).forEach(btn => btn.addEventListener('click', () => {
          const file = files.find(f => f.id === btn.dataset.id);
          if(!file) return;
          const url = '/api/files/download/' + encodeURIComponent(file.id);
          const name = file.original_name || file.name || 'Archivo';
          const mime = file.mime_type || '';
          if(mime.startsWith('image/') || mime.includes('pdf') || mime.includes('text') || name.toLowerCase().endsWith('.html')){
            openBrowser(url, name);
          }else{
            window.open(url, '_blank');
          }
        }));

        $$('.delete-file-btn', root).forEach(btn => btn.addEventListener('click', async () => {
          const file = files.find(f => f.id === btn.dataset.id);
          if(!confirm('¿Eliminar el archivo "' + (file?.original_name || file?.name || '') + '"?')) return;
          await api('/api/files/' + encodeURIComponent(btn.dataset.id), {method:'DELETE'});
          await load();
        }));
      }catch(err){
        $('.files-body', root).innerHTML = `<tr><td colspan="5">${escapeHtml(err.message)}</td></tr>`;
      }
    };

    $('.reload-files-btn', root).addEventListener('click', load);

    $('.upload-file-btn', root).addEventListener('click', async () => {
      const msg = $('.files-msg', root);
      const file = $('.file-picker', root).files[0];
      if(!file){ setMsg(msg, 'Selecciona un archivo primero.', 'bad'); return; }
      if(file.size > 12 * 1024 * 1024){ setMsg(msg, 'Archivo demasiado grande para esta versión. Máximo 12 MB.', 'bad'); return; }
      setMsg(msg, 'Subiendo archivo…');
      const reader = new FileReader();
      reader.onload = async () => {
        try{
          const base64 = String(reader.result || '').split(',')[1] || '';
          await api('/api/files/upload-json', {method:'POST', body:JSON.stringify({
            name: file.name,
            mime_type: file.type || 'application/octet-stream',
            size_bytes: file.size,
            data_base64: base64
          })});
          $('.file-picker', root).value = '';
          setMsg(msg, 'Archivo subido correctamente.', 'ok');
          await load();
        }catch(err){ setMsg(msg, err.message, 'bad'); }
      };
      reader.onerror = () => setMsg(msg, 'No se pudo leer el archivo.', 'bad');
      reader.readAsDataURL(file);
    });

    await load();
  }

      if(provider === 'OneDrive' || provider === 'SharePoint'){
        form.name.value = provider + ' compartido';
        form.notes.value = 'Pegar aquí la URL de la carpeta compartida.';
      }
      if(provider === 'Custom API'){
        form.name.value = 'API interna';
        form.notes.value = 'Endpoint para probar conexión HTTP desde el servidor.';
      }
    };

    $$('.cloud-preset', root).forEach(b => b.addEventListener('click', () => fillPreset(b.dataset.provider)));
    $('.cloud-clear', root).addEventListener('click', clearForm);
    $('.cloud-token-eye', root).addEventListener('click', () => { form.token.type = form.token.type === 'password' ? 'text' : 'password'; });
    $('.pcloud-pass-eye', root).addEventListener('click', () => {
      const p = $('.pcloud-login-pass', root);
      p.type = p.type === 'password' ? 'text' : 'password';
    });
    $('.pcloud-fill-eu', root).addEventListener('click', () => {
      $('.pcloud-region', root).value = 'eu';
      form.url.value = 'https://eapi.pcloud.com';
    });
    $('.pcloud-fill-us', root).addEventListener('click', () => {
      $('.pcloud-region', root).value = 'us';
      form.url.value = 'https://api.pcloud.com';
    });
    $('.pcloud-get-token', root).addEventListener('click', async () => {
      const username = $('.pcloud-login-user', root).value.trim();
      const password = $('.pcloud-login-pass', root).value;
      const region = $('.pcloud-region', root).value;
      const authexpire = $('.pcloud-expire', root).value;
      if(!username || !password){
        setMsg(form.msg, 'Introduce usuario y contraseña de pCloud.', 'bad');
        return;
      }
      setMsg(form.msg, 'Solicitando token a pCloud…');
      try{
        const result = await api('/api/pcloud/auth', {method:'POST', body:JSON.stringify({username,password,region,authexpire})});
        form.provider.value = 'pCloud';
        form.name.value = form.name.value || 'pCloud principal';
        form.url.value = result.base;
        form.token.value = result.auth;
        form.resource.value = result.email || username;
        form.notes.value = 'Token obtenido automáticamente desde asistente pCloud. Usuario: ' + (result.email || username);
        refreshPcloudAssistant();
        setMsg(form.msg, 'Token obtenido correctamente. Pulsa “Guardar servicio”.', 'ok');
      }catch(err){
        setMsg(form.msg, err.message + ' Puedes pegar un token manual si pCloud no permite login con contraseña.', 'bad');
      }
    });
    refreshPcloudAssistant();

    const load = async () => {
      const rows = await api('/api/cloud/accounts');
      $('.cloud-body', root).innerHTML = rows.length ? rows.map(r => {
        const status = r.last_test && r.last_test.ok ? 'ok' : (r.last_test ? 'bad' : '');
        const statusText = r.last_test ? (r.last_test.ok ? 'OK' : 'Error') : 'Sin probar';
        return `<tr>
          <td><span class="cloud-status-dot ${status}"></span> ${escapeHtml(statusText)}</td>
          <td>${escapeHtml(r.provider || '')}</td>
          <td>${escapeHtml(r.display_name || r.name || '')}</td>
          <td class="row">
            <button class="secondary cloud-open" data-id="${escapeAttr(r.id)}">Abrir</button>
            <button class="secondary cloud-edit" data-id="${escapeAttr(r.id)}">Editar</button>
            <button class="secondary cloud-test" data-id="${escapeAttr(r.id)}">Test</button>
            <button class="danger cloud-delete" data-id="${escapeAttr(r.id)}">Borrar</button>
          </td>
        </tr>`;
      }).join('') : '<tr><td colspan="4">No hay servicios configurados.</td></tr>';

      $$('.cloud-open', root).forEach(btn => btn.addEventListener('click', () => {
        const item = rows.find(x => x.id === btn.dataset.id);
        const url = item?.url || item?.config?.url;
        if(url) openBrowser(url, item.display_name || item.provider || 'Servicio cloud');
      }));

      $$('.cloud-edit', root).forEach(btn => btn.addEventListener('click', () => {
        const item = rows.find(x => x.id === btn.dataset.id);
        if(!item) return;
        form.id.value = item.id;
        form.title.textContent = 'Editar servicio';
        form.provider.value = item.provider || 'Custom API';
        form.name.value = item.display_name || item.name || '';
        form.url.value = item.url || item.config?.url || '';
        form.resource.value = item.resource || item.config?.resource || '';
        form.branch.value = item.branch || item.config?.branch || '';
        form.token.value = item.token || item.config?.token || '';
        form.notes.value = item.notes || item.config?.notes || '';
        setMsg(form.msg, 'Editando servicio existente.');
        refreshPcloudAssistant();
      }));

      $$('.cloud-test', root).forEach(btn => btn.addEventListener('click', async () => {
        const item = rows.find(x => x.id === btn.dataset.id);
        if(!item) return;
        setMsg(form.msg, 'Probando conexión…');
        try{
          const result = await api('/api/cloud/test/' + encodeURIComponent(item.id), {method:'POST'});
          setMsg(form.msg, result.ok ? 'Conexión OK.' : 'No responde correctamente: ' + (result.status || result.error), result.ok ? 'ok' : 'bad');
          await load();
        }catch(err){ setMsg(form.msg, err.message, 'bad'); }
      }));

      $$('.cloud-delete', root).forEach(btn => btn.addEventListener('click', async () => {
        const item = rows.find(x => x.id === btn.dataset.id);
        if(!confirm('¿Eliminar el servicio "' + (item?.display_name || '') + '"?')) return;
        await api('/api/cloud/accounts/' + encodeURIComponent(btn.dataset.id), {method:'DELETE'});
        await load();
      }));
    };

    $('.cloud-save', root).addEventListener('click', async () => {
      try{
        const payload = {
          provider: form.provider.value,
          display_name: form.name.value || 'Servicio cloud',
          url: form.url.value,
          resource: form.resource.value,
          branch: form.branch.value,
          token: form.token.value,
          notes: form.notes.value,
          enabled: true
        };
        if(form.id.value){
          await api('/api/cloud/accounts/' + encodeURIComponent(form.id.value), {method:'PUT', body:JSON.stringify(payload)});
          setMsg(form.msg, 'Servicio actualizado.', 'ok');
        }else{
          await api('/api/cloud/accounts', {method:'POST', body:JSON.stringify(payload)});
          setMsg(form.msg, 'Servicio guardado.', 'ok');
        }
        clearForm();
        await load();
      }catch(err){ setMsg(form.msg, err.message, 'bad'); }
    });

    $('.cloud-test-url', root).addEventListener('click', async () => {
      const url = form.url.value.trim();
      if(!url){ setMsg(form.msg, 'Introduce una URL para probar.', 'bad'); return; }
      setMsg(form.msg, 'Probando URL…');
      try{
        const result = await api('/api/cloud/test-url', {method:'POST', body:JSON.stringify({url})});
        setMsg(form.msg, result.ok ? 'URL accesible desde el servidor.' : 'No responde correctamente: ' + (result.status || result.error), result.ok ? 'ok' : 'bad');
      }catch(err){ setMsg(form.msg, err.message, 'bad'); }
    });

    await load();
  }

  async function renderPCloud(root){
    root.innerHTML = `
      <div class="card">
        <h3>Explorador pCloud</h3>
        <p>Navega por tus archivos de pCloud desde Masive OS. Configura primero una cuenta pCloud en el Centro Cloud PRO. Ahora puedes hacerlo con el asistente usando email y contraseña o pegando un token manual.</p>
        <div class="grid2" style="margin-top:12px">
          <div class="field"><label>Cuenta pCloud</label><select class="input pcloud-account"></select></div>
          <div class="field"><label>Folder ID actual</label><input class="input pcloud-folderid" value="0"></div>
        </div>
        <div class="pcloud-pathbar">
          <button class="secondary pcloud-root">Raíz</button>
          <input class="input pcloud-path" value="/" placeholder="/ o folderid">
          <button class="primary pcloud-load">Cargar</button>
          <button class="secondary pcloud-refresh">Actualizar</button>
        </div>
        <div class="pcloud-breadcrumb"></div>
        <div class="msg pcloud-msg"></div>
      </div>

      <div class="card" style="margin-top:12px">
        <h3>Contenido</h3>
        <div class="pcloud-list-box">
          <div class="pcloud-list-row pcloud-list-head">
            <div></div><div>Nombre</div><div>Tamaño</div><div>Modificado</div><div>Acción</div>
          </div>
          <div class="pcloud-list-body"><div class="pcloud-list-row"><div></div><div>Cargando cuentas…</div><div></div><div></div><div></div></div></div>
        </div>
      </div>
    `;

    const accountSel = $('.pcloud-account', root);
    const folderInput = $('.pcloud-folderid', root);
    const pathInput = $('.pcloud-path', root);
    const msg = $('.pcloud-msg', root);
    const body = $('.pcloud-list-body', root);
    const breadcrumb = $('.pcloud-breadcrumb', root);
    let current = {folderid:0, path:'/', parents:[]};

    const fmtSize = n => {
      n = Number(n || 0);
      if(!n) return '';
      if(n < 1024) return n + ' B';
      if(n < 1024*1024) return (n/1024).toFixed(1) + ' KB';
      if(n < 1024*1024*1024) return (n/(1024*1024)).toFixed(2) + ' MB';
      return (n/(1024*1024*1024)).toFixed(2) + ' GB';
    };
    const fmtDate = v => {
      if(!v) return '';
      const d = new Date(v);
      return isNaN(d) ? String(v).slice(0,16) : d.toLocaleDateString('es-ES') + ' ' + d.toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'});
    };

    const loadAccounts = async () => {
      const accounts = await api('/api/cloud/accounts');
      const pcloud = accounts.filter(a => (a.provider || '').toLowerCase() === 'pcloud');
      accountSel.innerHTML = pcloud.length ? pcloud.map(a => `<option value="${escapeAttr(a.id)}">${escapeHtml(a.display_name || a.provider)}</option>`).join('') : '<option value="">No hay cuenta pCloud configurada</option>';
      if(!pcloud.length){
        body.innerHTML = '<div class="pcloud-list-row"><div>⚠️</div><div>Configura una cuenta pCloud en Nube → pCloud.</div><div></div><div></div><div></div></div>';
      }
      return pcloud;
    };

    const renderBreadcrumb = () => {
      const parts = current.parents || [];
      breadcrumb.innerHTML = `<button class="secondary crumb-root">/ raíz</button>` + parts.map(p => `<button class="secondary crumb" data-folderid="${escapeAttr(p.folderid)}">${escapeHtml(p.name || p.folderid)}</button>`).join('');
      $('.crumb-root', breadcrumb)?.addEventListener('click', () => loadFolder({folderid:0}));
      $$('.crumb', breadcrumb).forEach(b => b.addEventListener('click', () => loadFolder({folderid:b.dataset.folderid})));
    };

    const loadFolder = async ({folderid=null, path=null}={}) => {
      if(!accountSel.value){ setMsg(msg, 'No hay cuenta pCloud configurada.', 'bad'); return; }
      setMsg(msg, 'Cargando pCloud…');
      body.innerHTML = '<div class="pcloud-list-row"><div>⏳</div><div>Cargando…</div><div></div><div></div><div></div></div>';
      try{
        const payload = { accountId: accountSel.value };
        if(path) payload.path = path;
        else payload.folderid = folderid ?? folderInput.value ?? 0;
        const data = await api('/api/pcloud/list', {method:'POST', body:JSON.stringify(payload)});
        current = data.metadata || {folderid: payload.folderid || 0, path: payload.path || '/', parents:[]};
        folderInput.value = current.folderid ?? 0;
        pathInput.value = current.path || '/';
        renderBreadcrumb();

        const items = (data.contents || []).slice().sort((a,b) => {
          if(!!a.isfolder !== !!b.isfolder) return a.isfolder ? -1 : 1;
          return String(a.name||'').localeCompare(String(b.name||''), 'es');
        });

        body.innerHTML = items.length ? items.map(it => `
          <div class="pcloud-list-row">
            <div class="pcloud-file-icon">${it.isfolder ? '📁' : '📄'}</div>
            <div><b>${escapeHtml(it.name || '')}</b><div class="small">${escapeHtml(it.path || '')}</div></div>
            <div>${escapeHtml(fmtSize(it.size))}</div>
            <div>${escapeHtml(fmtDate(it.modified))}</div>
            <div class="row">
              ${it.isfolder
                ? `<button class="secondary pcloud-open-folder" data-folderid="${escapeAttr(it.folderid)}">Abrir</button>`
                : `<button class="secondary pcloud-open-file" data-fileid="${escapeAttr(it.fileid)}">Abrir</button><button class="secondary pcloud-download-file" data-fileid="${escapeAttr(it.fileid)}">Descargar</button>`
              }
            </div>
          </div>
        `).join('') : '<div class="pcloud-list-row"><div>📭</div><div>Carpeta vacía.</div><div></div><div></div><div></div></div>';

        $$('.pcloud-open-folder', root).forEach(b => b.addEventListener('click', () => loadFolder({folderid:b.dataset.folderid})));
        $$('.pcloud-open-file', root).forEach(b => b.addEventListener('click', async () => {
          const link = await api('/api/pcloud/download-link', {method:'POST', body:JSON.stringify({accountId:accountSel.value,fileid:b.dataset.fileid})});
          if(link.url) openBrowser(link.url, 'pCloud archivo');
        }));
        $$('.pcloud-download-file', root).forEach(b => b.addEventListener('click', async () => {
          const link = await api('/api/pcloud/download-link', {method:'POST', body:JSON.stringify({accountId:accountSel.value,fileid:b.dataset.fileid, forcedownload:true})});
          if(link.url) window.open(link.url, '_blank', 'noopener,noreferrer');
        }));

        setMsg(msg, 'Carpeta cargada correctamente.', 'ok');
      }catch(err){
        body.innerHTML = `<div class="pcloud-list-row"><div>❌</div><div>${escapeHtml(err.message)}</div><div></div><div></div><div></div></div>`;
        setMsg(msg, err.message, 'bad');
      }
    };

    await loadAccounts();
    if(accountSel.value) await loadFolder({folderid:0});

    $('.pcloud-root', root).addEventListener('click', () => loadFolder({folderid:0}));
    $('.pcloud-refresh', root).addEventListener('click', () => loadFolder({folderid:folderInput.value || 0}));
    $('.pcloud-load', root).addEventListener('click', () => {
      const v = pathInput.value.trim();
      if(v.startsWith('/')) loadFolder({path:v});
      else loadFolder({folderid:folderInput.value || v || 0});
    });
    accountSel.addEventListener('change', () => loadFolder({folderid:0}));
  }

        <div class="card">
          <h3>Equipos configurados</h3>
          <table class="table"><thead><tr><th>Nombre</th><th>Protocolo</th><th>Host</th></tr></thead><tbody class="remote-body"><tr><td colspan="3">Cargando…</td></tr></tbody></table>
        </div>
      </div>
    `;
    const load = async () => {
      const rows = await api('/api/remote/connections');
      $('.remote-body', root).innerHTML = rows.length ? rows.map(r => `<tr><td>${escapeHtml(r.name)}</td><td>${escapeHtml(r.protocol)}</td><td>${escapeHtml(r.host)}</td></tr>`).join('') : '<tr><td colspan="3">No hay equipos configurados.</td></tr>';
    };
    await load();
    $('.remote-add', root).addEventListener('click', async () => {
      const msg = $('.remote-msg', root);
      try{
        await api('/api/remote/connections', {method:'POST', body:JSON.stringify({
          name: $('.remote-name', root).value || 'Equipo remoto',
          protocol: $('.remote-protocol', root).value,
          host: $('.remote-host', root).value
        })});
        setMsg(msg, 'Equipo guardado.', 'ok');
        $('.remote-name', root).value = '';
        $('.remote-host', root).value = '';
        await load();
      }catch(err){ setMsg(msg, err.message, 'bad'); }
    });
  }

  function renderSettings(root){
    root.innerHTML = `
      <div class="panel-grid">
        <div class="card">
          <h3>Configuración general</h3>
          <div class="field"><label>Título del sistema</label><input class="input cfg-title" value="${escapeAttr(config.title || '')}"></div>
          <div class="field"><label>Subtítulo</label><input class="input cfg-subtitle" value="${escapeAttr(config.subtitle || '')}"></div>
          <div class="field"><label>Tema visual</label>
            <select class="input cfg-theme">
              <option value="massive">Massive Glass</option>
              <option value="aurora">Aurora Radio</option>
              <option value="midnight">Midnight Pro</option>
              <option value="light">Light PPG</option>
            </select>
          </div>
          <div class="field"><label>Fondo de pantalla URL/base64</label><input class="input cfg-wallpaper" value="${escapeAttr(config.wallpaper || '')}" placeholder="https://... o data:image/..."></div>
          <div class="field"><label>Cargar fondo desde este PC</label><input class="input cfg-wallpaper-file" type="file" accept="image/*"></div>
          <div class="wallpaper-preview-grid">
            <div class="wallpaper-preset wp-massive" data-theme="massive" data-wallpaper=""><span>Massive</span></div>
            <div class="wallpaper-preset wp-aurora" data-theme="aurora" data-wallpaper=""><span>Aurora</span></div>
            <div class="wallpaper-preset wp-midnight" data-theme="midnight" data-wallpaper=""><span>Midnight</span></div>
            <div class="wallpaper-preset wp-light" data-theme="light" data-wallpaper=""><span>Light</span></div>
          </div>
          <button class="primary cfg-save" style="margin-top:14px">Guardar configuración</button>
          <div class="msg cfg-msg"></div>
        </div>
        <div class="card">
          <h3>Iconos / Apps</h3>
          <p>Crear accesos directos a webs, módulos internos o enlaces externos. También puedes editar un icono con clic derecho sobre el escritorio.</p>
          <div class="quick-app-grid">
            <button class="quick-app quick-browser"><b>🌐</b><span>Navegador</span></button>
            <button class="quick-app quick-files"><b>📁</b><span>Archivos</span></button>
            <button class="quick-app quick-dashboards"><b>📊</b><span>Dashboards</span></button>
            <button class="quick-app quick-cloud"><b>☁️</b><span>Nube</span></button>
            <button class="quick-app quick-pcloud"><b>🅿️</b><span>pCloud</span></button>
            <button class="quick-app quick-meteo"><b>📡</b><span>Meteo Radio</span></button>
          </div>
          <div style="margin-top:12px" class="row">
            <button class="primary add-icon">Crear icono</button>
            <button class="secondary refresh-icons">Recargar iconos</button>
          </div>
        </div>
      </div>
      <div class="card" style="margin-top:12px">
        <h3>Listado de iconos</h3>
        <table class="table"><thead><tr><th>Icono</th><th>Título</th><th>Tipo</th><th>Destino</th><th>Acciones</th></tr></thead><tbody class="icons-table-body"></tbody></table>
      </div>
    `;
    $('.cfg-theme', root).value = config.theme || 'massive';
    $$('.wallpaper-preset', root).forEach(p => {
      p.addEventListener('click', async () => {
        $('.cfg-theme', root).value = p.dataset.theme || 'massive';
        $('.cfg-wallpaper', root).value = p.dataset.wallpaper || '';
        config = await api('/api/config', {method:'POST', body:JSON.stringify({
          theme: $('.cfg-theme', root).value,
          wallpaper: $('.cfg-wallpaper', root).value
        })});
        applyConfig();
      });
    });
    $('.cfg-wallpaper-file', root).addEventListener('change', async (e) => {
      const file = e.target.files && e.target.files[0];
      if(!file) return;
      const reader = new FileReader();
      reader.onload = () => {
        $('.cfg-wallpaper', root).value = String(reader.result || '');
      };
      reader.readAsDataURL(file);
    });
    $('.quick-browser', root).addEventListener('click', () => openModule('browser'));
    $('.quick-files', root).addEventListener('click', () => openModule('files'));
    $('.quick-dashboards', root).addEventListener('click', () => openModule('dashboards'));
    $('.quick-cloud', root).addEventListener('click', () => openModule('cloud'));
    $('.quick-pcloud', root).addEventListener('click', () => openModule('pcloud'));
    $('.quick-meteo', root).addEventListener('click', () => openModule('meteo'));
    const renderList = () => {
      $('.icons-table-body', root).innerHTML = icons.map(i => `
        <tr>
          <td style="font-size:22px">${escapeHtml(i.icon || '')}</td>
          <td>${escapeHtml(i.title || '')}</td>
          <td>${escapeHtml(i.type || '')}</td>
          <td>${escapeHtml(i.target || '')}</td>
          <td>
            <button class="secondary edit-icon" data-id="${escapeAttr(i.id)}">Editar</button>
            <button class="danger del-icon" data-id="${escapeAttr(i.id)}">Borrar</button>
          </td>
        </tr>
      `).join('');
      $$('.edit-icon', root).forEach(b => b.addEventListener('click', () => showIconModal(icons.find(i => i.id === b.dataset.id))));
      $$('.del-icon', root).forEach(b => b.addEventListener('click', async () => {
        const icon = icons.find(i => i.id === b.dataset.id);
        if(!confirm('¿Eliminar el icono "' + (icon?.title || '') + '"?')) return;
        await api('/api/icons/' + encodeURIComponent(b.dataset.id), {method:'DELETE'});
        icons = await api('/api/icons');
        renderIcons();
        renderList();
      }));
    };
    renderList();
    $('.add-icon', root).addEventListener('click', () => showIconModal(null));
    $('.refresh-icons', root).addEventListener('click', async () => { icons = await api('/api/icons'); renderIcons(); renderList(); });
    $('.cfg-save', root).addEventListener('click', async () => {
      const msg = $('.cfg-msg', root);
      try{
        config = await api('/api/config', {method:'POST', body:JSON.stringify({
          title: $('.cfg-title', root).value,
          subtitle: $('.cfg-subtitle', root).value,
          theme: $('.cfg-theme', root).value,
          wallpaper: $('.cfg-wallpaper', root).value
        })});
        applyConfig();
        setMsg(msg, 'Configuración guardada.', 'ok');
      }catch(err){ setMsg(msg, err.message, 'bad'); }
    });
  }

  function showIconModal(icon){
    const isEdit = !!icon;
    const data = icon || {title:'', icon:'🔗', type:'link', target:'', x:80, y:80};
    modalHost.innerHTML = `
      <div class="modal-backdrop">
        <div class="modal">
          <h2>${isEdit ? 'Editar icono' : 'Crear icono'}</h2>
          <p>Configura el acceso del escritorio. Los cambios quedan guardados en la base persistente del servidor.</p>
          <div class="grid2">
            <div class="field"><label>Título</label><input class="input m-title" value="${escapeAttr(data.title)}"></div>
            <div class="field"><label>Emoji/Icono</label><input class="input m-icon" value="${escapeAttr(data.icon || '🔗')}"></div>
          </div>
          <div class="grid2">
            <div class="field"><label>Tipo</label>
              <select class="input m-type">
                <option value="link">Web en ventana</option>
                <option value="browser">Navegador</option>
                <option value="external">Abrir externo</option>
                <option value="module">Módulo interno</option>
              </select>
            </div>
            <div class="field"><label>Destino</label>
              <select class="input m-target-select hidden">
                <option value="browser">browser</option>
                <option value="files">files</option>
                <option value="cloud">cloud</option>
                <option value="meteo">meteo</option>
                <option value="remote">remote</option>
                <option value="settings">settings</option>
              </select>
              <input class="input m-target" value="${escapeAttr(data.target || '')}" placeholder="https://... o módulo">
            </div>
          </div>
          <div class="kv">
            <b>Web en ventana</b><span>Abre la URL dentro de una ventana iframe.</span>
            <b>Abrir externo</b><span>Abre la URL en una pestaña nueva.</span>
            <b>Módulo interno</b><span>Usa destino: files, cloud, meteo, remote, settings o browser.</span>
          </div>
          <div class="msg m-msg"></div>
          <div class="form-actions">
            ${isEdit ? '<button class="danger m-delete">Eliminar</button>' : ''}
            <button class="secondary m-cancel">Cancelar</button>
            <button class="primary m-save">${isEdit ? 'Guardar cambios' : 'Crear icono'}</button>
          </div>
        </div>
      </div>
    `;
    $('.m-type').value = data.type || 'link';
    const syncTarget = () => {
      const type = $('.m-type').value;
      const input = $('.m-target');
      const sel = $('.m-target-select');
      if(type === 'module'){
        sel.classList.remove('hidden');
        input.classList.add('hidden');
        sel.value = ['browser','files','cloud','meteo','remote','settings'].includes(data.target) ? data.target : 'files';
      }else{
        sel.classList.add('hidden');
        input.classList.remove('hidden');
      }
    };
    syncTarget();
    $('.m-type').addEventListener('change', syncTarget);
    $('.m-cancel').addEventListener('click', () => modalHost.innerHTML = '');
    $('.modal-backdrop').addEventListener('click', e => { if(e.target.classList.contains('modal-backdrop')) modalHost.innerHTML=''; });
    if(isEdit){
      $('.m-delete')?.addEventListener('click', async () => {
        if(!confirm('¿Eliminar este icono?')) return;
        await api('/api/icons/' + encodeURIComponent(icon.id), {method:'DELETE'});
        modalHost.innerHTML = '';
        icons = await api('/api/icons');
        renderIcons();
      });
    }
    $('.m-save').addEventListener('click', async () => {
      const msg = $('.m-msg');
      const type = $('.m-type').value;
      const payload = {
        title: $('.m-title').value || 'Nuevo icono',
        icon: $('.m-icon').value || '🔗',
        type,
        target: type === 'module' ? $('.m-target-select').value : $('.m-target').value,
        x: Number(data.x || 80),
        y: Number(data.y || 80)
      };
      try{
        if(isEdit){
          await api('/api/icons/' + encodeURIComponent(icon.id), {method:'PUT', body:JSON.stringify({...icon, ...payload})});
        }else{
          await api('/api/icons', {method:'POST', body:JSON.stringify(payload)});
        }
        modalHost.innerHTML = '';
        icons = await api('/api/icons');
        renderIcons();
      }catch(err){ setMsg(msg, err.message, 'bad'); }
    });
  }

  function downloadText(filename, text){
    const blob = new Blob([text], {type:'application/json'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = filename;
    a.click();
    setTimeout(() => URL.revokeObjectURL(a.href), 1000);
  }

  function escapeHtml(v){
    return String(v ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }
  function escapeAttr(v){ return escapeHtml(v).replace(/`/g,'&#96;'); }


  $('#globalSearchInput').addEventListener('keydown', (e) => {
    if(e.key !== 'Enter') return;
    const q = e.target.value.trim();
    if(!q) return;

    const lower = q.toLowerCase();
    const internal = {
      'archivos':'files','files':'files','dashboards':'dashboards','dashboard':'dashboards','paneles':'dashboards','nube':'cloud','cloud':'cloud','pcloud':'pcloud','pclaud':'pcloud','p cloud':'pcloud',
      'meteo':'meteo','meteorologia':'meteo','meteorología':'meteo','radio':'meteo','ea1fjz':'meteo','observatory':'meteo','windy':'meteo','dsn':'meteo','ayuda':'remote','remoto':'remote',
      'config':'settings','configuracion':'settings','configuración':'settings',
      'navegador':'browser','browser':'browser'
    };
    if(internal[lower]){
      openModule(internal[lower]);
      e.target.value = '';
      return;
    }

    const found = icons.find(i => (i.title || '').toLowerCase().includes(lower));
    if(found){
      openIcon(found);
      e.target.value = '';
      return;
    }

    if(/^https?:\/\//i.test(q) || q.includes('.')){
      openBrowser(/^https?:\/\//i.test(q) ? q : 'https://' + q, q);
      e.target.value = '';
      return;
    }

    openBrowser('https://www.google.com/search?q=' + encodeURIComponent(q), 'Buscar: ' + q);
    e.target.value = '';
  });

  boot();
})();
</script>
</body>
</html>
