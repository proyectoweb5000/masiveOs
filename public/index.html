          wallpaper: $('.cfg-wallpaper', root).value
        })});
        applyConfig();
        setMsg(msg, 'Configuración guardada.', 'ok');
      }catch(err){ setMsg(msg, err.message, 'bad'); }
    });
  }

  function showIconModal(icon){
    const isEdit = !!icon;
    const data = icon || {title:'', icon:'🔗', type:'link', target:'', x:80, y:80};
    modalHost.innerHTML = `
      <div class="modal-backdrop">
        <div class="modal">
          <h2>${isEdit ? 'Editar icono' : 'Crear icono'}</h2>
          <p>Configura el acceso del escritorio. Los cambios quedan guardados en la base persistente del servidor.</p>
          <div class="grid2">
            <div class="field"><label>Título</label><input class="input m-title" value="${escapeAttr(data.title)}"></div>
            <div class="field"><label>Emoji/Icono</label><input class="input m-icon" value="${escapeAttr(data.icon || '🔗')}"></div>
          </div>
          <div class="grid2">
            <div class="field"><label>Tipo</label>
              <select class="input m-type">
                <option value="link">Web en ventana</option>
                <option value="browser">Navegador</option>
                <option value="external">Abrir externo</option>
                <option value="module">Módulo interno</option>
              </select>
            </div>
            <div class="field"><label>Destino</label>
              <select class="input m-target-select hidden">
                <option value="browser">browser</option>
                <option value="files">files</option>
                <option value="cloud">cloud</option>
                <option value="meteo">meteo</option>
                <option value="remote">remote</option>
                <option value="settings">settings</option>
              </select>
              <input class="input m-target" value="${escapeAttr(data.target || '')}" placeholder="https://... o módulo">
            </div>
          </div>
          <div class="kv">
            <b>Web en ventana</b><span>Abre la URL dentro de una ventana iframe.</span>
            <b>Abrir externo</b><span>Abre la URL en una pestaña nueva.</span>
            <b>Módulo interno</b><span>Usa destino: files, cloud, meteo, remote, settings o browser.</span>
          </div>
          <div class="msg m-msg"></div>
          <div class="form-actions">
            ${isEdit ? '<button class="danger m-delete">Eliminar</button>' : ''}
            <button class="secondary m-cancel">Cancelar</button>
            <button class="primary m-save">${isEdit ? 'Guardar cambios' : 'Crear icono'}</button>
          </div>
        </div>
      </div>
    `;
    $('.m-type').value = data.type || 'link';
    const syncTarget = () => {
      const type = $('.m-type').value;
      const input = $('.m-target');
      const sel = $('.m-target-select');
      if(type === 'module'){
        sel.classList.remove('hidden');
        input.classList.add('hidden');
        sel.value = ['browser','files','cloud','meteo','remote','settings'].includes(data.target) ? data.target : 'files';
      }else{
        sel.classList.add('hidden');
        input.classList.remove('hidden');
      }
    };
    syncTarget();
    $('.m-type').addEventListener('change', syncTarget);
    $('.m-cancel').addEventListener('click', () => modalHost.innerHTML = '');
    $('.modal-backdrop').addEventListener('click', e => { if(e.target.classList.contains('modal-backdrop')) modalHost.innerHTML=''; });
    if(isEdit){
      $('.m-delete')?.addEventListener('click', async () => {
        if(!confirm('¿Eliminar este icono?')) return;
        await api('/api/icons/' + encodeURIComponent(icon.id), {method:'DELETE'});
        modalHost.innerHTML = '';
        icons = await api('/api/icons');
        renderIcons();
      });
    }
    $('.m-save').addEventListener('click', async () => {
      const msg = $('.m-msg');
      const type = $('.m-type').value;
      const payload = {
        title: $('.m-title').value || 'Nuevo icono',
        icon: $('.m-icon').value || '🔗',
        type,
        target: type === 'module' ? $('.m-target-select').value : $('.m-target').value,
        x: Number(data.x || 80),
        y: Number(data.y || 80)
      };
      try{
        if(isEdit){
          await api('/api/icons/' + encodeURIComponent(icon.id), {method:'PUT', body:JSON.stringify({...icon, ...payload})});
        }else{
          await api('/api/icons', {method:'POST', body:JSON.stringify(payload)});
        }
        modalHost.innerHTML = '';
        icons = await api('/api/icons');
        renderIcons();
      }catch(err){ setMsg(msg, err.message, 'bad'); }
    });
  }

  function downloadText(filename, text){
    const blob = new Blob([text], {type:'application/json'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = filename;
    a.click();
    setTimeout(() => URL.revokeObjectURL(a.href), 1000);
  }

  function escapeHtml(v){
    return String(v ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }
  function escapeAttr(v){ return escapeHtml(v).replace(/`/g,'&#96;'); }


  $('#globalSearchInput').addEventListener('keydown', (e) => {
    if(e.key !== 'Enter') return;
    const q = e.target.value.trim();
    if(!q) return;

    const lower = q.toLowerCase();
    const internal = {
      'archivos':'files','files':'files','dashboards':'dashboards','dashboard':'dashboards','paneles':'dashboards','buscar':'search','buscador':'search','search':'search','spotlight':'search','texto':'writer','documento':'writer','writer':'writer','notas':'writer','ftp':'ftp','sftp':'ftp','servidor ftp':'ftp','drive':'drives','drives':'drives','cloud drives':'drives','disco nube':'drives','dropbox':'drives','pcloud':'drives','google drive':'drives','onedrive':'drives','one drive':'drives','nube':'cloud','cloud':'cloud',
      'meteo':'meteo','meteorologia':'meteo','meteorología':'meteo','radio':'meteo','ea1fjz':'meteo','observatory':'meteo','windy':'meteo','dsn':'meteo','ayuda':'remote','remoto':'remote',
      'config':'settings','configuracion':'settings','configuración':'settings',
      'navegador':'browser','browser':'browser'
    };
    if(internal[lower]){
      openModule(internal[lower]);
      e.target.value = '';
      return;
    }

    const found = icons.find(i => (i.title || '').toLowerCase().includes(lower));
    if(found){
      openIcon(found);
      e.target.value = '';
      return;
    }

    if(/^https?:\/\//i.test(q) || q.includes('.')){
      openBrowser(/^https?:\/\//i.test(q) ? q : 'https://' + q, q);
      e.target.value = '';
      return;
    }

    openBrowser(startpageSearchUrl(q), 'Buscar: ' + q);
    e.target.value = '';
  });

  boot();
})();

  // Mensajes de retorno OAuth Dropbox
  (function(){
    const params = new URLSearchParams(location.search);
    if(params.get('dropbox_oauth') === 'ok'){
      setTimeout(() => {
        openModule('drives');
        alert('Dropbox conectado correctamente. Ya aparece en Cloud Drives.');
        history.replaceState({}, document.title, location.pathname);
      }, 900);
    }
    if(params.get('dropbox_oauth') === 'error'){
      setTimeout(() => {
        openModule('drives');
        alert('No se pudo conectar Dropbox: ' + (params.get('msg') || 'error OAuth'));
        history.replaceState({}, document.title, location.pathname);
      }, 900);
    }
  })();


</script>
