services:
  - type: web
    name: ea1fjz-cloud-os
    env: node
    plan: starter
    region: frankfurt
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 20.19.4
      - key: ADMIN_PASSWORD
        sync: false
      - key: DATABASE_PATH
        value: /var/data/ea1fjz_cloud_os.json
      - key: UPLOADS_PATH
        value: /var/data/uploads
    disk:
      name: ea1fjz-os-data
      mountPath: /var/data
      sizeGB: 1
