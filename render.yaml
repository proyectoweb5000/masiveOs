services:
  - type: web
    name: ea1fjz-cloud-os
    env: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    disk:
      name: ea1fjz-cloud-os-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_PATH
        value: /var/data/ea1fjz_cloud_os.sqlite
      - key: UPLOADS_PATH
        value: /var/data/uploads
      - key: SESSION_SECRET
        generateValue: true
      - key: ADMIN_PASSWORD
        value: cambiar1234
